<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="FF14 冒險者小隊任務派遣模擬器 — 輸入隊員職業與等級，自動計算最佳派遣組合與成功率">
  <title>冒險者小隊計算機 | 水神的工具箱</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-base:    #0a0c10;
      --bg-surface: #0f1117;
      --bg-card:    #14181f;
      --bg-card-hover: #1a1f2b;
      --border:     rgba(255,255,255,0.07);
      --border-hover: rgba(200,169,110,0.4);
      --gold:       #c8a96e;
      --gold-light: #e2c98a;
      --gold-dim:   rgba(200,169,110,0.15);
      --purple:     #a78bfa;
      --purple-dim: rgba(167,139,250,0.12);
      --green:      #4ade80;
      --green-dim:  rgba(74,222,128,0.12);
      --blue:       #4fc3f7;
      --blue-dim:   rgba(79,195,247,0.12);
      --red:        #f87171;
      --red-dim:    rgba(248,113,113,0.12);
      --orange:     #fb923c;
      --orange-dim: rgba(251,146,60,0.12);
      --text:       #e8e3d8;
      --text-dim:   #9a9590;
      --text-muted: #6b6560;
      --radius:     8px;
    }

    body {
      background: var(--bg-base);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      min-height: 100vh;
    }

    /* NAV */
    .nav {
      background: var(--bg-surface);
      border-bottom: 1px solid var(--border);
      padding: 0 1.5rem;
      height: 52px;
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }
    .nav-back {
      color: var(--text-dim);
      text-decoration: none;
      font-size: 0.85rem;
      display: flex;
      align-items: center;
      gap: 0.4rem;
      transition: color 0.2s;
    }
    .nav-back:hover { color: var(--gold); }
    .nav-sep { color: var(--text-muted); font-size: 0.85rem; }
    .nav-title { color: var(--text); font-size: 0.9rem; font-weight: 600; }

    /* HERO */
    .hero {
      background: linear-gradient(135deg, #0f1117 0%, #141820 100%);
      border-bottom: 1px solid var(--border);
      padding: 2rem 1.5rem;
    }
    .hero-inner { max-width: 1200px; margin: 0 auto; }
    .hero h1 { font-size: 1.6rem; font-weight: 700; display: flex; align-items: center; gap: 0.5rem; }
    .hero h1 span { font-size: 1.8rem; }
    .hero p { color: var(--text-dim); margin-top: 0.4rem; font-size: 0.9rem; }

    /* MAIN */
    .main { max-width: 1200px; margin: 0 auto; padding: 1.5rem; }

    /* SECTION */
    .section { margin-bottom: 2rem; }
    .section-title {
      font-size: 0.8rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--gold);
      margin-bottom: 1rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .section-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }

    /* MEMBER GRID */
    .member-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 0.75rem;
    }
    .member-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1rem;
    }
    .member-num {
      font-size: 0.72rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 0.5rem;
    }
    .member-row {
      display: flex;
      gap: 0.5rem;
      align-items: center;
      margin-bottom: 0.5rem;
    }
    .member-row label { font-size: 0.8rem; color: var(--text-dim); width: 2.2rem; flex-shrink: 0; }
    select, .level-input {
      flex: 1;
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: 5px;
      color: var(--text);
      padding: 0.35rem 0.5rem;
      font-size: 0.82rem;
      outline: none;
      transition: border-color 0.2s;
    }
    select:focus, .level-input:focus { border-color: var(--gold); }
    .member-stats {
      display: flex;
      gap: 0.4rem;
      margin-top: 0.5rem;
      flex-wrap: wrap;
    }
    .stat-badge {
      font-size: 0.72rem;
      padding: 0.15rem 0.4rem;
      border-radius: 4px;
      background: var(--bg-surface);
      border: 1px solid var(--border);
    }
    .stat-ph { color: var(--red); }
    .stat-me { color: var(--blue); }
    .stat-ta { color: var(--green); }

    /* TEAM TOTAL */
    .team-total {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1rem 1.5rem;
      display: flex;
      gap: 2rem;
      flex-wrap: wrap;
      align-items: center;
    }
    .total-label { font-size: 0.8rem; color: var(--text-dim); margin-bottom: 0.25rem; }
    .total-val { font-size: 1.4rem; font-weight: 700; }

    /* MISSION LIST */
    .mission-list { display: flex; flex-direction: column; gap: 0.5rem; }
    .mission-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 0.75rem 1rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      flex-wrap: wrap;
      transition: border-color 0.2s;
    }
    .mission-card.can-100 { border-color: rgba(74,222,128,0.4); }
    .mission-card.can-partial { border-color: rgba(200,169,110,0.25); }
    .mission-card.impossible { opacity: 0.4; }

    .mission-info { flex: 1; min-width: 180px; }
    .mission-name { font-size: 0.9rem; font-weight: 600; }
    .mission-meta { font-size: 0.75rem; color: var(--text-dim); margin-top: 0.2rem; display: flex; gap: 0.5rem; flex-wrap: wrap; }

    .mission-type {
      font-size: 0.68rem;
      padding: 0.1rem 0.45rem;
      border-radius: 3px;
      font-weight: 600;
    }
    .type-trainee  { background: var(--blue-dim);   color: var(--blue);   border: 1px solid rgba(79,195,247,0.25); }
    .type-routine  { background: var(--gold-dim);   color: var(--gold);   border: 1px solid rgba(200,169,110,0.25); }
    .type-priority { background: var(--purple-dim); color: var(--purple); border: 1px solid rgba(167,139,250,0.25); }

    .mission-reqs {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
      min-width: 200px;
    }
    .req-item {
      font-size: 0.75rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.1rem;
    }
    .req-lbl { color: var(--text-muted); font-size: 0.65rem; }
    .req-val { font-weight: 700; }
    .req-met   { color: var(--green); }
    .req-unmet { color: var(--red); }

    .mission-rate {
      min-width: 80px;
      text-align: right;
    }
    .rate-val { font-size: 1.3rem; font-weight: 700; }
    .rate-100 { color: var(--green); }
    .rate-hi  { color: var(--gold); }
    .rate-lo  { color: var(--orange); }
    .rate-no  { color: var(--text-muted); }

    /* VARIANT SELECTOR */
    .variant-tabs {
      display: flex;
      gap: 0.3rem;
      flex-wrap: wrap;
      margin-bottom: 0.5rem;
    }
    .variant-tab {
      font-size: 0.72rem;
      padding: 0.2rem 0.6rem;
      border-radius: 4px;
      cursor: pointer;
      border: 1px solid var(--border);
      background: var(--bg-surface);
      color: var(--text-dim);
      transition: all 0.15s;
    }
    .variant-tab.active, .variant-tab:hover {
      border-color: var(--gold);
      color: var(--gold);
    }

    /* FILTER ROW */
    .filter-row {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
      margin-bottom: 1rem;
      align-items: center;
    }
    .filter-btn {
      font-size: 0.78rem;
      padding: 0.3rem 0.8rem;
      border-radius: 5px;
      cursor: pointer;
      border: 1px solid var(--border);
      background: var(--bg-surface);
      color: var(--text-dim);
      transition: all 0.15s;
    }
    .filter-btn.active {
      background: var(--gold-dim);
      border-color: var(--gold);
      color: var(--gold);
    }

    /* TIPS */
    .tip {
      font-size: 0.78rem;
      color: var(--text-dim);
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 0.75rem 1rem;
      margin-bottom: 1rem;
      line-height: 1.6;
    }
    .tip strong { color: var(--gold); }

    @media (max-width: 640px) {
      .mission-card { flex-direction: column; align-items: flex-start; }
      .mission-rate { text-align: left; }
    }
  </style>
</head>
<body>
<nav class="nav">
  <a href="../../" class="nav-back">⚓ 水神的工具箱</a>
  <span class="nav-sep">›</span>
  <span class="nav-title">🏰 冒險者小隊計算機</span>
</nav>

<div class="hero">
  <div class="hero-inner">
    <h1><span>🏰</span> 冒險者小隊計算機</h1>
    <p>設定隊員職業與等級，自動計算各任務的最佳派遣組合與成功率</p>
  </div>
</div>

<div class="main">
  <!-- MEMBER INPUT -->
  <div class="section">
    <div class="section-title">隊員設定（最多4人）</div>
    <div class="member-grid" id="memberGrid"></div>
  </div>

  <!-- TEAM TOTAL -->
  <div class="section">
    <div class="section-title">隊伍合計屬性</div>
    <div class="team-total">
      <div>
        <div class="total-label">體能 Physical</div>
        <div class="total-val stat-ph" id="totalPh">0</div>
      </div>
      <div>
        <div class="total-label">精神 Mental</div>
        <div class="total-val stat-me" id="totalMe">0</div>
      </div>
      <div>
        <div class="total-label">戰術 Tactical</div>
        <div class="total-val stat-ta" id="totalTa">0</div>
      </div>
    </div>
  </div>

  <!-- MISSION LIST -->
  <div class="section">
    <div class="section-title">任務派遣結果</div>

    <div class="tip">
      <strong>成功率計算</strong>：重要任務（⚑）需 3 項屬性全達標才有 100% 成功率；一般任務每達標 1 項+20%，全達標再+20%，基礎成功率視任務而定。<br>
      派遣時遊戲會顯示 6 種「要求組合」，選擇最適合己方屬性的組合即可。
    </div>

    <div class="filter-row">
      <span style="font-size:0.8rem;color:var(--text-dim)">顯示：</span>
      <button class="filter-btn active" id="filterAll" onclick="setFilter('all')">全部</button>
      <button class="filter-btn" id="filterCan" onclick="setFilter('possible')">可達成</button>
      <button class="filter-btn" id="filter100" onclick="setFilter('100')">100% 達成</button>
    </div>

    <div class="mission-list" id="missionList"></div>
  </div>
</div>

<script>
// ── DATA ────────────────────────────────────────────────────────────────────
const DATA_URL = '../../data/squadron.json';

// ── STATE ───────────────────────────────────────────────────────────────────
let squadronData = null;
let filter = 'all';
let members = [
  { job: 'MRD', level: 60 },
  { job: 'GLA', level: 60 },
  { job: 'ARC', level: 60 },
  { job: 'ROG', level: 60 },
];

// ── LOAD ─────────────────────────────────────────────────────────────────────
fetch(DATA_URL)
  .then(r => r.json())
  .then(data => {
    squadronData = data;
    buildMemberGrid();
    recalc();
  });

// ── BUILD MEMBER GRID ────────────────────────────────────────────────────────
function buildMemberGrid() {
  const growths = squadronData.data.filter(x => x.kind === 'memberGrowth');
  const jobOptions = growths.map(g =>
    `<option value="${g.classAbbr}">${g.className} (${g.classAbbr})</option>`
  ).join('');

  const grid = document.getElementById('memberGrid');
  grid.innerHTML = members.map((m, i) => `
    <div class="member-card">
      <div class="member-num">隊員 ${i + 1}</div>
      <div class="member-row">
        <label>職業</label>
        <select id="job${i}" onchange="updateMember(${i},'job',this.value)">
          ${growths.map(g =>
            `<option value="${g.classAbbr}"${g.classAbbr===m.job?' selected':''}>${g.className}</option>`
          ).join('')}
        </select>
      </div>
      <div class="member-row">
        <label>等級</label>
        <input class="level-input" type="number" id="lv${i}" min="1" max="60" value="${m.level}"
          onchange="updateMember(${i},'level',+this.value)">
      </div>
      <div class="member-stats" id="stats${i}"></div>
    </div>
  `).join('');

  members.forEach((_, i) => updateStatBadge(i));
}

function updateMember(i, field, val) {
  if (field === 'level') {
    val = Math.max(1, Math.min(60, val || 1));
    document.getElementById('lv' + i).value = val;
  }
  members[i][field] = val;
  updateStatBadge(i);
  recalc();
}

function getMemberStats(m) {
  if (!squadronData) return { physical: 0, mental: 0, tactical: 0 };
  const growths = squadronData.data.filter(x => x.kind === 'memberGrowth');
  const g = growths.find(x => x.classAbbr === m.job);
  if (!g) return { physical: 0, mental: 0, tactical: 0 };
  const idx = Math.max(0, Math.min(59, m.level - 1));
  return {
    physical: g.growth.physical[idx],
    mental:   g.growth.mental[idx],
    tactical: g.growth.tactical[idx],
  };
}

function updateStatBadge(i) {
  const s = getMemberStats(members[i]);
  document.getElementById('stats' + i).innerHTML = `
    <span class="stat-badge stat-ph">體 ${s.physical}</span>
    <span class="stat-badge stat-me">精 ${s.mental}</span>
    <span class="stat-badge stat-ta">戰 ${s.tactical}</span>
  `;
}

// ── RECALC ────────────────────────────────────────────────────────────────────
function recalc() {
  if (!squadronData) return;

  // team total
  const totals = members.reduce((acc, m) => {
    const s = getMemberStats(m);
    acc.physical += s.physical;
    acc.mental   += s.mental;
    acc.tactical += s.tactical;
    return acc;
  }, { physical: 0, mental: 0, tactical: 0 });

  document.getElementById('totalPh').textContent = totals.physical;
  document.getElementById('totalMe').textContent = totals.mental;
  document.getElementById('totalTa').textContent = totals.tactical;

  // missions
  const missions = squadronData.data.filter(x => x.kind === 'mission');
  const results = missions.map(m => calcMission(m, totals));
  renderMissions(missions, results);
}

function calcMission(m, totals) {
  const rv = m.requireVariants;
  const variantCount = rv.physical.length;
  let bestRate = -1;
  let bestVariant = 0;
  let bestReqs = null;

  for (let v = 0; v < variantCount; v++) {
    const reqs = {
      physical: rv.physical[v],
      mental:   rv.mental[v],
      tactical: rv.tactical[v],
    };
    const phMet = totals.physical >= reqs.physical;
    const meMet = totals.mental   >= reqs.mental;
    const taMet = totals.tactical >= reqs.tactical;
    const metCount = [phMet, meMet, taMet].filter(Boolean).length;
    const allMet = metCount === 3;

    const rate = m.success.base
      + metCount * m.success.perStatMet
      + (allMet ? m.success.allMet : 0);

    if (rate > bestRate) {
      bestRate = rate;
      bestVariant = v;
      bestReqs = { ...reqs, phMet, meMet, taMet };
    }
  }

  return { rate: Math.min(100, bestRate), variant: bestVariant, reqs: bestReqs };
}

// ── RENDER MISSIONS ───────────────────────────────────────────────────────────
const TYPE_LABEL = { trainee: '簡單', routine: '例行', priority: '優先' };

function setFilter(f) {
  filter = f;
  ['filterAll','filterCan','filter100'].forEach(id =>
    document.getElementById(id).classList.remove('active'));
  document.getElementById(f === 'all' ? 'filterAll' : f === 'possible' ? 'filterCan' : 'filter100').classList.add('active');
  if (squadronData) recalc();
}

function renderMissions(missions, results) {
  const list = document.getElementById('missionList');

  const pairs = missions.map((m, i) => ({ m, r: results[i] }));
  // sort: 100% first, then by rate desc, then by level
  pairs.sort((a, b) => b.r.rate - a.r.rate || a.m.level - b.m.level);

  const filtered = pairs.filter(({ r }) => {
    if (filter === '100') return r.rate >= 100;
    if (filter === 'possible') return r.rate > 0;
    return true;
  });

  list.innerHTML = filtered.map(({ m, r }) => {
    const rateClass = r.rate >= 100 ? 'rate-100' : r.rate >= 60 ? 'rate-hi' : r.rate > 0 ? 'rate-lo' : 'rate-no';
    const cardClass = r.rate >= 100 ? 'can-100' : r.rate > 0 ? 'can-partial' : 'impossible';
    const typeClass = `type-${m.type}`;
    const flagIcon = m.flagged ? '⚑ ' : '';

    return `
      <div class="mission-card ${cardClass}">
        <div class="mission-info">
          <div class="mission-name">${flagIcon}${m.name}</div>
          <div class="mission-meta">
            <span class="mission-type ${typeClass}">${TYPE_LABEL[m.type] || m.type}</span>
            <span>Lv ${m.level}</span>
          </div>
        </div>
        <div class="mission-reqs">
          ${['physical','mental','tactical'].map((stat, si) => {
            const labels = ['體能','精神','戰術'];
            const met = r.reqs[stat === 'physical' ? 'phMet' : stat === 'mental' ? 'meMet' : 'taMet'];
            return `<div class="req-item">
              <span class="req-lbl">${labels[si]}</span>
              <span class="req-val ${met ? 'req-met' : 'req-unmet'}">${r.reqs[stat]}</span>
            </div>`;
          }).join('')}
        </div>
        <div class="mission-rate">
          <div class="rate-val ${rateClass}">${r.rate}%</div>
        </div>
      </div>
    `;
  }).join('');

  if (filtered.length === 0) {
    list.innerHTML = '<div style="color:var(--text-muted);text-align:center;padding:2rem;">無符合條件的任務</div>';
  }
}
</script>
</body>
</html>
