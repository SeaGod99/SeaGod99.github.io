<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="FF14 採集紀錄追蹤 — 查詢採礦工/園藝工採集點、座標、限時開放時間，追蹤已採紀錄">
  <title>採集紀錄追蹤 | 水神的工具箱</title>
  <link rel="stylesheet" href="../../assets/css/common.css">
  <link rel="stylesheet" href="../../assets/css/tool-header.css">
  <style>
    /* 採集紀錄頁專屬樣式；通用版面（進度條／工具列／篩選／分頁／頁尾）見 assets/css/common.css，
       控制面由 assets/js/collection-tracker.js 渲染。
       本頁採「子項目模式」：一張卡＝一個採集點，真正追蹤的是點上的每件產物。 */
    :root {
      --accent:   #fb923c;                 /* 橘（採集）*/
      --accent-2: #c8a96e;                 /* 進度條尾色：金 */
      --glow-1:   rgba(251,146,60,0.05);
      --glow-2:   rgba(74,222,128,0.04);
      --orange:     #fb923c;
      --orange-dim: rgba(251,146,60,0.12);
    }

    /* 採集點是整列橫幅，不套 .col-grid 的格線 */
    .gl-nodes { display: flex; flex-direction: column; gap: 8px; }

    .node-card {
      background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-md);
      padding: 13px 17px;
      cursor: default;                       /* 卡片本身不是可點的按鈕，要點的是產物標籤 */
      display: block;
      transition: var(--transition);
      content-visibility: auto; contain-intrinsic-size: auto 140px;
    }
    .node-card:hover { border-color: var(--border-hover); background: var(--bg-card-hover); }
    /* 引擎在「該採集點產物全採」時掛 .owned */
    .node-card.owned { border-color: rgba(74,222,128,0.3); background: rgba(74,222,128,0.03); }
    .node-card.owned::before { content: none; }

    .node-header { display: flex; gap: 13px; align-items: center; flex-wrap: wrap; margin-bottom: 9px; }
    .node-map { font-size: 15px; font-weight: 600; }
    .node-coords { font-size: 13px; color: var(--text-muted); }
    .node-tags { display: flex; gap: 5px; flex-wrap: wrap; }
    .node-time { font-size: 13px; color: var(--gold); }

    .tag-min  { color: var(--orange); border-color: rgba(251,146,60,0.3);  background: var(--orange-dim); }
    .tag-btn  { color: var(--green);  border-color: rgba(74,222,128,0.3);  background: var(--green-dim); }
    .tag-lim  { color: var(--gold);   border-color: rgba(200,169,110,0.3); background: var(--gold-dim); }
    .tag-leg  { color: var(--purple); border-color: rgba(167,139,250,0.3); background: var(--purple-dim); }
    .tag-eph  { color: var(--blue);   border-color: rgba(79,195,247,0.3);  background: var(--blue-dim); }
    .tag-ver  { color: var(--text-secondary); border-color: var(--border); background: var(--raise); }

    /* 產物標籤＝實際追蹤單位 */
    .items-row { display: flex; gap: 9px; flex-wrap: wrap; }
    .item-chip {
      display: inline-flex; align-items: center; gap: 6px;
      background: var(--bg-surface); border: 1px solid var(--border);
      border-radius: 5px; padding: 5px 11px;
      font-size: 13.5px; cursor: pointer; transition: var(--transition);
      user-select: none;
    }
    .item-chip:hover { border-color: var(--gold-light); }
    .item-chip:focus-visible { outline: 2px solid var(--gold); outline-offset: 1px; }
    .item-chip.owned { background: var(--green-dim); border-color: rgba(74,222,128,0.3); color: var(--green); }
    .item-chip.owned::before { content: '✓ '; font-size: 12px; }

    /* ── 檢視切換與地圖檢視 ── */
    .gl-viewbar { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; margin: 0 0 14px; }
    .view-toggle { display: flex; border: 1px solid var(--border); border-radius: 5px; overflow: hidden; }
    .view-toggle button {
      font-size: 13px; padding: 6px 13px; cursor: pointer; border: none; font-family: inherit;
      background: var(--bg-surface); color: var(--text-secondary); transition: var(--transition);
    }
    .view-toggle button.active { background: var(--gold-dim); color: var(--gold); }

    .map-view { padding: 0 0 2rem; }
    .map-bar { display: flex; gap: 13px; align-items: center; flex-wrap: wrap; margin-bottom: 13px; }
    .map-canvas {
      position: relative; width: 100%; max-width: 720px; margin: 0 auto;
      aspect-ratio: 1 / 1; background: var(--bg-card); border: 1px solid var(--border);
      border-radius: var(--radius-md); overflow: hidden;
    }
    .map-canvas img { width: 100%; height: 100%; object-fit: cover; display: block; user-select: none; }
    .map-empty { display: flex; align-items: center; justify-content: center; height: 100%; color: var(--text-muted); font-size: 15px; text-align: center; padding: 1rem; }
    .map-dot {
      position: absolute; width: 16px; height: 16px; border-radius: 50%;
      transform: translate(-50%, -50%); cursor: pointer; border: 2px solid rgba(0,0,0,0.55);
      box-shadow: 0 0 0 1px rgba(255,255,255,0.25); transition: transform 0.1s;
    }
    .map-dot:hover, .map-dot.sel { transform: translate(-50%, -50%) scale(1.45); z-index: 5; }
    .map-dot.job-min { background: var(--orange); }
    .map-dot.job-btn { background: var(--green); }
    .map-dot.done    { background: var(--gold); box-shadow: 0 0 0 2px rgba(200,169,110,0.6); }
    .map-legend { font-size: 12.5px; color: var(--text-muted); display: flex; gap: 16px; flex-wrap: wrap; margin-top: 9px; }
    .map-legend span { display: inline-flex; align-items: center; gap: 5px; }
    .map-legend i { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }
    .map-node-info { max-width: 720px; margin: 13px auto 0; }
    .map-node-info:empty { display: none; }
  </style>
  <script src="../../assets/js/patch-gate.js"></script>
  <script src="../../assets/js/collection-tracker.js"></script>
  <link rel="stylesheet" href="../../assets/css/theme.css">
  <script src="../../assets/js/theme.js"></script>
</head>
<body>

<div class="container">

  <div class="tool-header">
    <h1 class="tool-title">⛏️ 採集紀錄追蹤</h1>
    <p class="tool-subtitle">採礦工／園藝工採集節點一覽，勾選追蹤已採物品進度</p>
    <div class="header-divider"></div>
  </div>

  <!-- 控制面（進度／工具列／篩選／採集點列表／分頁）由 collection-tracker.js 渲染 -->
  <div id="ct-root"></div>

  <div class="gl-viewbar">
    <div class="view-toggle" id="viewToggle">
      <button type="button" id="vList" class="active">☰ 清單</button>
      <button type="button" id="vMap">🗺️ 地圖</button>
    </div>
  </div>

  <div class="map-view" id="mapView" style="display:none">
    <div class="map-bar">
      <select class="sort-select" id="mapSelect"></select>
    </div>
    <div class="map-canvas" id="mapCanvas"></div>
    <div class="map-legend">
      <span><i style="background:var(--orange)"></i>採礦工</span>
      <span><i style="background:var(--green)"></i>園藝工</span>
      <span><i style="background:var(--gold)"></i>已全採</span>
      <span>點圈可勾選追蹤</span>
    </div>
    <div class="map-node-info" id="mapNodeInfo"></div>
  </div>

</div>

<footer class="page-footer">
  <div class="container">
    <p class="footer-text">
      <a href="../../">水神的工具箱</a> · 資料來源：遊戲本體、<a href="https://ffxivteamcraft.com" target="_blank">Teamcraft</a>
    </p>
    <p class="footer-text" style="margin-top:4px">
      FINAL FANTASY XIV © SQUARE ENIX　此為玩家自製非官方工具
    </p>
  </div>
</footer>

<script>
(function () {
  var esc = CollectionTracker.esc;
  var $ = function (id) { return document.getElementById(id); };

  // 基礎元素素材（六元素 × 碎晶/水晶/晶簇 = id 2–19）：每個採集點都會掉，屬雜訊，
  // 不在採集點顯示、也不計入進度（與 scripts/patch-gathering-version.mjs 的 CRYSTAL 一致）。
  var CRYSTAL_IDS = new Set();
  for (var ci = 2; ci <= 19; ci++) CRYSTAL_IDS.add(ci);

  var itemMap = {};       // itemId -> 繁中名
  var mapMap = {};        // mapId  -> 地名
  var mapMeta = {};       // mapId  -> maps.json 條目
  var tracker = null;
  var viewMode = 'list';
  var currentMapId = null;
  var selectedNodeId = null;
  var lastList = [];      // 最近一次篩選結果（地圖檢視吃它）

  // 遊戲座標 → 底圖 0..1 比例（FFXIV 標準式，靠 Map sheet 的 sizeFactor）
  var clamp01 = function (v) { return Math.max(0, Math.min(1, v)); };
  var coordFrac = function (c, sf) { return ((c - 1) * (sf / 100)) / 41; };

  function allItemsOf(n) { return (n.items || []).concat(n.hiddenItems || []); }
  function nodeStatus(n) {
    var all = allItemsOf(n);
    if (!all.length) return 'empty';
    var cnt = all.filter(function (i) { return tracker.owned.has(i); }).length;
    if (cnt === 0) return 'none';
    if (cnt === all.length) return 'done';
    return 'partial';
  }

  function nodeCardHTML(n) {
    var mapName = mapMap[n.coords && n.coords.mapId] || '未知地區';
    var x = n.coords && n.coords.x != null ? n.coords.x.toFixed(1) : null;
    var y = n.coords && n.coords.y != null ? n.coords.y.toFixed(1) : null;
    var visible = n.items || [];
    var spawnStr = (n.spawns && n.spawns.length)
      ? n.spawns.map(function (h) { return h + ':00'; }).join('、') + ' ET（' + (n.duration / 60) + 'h）'
      : '';
    var chips = allItemsOf(n).map(function (id) {
      var hidden = visible.indexOf(id) < 0 ? ' 🔒' : '';
      return '<span class="item-chip' + (tracker.owned.has(id) ? ' owned' : '') + '" data-iid="' + id +
        '" tabindex="0" role="button" aria-pressed="' + (tracker.owned.has(id) ? 'true' : 'false') + '">' +
        esc(itemMap[id]) + hidden + '</span>';
    }).join('');

    return '' +
      '<div class="node-header">' +
        '<span class="node-map">' + esc(mapName) + '</span>' +
        (x ? '<span class="node-coords">(' + x + ', ' + y + ')</span>' : '') +
        '<div class="node-tags">' +
          '<span class="tag ' + (n.job === '採礦工' ? 'tag-min' : 'tag-btn') + '">' + esc(n.job) + ' Lv' + esc(n.level) + '</span>' +
          (n.legendary ? '<span class="tag tag-leg">傳說</span>' : '') +
          (n.ephemeral ? '<span class="tag tag-eph">短暫</span>' : '') +
          (n.limited && !n.legendary && !n.ephemeral ? '<span class="tag tag-lim">限時</span>' : '') +
          (n.patch ? '<span class="tag tag-ver">v' + esc(n.patch) + '</span>' : '') +
        '</div>' +
        (spawnStr ? '<span class="node-time">⏰ ' + esc(spawnStr) + '</span>' : '') +
      '</div>' +
      '<div class="items-row">' + chips + '</div>';
  }

  // 產物標籤的點擊：清單卡片與地圖詳情卡共用（都用 .item-chip[data-iid]）
  function wireChips(root) {
    Array.prototype.forEach.call(root.querySelectorAll('.item-chip'), function (chip) {
      function fire() { tracker.toggleKey(+chip.dataset.iid); }
      chip.addEventListener('click', fire);
      chip.addEventListener('keydown', function (ev) {
        if (ev.key === 'Enter' || ev.key === ' ') { ev.preventDefault(); fire(); }
      });
    });
  }

  /* ── 地圖檢視 ── */
  function setView(mode) {
    viewMode = mode;
    $('vList').classList.toggle('active', mode === 'list');
    $('vMap').classList.toggle('active', mode === 'map');
    var grid = document.getElementById('ct-grid');
    var pager = document.getElementById('ct-pagination');
    if (grid) grid.style.display = mode === 'list' ? '' : 'none';
    if (pager) pager.style.display = mode === 'list' ? '' : 'none';
    $('mapView').style.display = mode === 'map' ? '' : 'none';
    if (mode === 'map') renderMap();
  }

  function renderMap() {
    // 依 mapId 分組（排除 mapId=0 / 無 maps.json 對應的特殊採集點）
    var byMap = new Map();
    lastList.forEach(function (n) {
      var mid = n.coords && n.coords.mapId;
      if (!mid || !mapMeta[mid]) return;
      if (!byMap.has(mid)) byMap.set(mid, []);
      byMap.get(mid).push(n);
    });
    var opts = Array.from(byMap.entries()).sort(function (a, b) { return b[1].length - a[1].length; });
    var sel = $('mapSelect');

    if (!opts.length) {
      sel.innerHTML = '<option>（目前篩選無可定位採集點）</option>';
      $('mapCanvas').innerHTML = '<div class="map-empty">目前篩選沒有可定位在地圖上的採集點。</div>';
      $('mapNodeInfo').innerHTML = '';
      return;
    }
    if (currentMapId == null || !byMap.has(currentMapId)) currentMapId = opts[0][0];
    sel.innerHTML = opts.map(function (e) {
      return '<option value="' + e[0] + '"' + (e[0] === currentMapId ? ' selected' : '') + '>' +
        esc(mapMap[e[0]]) + '（' + e[1].length + '）</option>';
    }).join('');
    plotMap(currentMapId, byMap.get(currentMapId));
  }

  function plotMap(mid, nodeArr) {
    var m = mapMeta[mid];
    var sf = m.sizeFactor || 100;
    var dots = nodeArr.map(function (n) {
      var fx = clamp01(coordFrac(n.coords.x, sf)) * 100;
      var fy = clamp01(coordFrac(n.coords.y, sf)) * 100;
      var st = nodeStatus(n);
      var cls = st === 'done' ? 'done' : (n.job === '採礦工' ? 'job-min' : 'job-btn');
      return '<div class="map-dot ' + cls + (n.id === selectedNodeId ? ' sel' : '') + '" data-nid="' + n.id + '" ' +
        'style="left:' + fx.toFixed(2) + '%;top:' + fy.toFixed(2) + '%" ' +
        'title="' + esc(n.job + ' Lv' + n.level + ' (' + n.coords.x.toFixed(1) + ', ' + n.coords.y.toFixed(1) + ')') + '"></div>';
    }).join('');

    $('mapCanvas').innerHTML =
      '<img src="../..' + esc(m.image.local) + '" alt="' + esc(mapMap[mid]) + '" data-mid="' + mid + '">' + dots;

    var img = $('mapCanvas').querySelector('img');
    img.addEventListener('error', function () {
      var canvas = img.parentElement;
      img.remove();
      if (!canvas.querySelector('.map-empty')) {
        canvas.insertAdjacentHTML('afterbegin',
          '<div class="map-empty">此地圖底圖尚未下載（' + esc(mapMap[mid]) + '）。<br>' +
          '採集點座標仍可在「清單」檢視查看；於本機執行 <code>node scripts/download-maps.mjs</code> 可補齊底圖。</div>');
      }
    });

    Array.prototype.forEach.call($('mapCanvas').querySelectorAll('.map-dot'), function (d) {
      d.addEventListener('click', function () {
        selectedNodeId = +d.dataset.nid;
        Array.prototype.forEach.call($('mapCanvas').querySelectorAll('.map-dot'), function (o) {
          o.classList.toggle('sel', +o.dataset.nid === selectedNodeId);
        });
        renderMapNodeInfo();
      });
    });

    if (!nodeArr.some(function (n) { return n.id === selectedNodeId; })) selectedNodeId = null;
    renderMapNodeInfo();
  }

  function renderMapNodeInfo() {
    var info = $('mapNodeInfo');
    var n = selectedNodeId == null ? null : lastList.filter(function (x) { return x.id === selectedNodeId; })[0];
    if (!n) { info.innerHTML = ''; return; }
    info.innerHTML = '<div class="node-card' + (nodeStatus(n) === 'done' ? ' owned' : '') + '">' + nodeCardHTML(n) + '</div>';
    wireChips(info);
  }

  /* ── 載入：先備好物品名與地圖，再交給引擎 ── */
  Promise.all([
    fetch('../../data/items-lite.json').then(function (r) { return r.json(); }),
    fetch('../../data/maps.json').then(function (r) { return r.json(); })
  ]).then(function (res) {
    // items-lite 的 data 已是 [[id, name], ...]（1.3MB，完整 items.json 為 10MB，
    // 本頁只需 id→名；兩者 id 集合相同，見 scripts/build-items-lite.mjs）
    res[0].data.forEach(function (p) { itemMap[p[0]] = p[1]; });
    res[1].data.forEach(function (m) { mapMap[m.id] = m.name; mapMeta[m.id] = m; });
    start();
  });

  function start() {
    tracker = CollectionTracker.init({
      dataUrl: '../../data/gathering.json',
      metaUrl: '../../data/_meta.json',
      storageKey: 'ffxiv_gathering_items_owned',   // 沿用既有 key（存的是純數字 itemId）
      snapKey: 'gatherlog',
      schema: 'gathering-log-progress',
      fileBase: 'gathering-log',
      verb: '採集',
      unit: '個採集點',
      noun: '採集點',
      gridClass: 'gl-nodes',
      cardClass: 'node-card',
      pageSize: 40,
      searchPlaceholder: '搜尋物品名稱或地區…',
      // 一張卡＝一個採集點；真正追蹤的單位是點上的產物（同一件產物會出現在多個點，
      // 引擎依 keyOf 去重後才算進度分母）
      subsOf: function (n) { return allItemsOf(n); },
      keyOf: function (itemId) { return itemId; },
      // 物品繁中名以 tw-items 為唯一真實來源：對不到名稱＝台服未開放，直接濾除該產物
      //（見 data/SCHEMA.md 採集點顯示規則）；同時濾除基礎元素水晶/碎晶/晶簇（雜訊）。
      // 產物全被濾掉的採集點整筆不顯示。
      prepare: function (list) {
        var keep = function (i) { return (i in itemMap) && !CRYSTAL_IDS.has(i); };
        return list.map(function (n) {
          var o = {};
          for (var k in n) o[k] = n[k];
          o.items = (n.items || []).filter(keep);
          o.hiddenItems = (n.hiddenItems || []).filter(keep);
          return o;
        }).filter(function (n) { return n.items.length + n.hiddenItems.length > 0; });
      },
      include: function () { return true; },   // 產物層級的台服過濾已在 prepare 做掉
      searchText: function (n) {
        var mapName = (mapMap[n.coords && n.coords.mapId] || '');
        var names = allItemsOf(n).map(function (i) { return itemMap[i] || ''; }).join(' ');
        return (mapName + ' ' + names).toLowerCase();
      },
      nameOf: function (n) { return mapMap[n.coords && n.coords.mapId] || ''; },
      sorts: ['name', 'patch-desc', 'patch-asc',
        { value: 'level-asc', label: '等級低→高', cmp: function (a, b) { return (a.level || 0) - (b.level || 0); } },
        { value: 'level-desc', label: '等級高→低', cmp: function (a, b) { return (b.level || 0) - (a.level || 0); } }],
      filters: [
        {
          id: 'job', label: '職業',
          options: function () { return [{ value: '採礦工', label: '⛏ 採礦工' }, { value: '園藝工', label: '🌿 園藝工' }]; },
          match: function (n, v) { return n.job === v; }
        },
        {
          id: 'type', label: '節點種類',
          options: function () {
            return [{ value: 'limited', label: '限時節點' }, { value: 'legendary', label: '傳說節點' }, { value: 'ephemeral', label: '短暫節點' }];
          },
          match: function (n, v) { return !!n[v]; }
        },
        {
          id: 'status', label: '採集進度',
          options: function () {
            return [{ value: 'done', label: '全採完' }, { value: 'partial', label: '部分未採' }, { value: 'none', label: '全未採' }];
          },
          match: function (n, v) { return nodeStatus(n) === v; }
        },
        { kind: 'patch' }
      ],
      card: nodeCardHTML,
      onCardCreate: function (n, card) { wireChips(card); },
      onRender: function (list) {
        lastList = list;
        if (viewMode === 'map') renderMap();
      }
    });

    $('vList').addEventListener('click', function () { setView('list'); });
    $('vMap').addEventListener('click', function () { setView('map'); });
    $('mapSelect').addEventListener('change', function () {
      currentMapId = +$('mapSelect').value;
      selectedNodeId = null;
      renderMap();
    });
  }
})();
</script>
</body>
</html>
