<!DOCTYPE html>
<html lang="zh-Hant" data-bs-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>幻化配裝圖鑑 | 水神的工具箱</title>
<link rel="stylesheet" href="vendor/bootstrap/bootstrap.min.css">
<script src="curated_outfits.js"></script>
<style>
/* ===== 站內共用設計語彙（同 assets/css/common.css 色票）：映射到 Bootstrap 5 變數 ===== */
:root{
  --bg:#0a0c10; --card-bg:#14181f; --panel-bg:#0f1117; --border:rgba(255,255,255,.07);
  --accent:#c8a96e; --accent-light:#e2c98a; --accent2:#4fc3f7; --text:#e8eaf0; --muted:#8892a4;
  --female:#f472b6; --male:#60a5fa; --unknown:#6b7280;
  --tag-other:#374151;
}
[data-bs-theme="dark"]{
  --bs-body-bg:#0a0c10; --bs-body-color:#e8eaf0;
  --bs-tertiary-bg:#14181f; --bs-secondary-bg:#0f1117;
  --bs-border-color:rgba(255,255,255,.12); --bs-border-color-translucent:rgba(255,255,255,.1);
  --bs-primary:#4fc3f7; --bs-primary-rgb:79,195,247;
  --bs-emphasis-color:#fff; --bs-emphasis-color-rgb:255,255,255;
  --bs-link-color:#4fc3f7; --bs-link-color-rgb:79,195,247;
  --bs-link-hover-color:#8ad8fa;
}
/* 根字級：Bootstrap 全 rem 制，調這裡＝整站等比例放大 */
html{ font-size:17px; }
body{ font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans TC',sans-serif; }
/* 站內共通背景光暈 */
body::before{ content:''; position:fixed; inset:0; pointer-events:none; z-index:-1;
  background:radial-gradient(ellipse 80% 50% at 20% 0%, rgba(200,169,110,.05) 0%, transparent 60%),
             radial-gradient(ellipse 60% 40% at 80% 100%, rgba(79,195,247,.04) 0%, transparent 60%); }

/* ── Navbar ── */
.app-navbar{ background:rgba(15,17,23,.92);
  border-bottom:1px solid var(--border); backdrop-filter:blur(12px); z-index:1030; }
.back-link{ display:inline-flex; align-items:center; gap:6px; font-size:.82rem; white-space:nowrap;
  color:var(--muted); padding:6px 12px; border:1px solid var(--border); border-radius:6px;
  text-decoration:none; transition:all .18s; }
.back-link:hover{ color:var(--accent); border-color:rgba(200,169,110,.4); }
.app-title{ font-size:1.35rem; font-weight:700; margin:0; color:var(--accent-light); }
.app-subtitle{ color:var(--muted); font-size:.85rem; }
.lang-btn.lang-active{ background:var(--accent)!important; border-color:var(--accent)!important; color:#0a0c10!important; }

/* ── Filter bar ── */
.filter-bar{ background:var(--card-bg); border-bottom:1px solid var(--border); }
.filter-group-label{ font-size:.8rem; color:var(--muted); white-space:nowrap;
  background:rgba(255,255,255,.05); border:1px solid var(--border); border-radius:4px; padding:2px 8px; }
.filter-sep{ width:1px; height:20px; background:var(--border); }
.filter-btn{ --bs-btn-padding-y:.28rem; --bs-btn-padding-x:.85rem; --bs-btn-font-size:.875rem; border-radius:20px; }
.filter-btn.active{ background:var(--accent2); border-color:var(--accent2); color:#fff; }
.filter-btn.female-btn.active{ background:var(--female); border-color:var(--female); color:#fff; }
.filter-btn.male-btn.active{ background:var(--male); border-color:var(--male); color:#fff; }
.filter-btn.unk-btn.active,.filter-btn.filter-reset.active{ background:var(--unknown); border-color:var(--unknown); color:#fff; }
.tw-btn.active{ background:#16a34a; border-color:#16a34a; color:#fff; }
.fav-filter.active{ background:#b45309; border-color:#b45309; color:#fff; }
.search-input{ width:240px; border-radius:20px; }
.sort-select{ width:auto; border-radius:20px; }
.src-detail-select{ width:auto; max-width:22rem; border-radius:20px; }

/* ── Cards ── */
.outfit-card{ cursor:pointer; overflow:hidden; background:var(--card-bg);
  transition:transform .2s, box-shadow .2s, border-color .2s; }
.outfit-card:hover{ transform:translateY(-4px); border-color:rgba(200,169,110,.4)!important;
  box-shadow:0 2px 16px rgba(0,0,0,.4); }
.card-img-top{ aspect-ratio:3/4; object-fit:cover; object-position:top; background:var(--panel-bg); }
.card-noimg{ aspect-ratio:3/4; display:flex; align-items:center; justify-content:center;
  color:var(--muted); font-size:.7rem; background:var(--panel-bg); }
.card-name{ font-size:1.1rem; line-height:1.3; }
.star-badge{ position:absolute; top:8px; left:8px; background:var(--accent); color:#000;
  border-radius:50%; width:24px; height:24px; display:flex; align-items:center; justify-content:center;
  font-size:.7rem; font-weight:700; z-index:2; }
.fav-btn{ position:absolute; top:8px; right:8px; z-index:2; width:30px; height:30px; border-radius:50%;
  background:rgba(0,0,0,.5); border:1px solid rgba(255,255,255,.15); color:#9ca3af; line-height:1;
  display:flex; align-items:center; justify-content:center; cursor:pointer; transition:all .2s; }
.fav-btn:hover{ color:#fbbf24; border-color:#fbbf24; }
.fav-btn.faved{ color:#fbbf24; border-color:rgba(251,191,36,.5); background:rgba(251,191,36,.12); }

/* card meta / tags */
.tag-female,.tag-male,.tag-unk,.tag-race{ font-size:.72rem; padding:2px 8px; border-radius:10px; white-space:nowrap; }
.tag-female{ background:rgba(244,114,182,.15); color:var(--female); border:1px solid rgba(244,114,182,.4); }
.tag-male{ background:rgba(96,165,250,.15); color:var(--male); border:1px solid rgba(96,165,250,.4); }
.tag-unk{ background:rgba(107,114,128,.15); color:var(--unknown); border:1px solid rgba(107,114,128,.4); }
.tag-race{ background:rgba(255,255,255,.05); color:var(--muted); border:1px solid var(--border); }
.card-tag{ font-size:.72rem; padding:2px 8px; border-radius:10px; color:#e5e7eb; background:var(--tag-other); }
.badge-healer{background:#065f46}.badge-tank{background:#1e3a5f}.badge-caster{background:#4c1d95}
.badge-melee{background:#7f1d1d}.badge-pranged{background:#713f12}.badge-crafter{background:#1f2937;border:1px solid #4b5563}
.badge-event{background:#16a34a}.badge-pvp{background:#dc2626}.badge-store{background:#d97706}.badge-raid{background:#7c3aed}
.badge-viera{background:#7c3aed}.badge-scrip{background:#0891b2}.badge-gs{background:#ca8a04}

/* ── Modal (Bootstrap base + FF14 skin) ── */
.modal-content{ background:var(--card-bg); border:1px solid var(--border); }
.modal-header,.modal-footer{ background:var(--panel-bg); border-color:var(--border); }
.modal-title{ font-size:1.3rem; font-weight:700; }
.modal-subtitle{ font-size:.88rem; color:var(--muted); margin-top:2px; }
#modal-img-col{ background:var(--panel-bg); display:flex; align-items:flex-start; justify-content:center; padding:20px; }
#modal-img-col img{ width:100%; border-radius:10px; max-height:78vh; object-fit:contain; object-position:top; box-shadow:0 6px 22px rgba(0,0,0,.4); }
#modal-img-col .no-img{ width:100%; height:480px; background:var(--bg); border-radius:10px; display:flex; align-items:center; justify-content:center; color:var(--muted); font-size:.8rem; }
#modal-info-col{ padding:22px 28px; }
@media (min-width:768px){ #modal-img-col{ position:sticky; top:0; align-self:flex-start; } }
/* 詳情：放寬彈窗與欄寬，避免裝備名被擠成一字一行 */
.modal-xl{ --bs-modal-width:1280px; }
#modal-info-col{ overflow-x:auto; }
.equip-table td.item-name{ min-width:7em; }
.equip-table td.src-cell{ min-width:9em; max-width:20em; }
/* 圖片可點擊放大 */
.modal-zoom-img{ cursor:zoom-in; }
.img-lightbox{ position:fixed; inset:0; z-index:2000; background:rgba(0,0,0,.92);
  display:none; align-items:center; justify-content:center; padding:24px; overflow:hidden; touch-action:none; }
.img-lightbox.show{ display:flex; }
.img-lightbox img{ max-width:100%; max-height:100%; object-fit:contain; border-radius:6px;
  box-shadow:0 10px 40px rgba(0,0,0,.6); user-select:none; -webkit-user-drag:none;
  transform-origin:center center; transition:transform .06s ease-out; will-change:transform; cursor:zoom-in; }
.lb-toolbar{ position:fixed; top:14px; right:16px; display:flex; gap:8px; z-index:2001; }
.lb-toolbar button{ width:38px; height:38px; border-radius:8px; border:1px solid rgba(255,255,255,.25);
  background:rgba(0,0,0,.55); color:#fff; font-size:1.05rem; line-height:1; cursor:pointer; transition:background .15s; }
.lb-toolbar button:hover{ background:rgba(255,255,255,.18); }
.lb-hint{ position:fixed; bottom:16px; left:0; right:0; text-align:center; color:#9ca3af; font-size:.8rem; pointer-events:none; }

/* ── Equipment table (custom, themed) ── */
.equip-table{ width:100%; border-collapse:collapse; font-size:.92rem; }
.equip-table th{ background:var(--panel-bg); padding:9px 12px; text-align:left; color:var(--muted);
  font-weight:600; border-bottom:1px solid var(--border); white-space:nowrap; position:sticky; top:0; z-index:2; }
.equip-table td{ padding:11px 14px; border-bottom:1px solid var(--border); vertical-align:top; }
.equip-table tr:last-child td{ border-bottom:none; }
.equip-table tr:hover td{ background:rgba(255,255,255,.035); }
.slot-badge{ display:inline-block; min-width:3.2em; padding:2px 8px; border-radius:4px; font-size:.78rem;
  font-weight:600; text-align:center; background:var(--panel-bg); color:var(--accent); white-space:nowrap; }
.item-name{ font-weight:600; }
.item-en{ font-size:.78rem; color:var(--muted); margin-top:2px; }
.item-src{ font-size:.74rem; color:var(--accent2); margin-top:2px; }
.unconfirmed{ color:#f59e0b; }
.item-link{ cursor:pointer; border-bottom:1px dotted var(--muted); }
.item-link:hover{ color:var(--accent2); border-bottom-color:var(--accent2); }
.dye-cell{ white-space:nowrap; }
.dye-dash{ color:var(--muted); }
.dye-dot{ display:inline-block; width:11px; height:11px; border-radius:50%; border:1px solid rgba(255,255,255,.35); vertical-align:-1px; margin-right:4px; }
.mirapri-dye-line{ margin-top:10px; font-size:.85rem; color:var(--muted); display:flex; flex-wrap:wrap; gap:4px 10px; align-items:center; }
.mirapri-dye-line .dye-cell{ color:var(--text); }
.modal-note{ background:var(--panel-bg); border-left:3px solid var(--accent); padding:8px 14px;
  border-radius:0 6px 6px 0; font-size:.88rem; color:var(--muted); margin-bottom:16px; }
.patch-tag{ display:inline-block; background:#1e293b; color:#94a3b8; border:1px solid #334155;
  border-radius:4px; font-size:.78rem; font-weight:600; padding:1px 6px; white-space:nowrap; }
.patch-cell{ text-align:center; white-space:nowrap; }
.source-tag{ display:inline-flex; align-items:center; gap:4px; padding:3px 9px; border-radius:12px;
  font-size:.78rem; font-weight:500; white-space:normal; margin:1px 0; }
.src-raid{ background:rgba(124,58,237,.25); color:#a78bfa; border:1px solid rgba(124,58,237,.4); }
.src-pvp{ background:rgba(220,38,38,.2); color:#f87171; border:1px solid rgba(220,38,38,.4); }
.src-store{ background:rgba(217,119,6,.2); color:#fbbf24; border:1px solid rgba(217,119,6,.4); }
.src-event{ background:rgba(22,163,74,.2); color:#4ade80; border:1px solid rgba(22,163,74,.4); }
.src-craft{ background:rgba(37,99,235,.2); color:#60a5fa; border:1px solid rgba(37,99,235,.4); }
.src-scrip{ background:rgba(8,145,178,.2); color:#22d3ee; border:1px solid rgba(8,145,178,.4); }
.src-gs{ background:rgba(202,138,4,.2); color:#fde047; border:1px solid rgba(202,138,4,.4); }
.src-npc{ background:rgba(75,85,99,.3); color:#9ca3af; border:1px solid rgba(75,85,99,.5); }
.src-ceremony{ background:rgba(219,39,119,.2); color:#f472b6; border:1px solid rgba(219,39,119,.4); }
.src-other{ background:rgba(55,65,81,.3); color:#9ca3af; border:1px solid rgba(55,65,81,.5); }
.restrict-level,.restrict-job,.restrict-gender,.restrict-race{ display:inline-block; margin:0 4px 4px 0;
  padding:2px 8px; border-radius:10px; font-size:.7rem; background:var(--panel-bg);
  border:1px solid var(--border); color:var(--text); white-space:nowrap; }
.restrict-level{ border-color:#4b5563; }
.restrict-job{ border-color:#2563eb; color:var(--accent2); }
.restrict-gender{ border-color:#db2777; color:#f472b6; }
.restrict-race{ border-color:#7c3aed; color:#a78bfa; }

/* ── Mobile: equipment table → stacked cards ── */
@media (max-width:640px){
  #modal-img-col{ padding:14px; }
  #modal-info-col{ padding:16px 14px; }
  .equip-table thead{ display:none; }
  .equip-table,.equip-table tbody{ display:block; width:100%; }
  .equip-table tr{ display:block; border:1px solid var(--border); border-radius:10px;
    margin-bottom:10px; padding:8px 12px 10px; background:rgba(255,255,255,.02); }
  .equip-table tr:hover td{ background:none; }
  .equip-table td{ display:flex; gap:12px; justify-content:space-between; align-items:baseline; border:none; padding:5px 0; }
  .equip-table td::before{ content:attr(data-label); flex:0 0 auto; color:var(--muted); font-size:.7rem; font-weight:600; }
  .equip-table td:empty{ display:none; }
  .equip-table td.dye-cell{ white-space:normal; text-align:right; }
  .equip-table td.slot-cell{ display:block; padding:0 0 4px; }
  .equip-table td.slot-cell::before{ content:none; }
  .equip-table td.item-name{ display:block; font-size:.96rem; padding:2px 0 6px; border-bottom:1px solid var(--border); margin-bottom:4px; }
  .equip-table td.item-name::before{ content:none; }
}

/* ── 官方套裝分頁 ── */
.view-btn.view-active{ background:var(--accent2)!important; border-color:var(--accent2)!important; color:#fff!important; }
.set-icons{ min-height:120px; background:var(--panel-bg); display:flex; flex-wrap:wrap; gap:6px;
  align-items:center; justify-content:center; padding:14px 10px; }
.set-photo-note{ position:absolute; left:8px; bottom:8px; z-index:2; font-size:.68rem;
  background:rgba(0,0,0,.62); color:#d1d5db; border:1px solid rgba(255,255,255,.18);
  border-radius:10px; padding:2px 8px; pointer-events:none; max-width:85%; white-space:nowrap;
  overflow:hidden; text-overflow:ellipsis; }
.set-card-imgwrap{ position:relative; }
.set-icons img{ width:44px; height:44px; border-radius:6px; border:1px solid var(--border); background:#0a0d12; }
.set-modal-icons img{ width:40px; height:40px; border-radius:6px; border:1px solid var(--border); background:#0a0d12; vertical-align:middle; }
.mini-chips{ display:flex; flex-wrap:wrap; gap:4px; margin-top:4px; }
.mini-chip{ display:inline-block; font-size:.68rem; padding:1px 7px; border-radius:9px;
  background:var(--panel-bg); border:1px solid var(--border); color:var(--muted); white-space:nowrap; }
.chip-dye{ color:#c084fc; border-color:rgba(192,132,252,.4); }
.chip-nodye{ color:#6b7280; }
.chip-mb{ color:#4ade80; border-color:rgba(74,222,128,.35); }
.chip-set{ color:var(--accent2); border-color:rgba(110,159,212,.4); cursor:pointer; }
.chip-set:hover{ background:rgba(110,159,212,.15); }
.zh-missing{ color:#f59e0b; font-size:.68rem; border:1px solid rgba(245,158,11,.4); border-radius:9px; padding:1px 7px; white-space:nowrap; }
.empty-state{ text-align:center; color:var(--muted); padding:60px 20px; font-size:.95rem; }

/* ── 站內共用頁尾 ── */
.page-footer{ border-top:1px solid var(--border); padding:24px 16px 32px; text-align:center; margin-top:48px; }
.page-footer p{ font-size:.78rem; color:var(--muted); margin:0; }
.page-footer p + p{ margin-top:4px; }
.page-footer a{ color:var(--muted); text-decoration:none; transition:color .18s; }
.page-footer a:hover{ color:var(--accent); }
::-webkit-scrollbar{ width:8px; height:8px; }
::-webkit-scrollbar-track{ background:var(--bg); }
::-webkit-scrollbar-thumb{ background:var(--border); border-radius:4px; }
</style>
</head>
<body>

<!-- ── Header / Navbar ── -->
<nav class="app-navbar sticky-top px-3 px-md-4 py-3">
  <div class="d-flex align-items-center justify-content-between flex-wrap gap-2">
    <div class="d-flex align-items-center gap-3 flex-wrap">
      <a href="../../" class="back-link">← 水神的工具箱</a>
      <div>
        <h1 class="app-title" id="site-title">👘 幻化配裝圖鑑</h1>
        <p class="app-subtitle mb-0" id="site-subtitle"></p>
      </div>
    </div>
    <div class="d-flex align-items-center gap-2 flex-wrap">
      <div class="btn-group" role="group" aria-label="view">
        <button class="btn btn-sm btn-outline-light view-btn view-active" id="view-outfits-btn"
                onclick="setView('outfits')" data-zh="👗 配裝" data-en="👗 Outfits">👗 配裝</button>
        <button class="btn btn-sm btn-outline-light view-btn" id="view-sets-btn"
                onclick="setView('sets')" data-zh="📖 官方套裝" data-en="📖 Gear Sets">📖 官方套裝</button>
      </div>
      <div class="btn-group" role="group" aria-label="language">
        <button class="btn btn-sm btn-outline-light lang-btn lang-active" onclick="setLang('zh')">繁中</button>
        <button class="btn btn-sm btn-outline-light lang-btn" onclick="setLang('en')">EN</button>
      </div>
    </div>
  </div>
</nav>

<!-- ── 統一篩選列 ── -->
<div class="filter-bar px-3 px-md-4 py-3" id="filter-bar">
  <div class="d-flex flex-wrap align-items-center gap-2 mb-2" id="row-gender">
    <span class="filter-group-label">性別</span>
    <button class="btn btn-sm btn-outline-secondary filter-btn filter-reset active" data-mf="gender" data-val="">全部</button>
    <button class="btn btn-sm btn-outline-secondary filter-btn female-btn" data-mf="gender" data-val="female">👧 女性</button>
    <button class="btn btn-sm btn-outline-secondary filter-btn male-btn"   data-mf="gender" data-val="male">👦 男性</button>
    <button class="btn btn-sm btn-outline-secondary filter-btn unk-btn"    data-mf="gender" data-val="unknown">❓ 未指定</button>
  </div>
  <div class="d-flex flex-wrap align-items-center gap-2 mb-2" id="row-race">
    <span class="filter-group-label">種族</span>
    <button class="btn btn-sm btn-outline-secondary filter-btn filter-reset active" data-mf="race" data-val="">全部</button>
    <button class="btn btn-sm btn-outline-secondary filter-btn" data-mf="race" data-val="hyur"     data-zh="人族"        data-en="Hyur">人族</button>
    <button class="btn btn-sm btn-outline-secondary filter-btn" data-mf="race" data-val="elezen"   data-zh="精靈族"      data-en="Elezen">精靈族</button>
    <button class="btn btn-sm btn-outline-secondary filter-btn" data-mf="race" data-val="lalafell" data-zh="拉拉菲爾族"  data-en="Lalafell">拉拉菲爾族</button>
    <button class="btn btn-sm btn-outline-secondary filter-btn" data-mf="race" data-val="miqote"   data-zh="貓魅族"      data-en="Miqo'te">貓魅族</button>
    <button class="btn btn-sm btn-outline-secondary filter-btn" data-mf="race" data-val="roegadyn" data-zh="魯加族"      data-en="Roegadyn">魯加族</button>
    <button class="btn btn-sm btn-outline-secondary filter-btn" data-mf="race" data-val="aura"     data-zh="敖龍族"      data-en="Au Ra">敖龍族</button>
    <button class="btn btn-sm btn-outline-secondary filter-btn" data-mf="race" data-val="hrothgar" data-zh="硌獅族"      data-en="Hrothgar">硌獅族</button>
    <button class="btn btn-sm btn-outline-secondary filter-btn" data-mf="race" data-val="viera"    data-zh="維埃拉族"    data-en="Viera">維埃拉族</button>
  </div>
  <div class="d-flex flex-wrap align-items-center gap-2 mb-2">
    <span class="filter-group-label" data-zh="取得方式" data-en="Source">取得方式</span>
    <button class="btn btn-sm btn-outline-secondary filter-btn" data-filter="raid"    data-group="src" data-zh="🗡️ 副本"     data-en="🗡️ Duties">🗡️ 副本</button>
    <button class="btn btn-sm btn-outline-secondary filter-btn" data-filter="quest"   data-group="src" data-zh="📋 任務"     data-en="📋 Quests">📋 任務</button>
    <button class="btn btn-sm btn-outline-secondary filter-btn" data-filter="npc"     data-group="src" data-zh="🛒 商店"     data-en="🛒 Shops">🛒 商店</button>
    <button class="btn btn-sm btn-outline-secondary filter-btn" data-filter="token"   data-group="src" data-zh="🪙 代幣兌換" data-en="🪙 Tokens">🪙 代幣兌換</button>

function dyeHtml(name) {
  if (!name || name === "—") return `<span class="dye-dash">—</span>`;
  const c = DYE_COLORS[name];
  const dot = c ? `<span class="dye-dot" style="background:${c}"></span>` : "";
  return `<span class="dye-cell">${dot}${esc(name)}</span>`;
}

// 縮圖路徑（配裝圖片/x.jpe → 配裝圖片/縮圖/x.jpe.jpg）
// 官方套裝 wiki 照本身就是 640px 縮圖，直接用原檔
function thumbOf(img) {
  if (!img || !img.startsWith("配裝圖片/")) return img;
  if (img.startsWith("配裝圖片/官方套裝/")) return img;
  const rest = img.slice("配裝圖片/".length);
  return "配裝圖片/縮圖/" + (rest.toLowerCase().endsWith(".jpg") ? rest : rest + ".jpg");
}

// 彈窗圖片：原圖優先，404 時自動改用縮圖
function modalImg(img, alt) {
  if (!img) return '<div class="no-img">No Image</div>';
  return `<img class="modal-zoom-img" src="${esc(img)}" alt="${esc(alt)}" title="點擊放大" onclick="openLightbox(this.src)" style="width:100%;border-radius:8px;display:block" onerror="if(this.src.indexOf('縮圖')===-1){this.src='${esc(thumbOf(img))}';}else{this.parentElement.innerHTML='<div class=\\'no-img\\'>No Image</div>';}">`;
}

// 圖片放大（lightbox）＋ 縮放／平移
let lbScale = 1, lbX = 0, lbY = 0, lbDrag = false, lbSX = 0, lbSY = 0;
function lbApply() {
  const im = document.getElementById("img-lightbox-img");
  im.style.transform = `translate(${lbX}px, ${lbY}px) scale(${lbScale})`;
  im.style.cursor = lbScale > 1 ? "grab" : "zoom-in";
}
function lbReset() { lbScale = 1; lbX = 0; lbY = 0; lbApply(); }
function lbZoom(dir) {
  const f = dir > 0 ? 1.25 : 0.8;
  lbScale = Math.min(6, Math.max(1, lbScale * f));
  if (lbScale === 1) { lbX = 0; lbY = 0; }
  lbApply();
}
function openLightbox(src) {
  if (!src) return;
  document.getElementById("img-lightbox-img").src = src;
  lbReset();
  document.getElementById("img-lightbox").classList.add("show");
}
function closeLightbox() {
  document.getElementById("img-lightbox").classList.remove("show");
}
function lbBackdrop(ev) {
  if (ev.target === document.getElementById("img-lightbox")) closeLightbox();
}

// 徽章 chips（可染/可交易/所屬套裝）——建置期已把 iid/dye/mb 蓋進裝備
function badgeChips(p, withSet) {
  if (p.iid === undefined && p.id === undefined) return "";
  const iid = p.iid !== undefined ? p.iid : p.id;
  const chips = [];
  if (p.dye !== undefined)
    chips.push(p.dye > 0
      ? `<span class="mini-chip chip-dye">🎨×${p.dye}</span>`
      : `<span class="mini-chip chip-nodye">${currentLang === "en" ? "no dye" : "不可染"}</span>`);
  if (p.mb) chips.push(`<span class="mini-chip chip-mb">${currentLang === "en" ? "tradable" : "可交易"}</span>`);
  if (withSet) {
    const s = ITEM_SETS_BY_ID.get(Number(iid)) ||
              ITEM_SETS_BY_NAME.get(p.zh || "") || ITEM_SETS_BY_NAME.get(p.ja || p.name || "");
    if (s) chips.push(`<span class="mini-chip chip-set" title="查看官方套裝"
      onclick="event.stopPropagation();viewSet('${s.id}')">📖 ${esc(setDisplayName(s))}</span>`);
  }
  return chips.length ? `<div class="mini-chips">${chips.join("")}</div>` : "";
}

function setDisplayName(s) {
  return (currentLang === "en" ? (s.name_en || s.name_ja) : (s.name_zh || s.name_ja || s.name_en)) || s.id;
}
function setVisibleIcons(s) {
  const VIS = ["頭部", "上身", "手部", "腿部", "腳部"];
  return s.pieces.filter(p => VIS.includes(p.slot) && p.icon);
}

}

}

  "採礦工":"MIN","採礦師":"MIN","採伐工":"BTN","園藝師":"BTN","漁夫":"FSH","捕魚人":"FSH"
};
// 單件 job 欄位（繁中群組／單一職業／工匠，或 mirapri 的英文代碼）→ 職業代碼集合。
// 無法判定（空／未知）回傳 null＝不設限，避免資料缺漏造成誤判。
function jobCodes(raw){
  const s = (raw||"").replace(/[Ll][Vv]\.?\s*[\d?]+/g,"").trim();
  if(!s || s==="(none)") return null;
  const out = new Set();
  s.split(/[、,，\/\s]+/).forEach(tok=>{
    tok = tok.trim(); if(!tok) return;
    if(tok==="待確認" || tok==="—") return;            // 佔位字＝資料未填，不當成職業限制
    if(JOB_CODES[tok]) JOB_CODES[tok].split(" ").forEach(c=>out.add(c));
    else if(/^[A-Z]{2,3}$/.test(tok)) out.add(tok);   // mirapri 英文職業代碼
    else out.add("?"+tok);                             // 未知工匠等 → 不透明 token（同名才相容）
  });
  return out.size ? out : null;
}
// 需存在單一職業可同時穿戴整套（所有件的職業代碼交集非空）＝繁中版可實際幻化
function jobCompatOK(ps){
  let compat = null;
  for(const p of ps){
    const s = jobCodes(p.job);
    if(!s) continue;
    compat = compat===null ? s : new Set([...compat].filter(x=>s.has(x)));
  }
  return compat===null || compat.size>0;
}

// 整套沒有任何職業限制＝每件都是「全職業」（job 空白＝資料未填，不當限制但也不能單獨成立）
function isAllJob(ps) {
  const jobs = ps.map(p => (p.job || "").trim());
  return jobs.some(j => j === ALL_JOB) && jobs.every(j => j === "" || j === ALL_JOB);
}

function piecesOf(e) {
  const arr = e.type === "mirapri" ? (e.equipments || []) : (e.pieces || []);
  return arr.filter(p => p && typeof p !== "string");
}

// 為每套計算：tags（職業＋取得方式）、tw（繁中版全件可得）、maxPatch（排序用）
function annotate(e) {
  const ps = piecesOf(e);
  if (!e.tags || !e.tags.length) {
    const tags = new Set();
    ps.forEach(p => {
      const job = p.job || "";
      for (const [tag, jobs] of Object.entries(JOB_TAG_MAP))
        if (jobs.some(j => job.includes(j))) tags.add(tag);
      if (ST_TAG_SET.has(p.st)) tags.add(p.st);
    });
    if (isAllJob(ps)) tags.add("alljob");
    e.tags = [...tags];
  }
  e.tw = ps.length > 0 && ps.every(p => (p.zh || "").trim() !== "") && jobCompatOK(ps);
  e.maxPatch = ps.reduce((mx, p) => {
    const v = parseFloat(p.patch); return isNaN(v) ? mx : Math.max(mx, v);
  }, 0);
  return e;
}

function loadMirapri() {
  const s = document.createElement("script");
  s.src = "mirapri_outfits.js";
  s.onload = () => {
    miraLoaded = true;
    if (typeof _MIRAPRI_RAW !== "undefined")
      ALL_OUTFITS = ALL_OUTFITS.concat(_MIRAPRI_RAW.map(annotate));
    populateSrcDetail();
    applyFilters();
    loadSets();   // 社群載完再載官方套裝（彈窗「所屬套裝」反查也靠這份）
  };
  s.onerror = () => { miraLoaded = true; updateSubtitle(); loadSets(); };
  document.head.appendChild(s);
}

function loadSets() {
  const s = document.createElement("script");
  s.src = "official_sets.js";
  s.onload = () => {
    setsLoaded = true;
    if (typeof _SETS_RAW !== "undefined") {
      SETS = _SETS_RAW.map(e => {
        e.maxPatch = parseFloat(e.patch) || 0;
        return e;
      });
      // 反查索引：mirage 層優先（同件同屬多套時以官方箱為準）
      for (const st of SETS) {
        for (const p of st.pieces) {
          const cur = ITEM_SETS_BY_ID.get(p.id);
          if (!cur || (cur.layer !== "mirage" && st.layer === "mirage"))
            ITEM_SETS_BY_ID.set(p.id, st);
          for (const nm of [p.zh, p.ja]) {
            if (!nm) continue;
            const c2 = ITEM_SETS_BY_NAME.get(nm);
            if (!c2 || (c2.layer !== "mirage" && st.layer === "mirage"))
              ITEM_SETS_BY_NAME.set(nm, st);
          }
        }
      }
    }
    if (viewMode === "sets") { populateSrcDetail(); applyFilters(); }
  };
  s.onerror = () => { setsLoaded = true; };
  document.head.appendChild(s);
}

// 從彈窗的「所屬套裝」chip 跳到官方套裝
// Bootstrap modal 關閉有動畫：hide 進行中呼叫 show 會被忽略，須等 hidden 事件再開
function viewSet(setId) {

    if (idx >= 0) openModal(idx);

// ════════════════════════════════════════════════════════
// FILTER
// ════════════════════════════════════════════════════════
// ── 取得方式細項（副本名／商人名／兌換貨幣…）──
// 官方套裝＝整套的 source；配裝＝逐件的 source。選項由目前檢視的資料現算，
// 上方「取得方式」有選時只列該分類底下的細項。
function outfitPieces(e) {
  return e.type === "mirapri" ? (e.equipments || []) : (e.pieces || []);
}

function collectSources() {
  const cnt = new Map();   // source → {n, st}
  const bump = (src, st) => {
    if (!src) return;
    const rec = cnt.get(src) || { n: 0, st: ST_TAG_SET.has(st) ? st : "other" };
    rec.n++;
    cnt.set(src, rec);
  };
  if (viewMode === "sets") {
    for (const e of SETS) bump(e.source, e.st);
  } else {
    for (const e of ALL_OUTFITS) {
      const seen = new Set();   // 同一套同一來源只計一次
      for (const p of outfitPieces(e)) {
        if (!p || typeof p !== "object" || !p.source || seen.has(p.source)) continue;
        seen.add(p.source);
        bump(p.source, p.st);
      }
    }
  }
  return cnt;
}

function populateSrcDetail() {
  const sel = document.getElementById("src-detail-select");
  const groups = new Map();
  for (const [src, rec] of collectSources()) {
    if (srcTags.size && !srcTags.has(rec.st)) continue;
    if (!groups.has(rec.st)) groups.set(rec.st, []);
    groups.get(rec.st).push([src, rec.n]);
  }
  const allLabel = currentLang === "en" ? "Source detail: all" : "取得方式細項：全部";
  let html = `<option value="">${allLabel}</option>`;
  for (const st of ST_ORDER) {
    const items = groups.get(st);
    if (!items) continue;
    items.sort((a, b) => b[1] - a[1] || a[0].localeCompare(b[0], "zh-Hant"));
    html += `<optgroup label="${esc(ST_GROUP_LABEL[st] || st)}">`
      + items.map(([src, n]) => `<option value="${esc(src)}">${esc(src)}（${n}）</option>`).join("")
      + `</optgroup>`;
  }
  sel.innerHTML = html;
  sel.value = srcDetail;
  if (sel.value !== srcDetail) { srcDetail = ""; sel.value = ""; }   // 換檢視/分類後失效
}

function matchSrcDetail(e) {
  if (!srcDetail) return true;
  if (e.type === "set") return e.source === srcDetail;
  return outfitPieces(e).some(p => p && typeof p === "object" && p.source === srcDetail);
}

function applyFilters() {
  const qLow = q.toLowerCase();
  if (viewMode === "sets") {
    filtered = SETS.filter(e => {
      if (favOnly && !favs.has(e.id)) return false;
      if (twOnly && !e.tw) return false;
      if (srcTags.size && !srcTags.has(e.st)) return false;
      if (!matchSrcDetail(e)) return false;
      if (jobTags.size && ![...jobTags].some(t => (e.tags || []).includes(t))) return false;
      if (qLow) {
        const hay = [e.name_zh, e.name_ja, e.name_en, e.source,
          ...e.pieces.map(p => (p.zh || "") + " " + (p.ja || "") + " " + (p.en || ""))]
          .join(" ").toLowerCase();
        if (!hay.includes(qLow)) return false;
      }
      return true;
    });
    sortFiltered();
    currentPage = 1;
    renderGrid();
    updateSubtitle();
    return;
  }
  filtered = ALL_OUTFITS.filter(e => {
    // Gender filter（精選 + 社群都套用）
    if (miraFilters.gender) {
      if (miraFilters.gender === "unknown") {
        if (e.gender) return false;
      } else {
        // "both" 套裝（e.gender==="both"）在任何性別篩選下都顯示
        if (e.gender !== miraFilters.gender && e.gender !== "both") return false;
      }
    }
    // Race filter（精選 + 社群都套用）
    if (miraFilters.race) {
      // "all" 套裝在任何種族篩選下都顯示
      if (e.race !== miraFilters.race && e.race !== "all") return false;
    }
    // 我的收藏
    if (favOnly && !favs.has(e.id)) return false;
    // 繁中版可幻化
    if (twOnly && !e.tw) return false;
    // 取得方式／職業（可複選；群組內 OR、群組間 AND，精選＋社群都適用）
    if (srcTags.size && ![...srcTags].some(t => e.tags.includes(t))) return false;
    if (!matchSrcDetail(e)) return false;
    if (jobTags.size && ![...jobTags].some(t => e.tags.includes(t))) return false;
    // Search (all)
    if (qLow) {
      const name = (e.name || "").toLowerCase();
      const user = (e.color || "").toLowerCase();
      const equips = e.type === "mirapri"
        ? (e.equipments || []).map(eq => typeof eq === "string" ? eq : ((eq.zh || "") + " " + (eq.name || ""))).join(" ").toLowerCase()
        : (e.pieces || []).map(p => (p.zh + " " + p.en).toLowerCase()).join(" ");
      // 取得方式（含副本名）也可被搜到，與官方套裝檢視一致
      const srcs = outfitPieces(e)
        .map(p => (p && typeof p === "object" && p.source) || "").join(" ").toLowerCase();
      if (!name.includes(qLow) && !user.includes(qLow)
          && !equips.includes(qLow) && !srcs.includes(qLow)) return false;
    }
    return true;
  });
  sortFiltered();
  currentPage = 1;
  renderGrid();
  updateSubtitle();
}

function sortFiltered() {
  const nameOf = e => e.type === "set" ? setDisplayName(e) : (e.name || "");
  if (sortMode === "patch-desc")      filtered.sort((a,b) => (b.maxPatch||0) - (a.maxPatch||0));
  else if (sortMode === "patch-asc")  filtered.sort((a,b) => (a.maxPatch||0) - (b.maxPatch||0));
  else if (sortMode === "name")       filtered.sort((a,b) => nameOf(a).localeCompare(nameOf(b), "zh-Hant"));
  // default：維持原順序（精選在前／官方套裝依版本新→舊）
}

function renderGrid() {
  const grid = document.getElementById("outfit-grid");
  const start = (currentPage - 1) * PAGE_SIZE;
  const pageItems = filtered.slice(start, start + PAGE_SIZE);

  if (pageItems.length === 0) {
    grid.innerHTML = '<div class="col-12"><div class="empty-state">沒有符合條件的配裝</div></div>';
    renderPager();
    return;
  }

  grid.innerHTML = pageItems.map((e, i) => buildCard(e, start + i)).join("");

  renderPager();
}

const TAG_LABEL = {
  healer:"💚治療", tank:"🛡️盾衛", caster:"🔮法系",
  melee:"⚔️近戰", pranged:"🏹遠距", crafter:"🔨製作",
  event:"🗓️活動", pvp:"⚔️PvP", store:"💎Mog", raid:"🗡️副本",
  scrip:"🔶神典", gs:"🎲金碟"
};

function buildSetCard(e, idx) {
  const icons = setVisibleIcons(e).slice(0, 6);
  let iconsHtml = icons.length
    ? `<div class="set-icons">` + icons.map(p =>
        `<img src="配裝圖片/icons/${p.icon}.png" alt="" loading="lazy"
          onerror="this.style.display='none'">`).join("") + `</div>`
    : `<div class="set-icons"><span class="text-secondary small">No Icons</span></div>`;
  // 有示意照 → 用照片呈現整體外觀（wiki 官方模特照優先，其次站內配裝照）
  if (e.img) {
    const isWiki = e.imgSrc === "wiki";
    const note = isWiki
      ? (currentLang === "en" ? "official look" : "官方外觀")
      : (currentLang === "en" ? "community look" : (e.imgLabel || "示意"));
    iconsHtml = `<div class="set-card-imgwrap">
      <img class="card-img-top" src="${thumbOf(e.img)}" alt="${esc(setDisplayName(e))}" loading="lazy"
        onerror="if(this.src.indexOf('縮圖')>-1){this.src='${esc(e.img)}'}else{this.closest('.set-card-imgwrap').innerHTML='<div class=\\'card-noimg\\'>No Image</div>'}">
      <div class="set-photo-note">${isWiki ? "📖" : "👤"} ${esc(note)}</div>
    </div>`;
  }
  const name = setDisplayName(e);
  const zhMiss = !e.name_zh && !e.tw
    ? `<span class="zh-missing">${currentLang === "en" ? "not on TW" : "繁中未實裝"}</span>` : "";
  const patchTag = e.patch ? `<span class="patch-tag">${esc(e.patch)}</span>` : "";
  const jobTag = e.job && e.job !== "全職業" ? `<span class="restrict-job">${esc(e.job)}</span>` : "";
  const tot = e.pieces.length;
  const favCls = favs.has(e.id) ? " faved" : "";
  // alljob 等僅供篩選的 tag 不上卡（與配裝卡 CARD_TAGS 規則一致）
  const tagBadges = (e.tags || []).filter(t => CARD_TAGS.has(t)).map(t => `<span class="card-tag badge-${t}">${TAG_LABEL[t] || t}</span>`).join("");
  return `<div class="col">
    <div class="card outfit-card h-100 position-relative" onclick="openModal(${idx})">
      <button class="fav-btn${favCls}" title="加入／移除我的收藏" onclick="toggleFav('${String(e.id).replace(/'/g, "\\'")}', event)">★</button>
      ${iconsHtml}
      <div class="card-body p-3">
        <div class="small text-secondary d-flex align-items-center gap-1 flex-wrap">${patchTag}${jobTag}${zhMiss}</div>
        <div class="card-name fw-semibold mt-1 mb-1">${esc(name)}</div>
        <div class="text-secondary small">${esc(e.source || "")}<span class="ms-2">${tot} 件</span></div>
        <div class="d-flex flex-wrap gap-1 mt-2">${tagBadges}</div>
      </div>
    </div>
  </div>`;
}

function buildCard(e, idx) {
  if (e.type === "set") return buildSetCard(e, idx);
  const isCurated = e.type === "curated";

  const imgHtml = e.image
    ? `<img class="card-img-top" src="${thumbOf(e.image)}" alt="${esc(e.name)}" loading="lazy" onerror="if(this.src.indexOf('縮圖')>-1){this.src='${e.image}'}else{this.outerHTML='<div class=\\'card-noimg\\'>No Image</div>'}">`
    : `<div class="card-noimg">No Image</div>`;

  // 第一行 meta（精選顯示編號，社群顯示性別種族）
  let metaHtml;
  if (isCurated) {
    const gSym = e.gender === "female" ? "♀" : e.gender === "male" ? "♂" : "";
    const gCls = e.gender === "female" ? "tag-female" : e.gender === "male" ? "tag-male" : "tag-unk";
    const rMap = currentLang === "en" ? RACE_LABEL : RACE_ZH;
    const rName = (e.race && e.race !== "all") ? (rMap[e.race] || e.race) : "";
    const raceTag = rName ? `<span class="tag-race">${rName}</span>` : "";
    const genderTag = gSym ? `<span class="${gCls}">${gSym}</span>` : "";
    metaHtml = `<div class="small text-secondary d-flex align-items-center gap-1 flex-wrap">#${e.id}${genderTag ? " " + genderTag : ""}${raceTag ? " " + raceTag : ""}</div>`;
  } else {
    const gSym  = e.gender === "female" ? "♀" : e.gender === "male" ? "♂" : "?";
    const gCls  = e.gender === "female" ? "tag-female" : e.gender === "male" ? "tag-male" : "tag-unk";
    const rMap  = currentLang === "en" ? RACE_LABEL : RACE_ZH;
    const race  = e.race ? ` ${rMap[e.race] || e.race}` : "";
    metaHtml = `<div class="small text-secondary d-flex align-items-center gap-1 flex-wrap"><span class="${gCls}">${gSym}${race}</span></div>`;
  }

  // 標籤列（craft/npc/other 等太常見的 st 只用於篩選，不上卡片，避免每張卡都一排小標）
  const rMapTag = currentLang === "en" ? RACE_LABEL : RACE_ZH;
  const tagBadges = isCurated
    ? (e.tags || []).filter(t => CARD_TAGS.has(t)).map(t => `<span class="card-tag badge-${t}">${TAG_LABEL[t] || t}</span>`).join("")
    : (e.gender === "female" ? `<span class="tag-female">♀</span>`
       : e.gender === "male" ? `<span class="tag-male">♂</span>`
       : `<span class="tag-unk">?</span>`)
      + (e.race && e.race !== "all" ? `<span class="tag-race">${rMapTag[e.race] || e.race}</span>` : "");

  const favCls = favs.has(e.id) ? " faved" : "";
  return `<div class="col">
    <div class="card outfit-card h-100 position-relative" onclick="openModal(${idx})">
      ${isCurated ? '<div class="star-badge">⭐</div>' : ""}
      <button class="fav-btn${favCls}" title="加入／移除我的收藏" onclick="toggleFav('${String(e.id).replace(/'/g, "\\'")}', event)">★</button>
      ${imgHtml}
      <div class="card-body p-3">
        ${metaHtml}
        <div class="card-name fw-semibold mt-1 mb-1">${esc(e.name)}</div>
        <div class="text-secondary small">${esc(e.color || "")}</div>
        <div class="d-flex flex-wrap gap-1 mt-2">${tagBadges}</div>
      </div>
    </div>
  </div>`;
}

// ════════════════════════════════════════════════════════
// PAGER（Bootstrap pagination）
// ════════════════════════════════════════════════════════
function renderPager() {
  const pager = document.getElementById("pager");
  const totalPages = Math.ceil(filtered.length / PAGE_SIZE);
  if (totalPages <= 1) { pager.innerHTML = ""; return; }

  const pg = (label, page, opts = {}) => {
    const cls = "page-item" + (opts.active ? " active" : "") + (opts.disabled ? " disabled" : "");
    return `<li class="${cls}"><button class="page-link" onclick="goPage(${page})">${label}</button></li>`;
  };

  let html = '<ul class="pagination pagination-sm mb-0">';
  html += pg("‹", currentPage - 1, { disabled: currentPage === 1 });
  let lo = Math.max(1, currentPage - 3);
  let hi = Math.min(totalPages, currentPage + 3);
  if (lo > 1) {
    html += pg("1", 1);
    if (lo > 2) html += '<li class="page-item disabled"><span class="page-link">…</span></li>';
  }
  for (let p = lo; p <= hi; p++) html += pg(p, p, { active: p === currentPage });
  if (hi < totalPages) {
    if (hi < totalPages - 1) html += '<li class="page-item disabled"><span class="page-link">…</span></li>';
    html += pg(totalPages, totalPages);
  }
  html += pg("›", currentPage + 1, { disabled: currentPage === totalPages });
  html += "</ul>";

  html += `<span class="text-secondary small">${filtered.length} 件 / 第 ${currentPage}/${totalPages} 頁</span>`;
  html += `<input class="form-control form-control-sm" style="width:80px" type="number" min="1" max="${totalPages}" placeholder="跳頁"
            onkeydown="if(event.key==='Enter'){goPage(parseInt(this.value)||1);}">`;
  pager.innerHTML = html;
}

function goPage(p) {
  const totalPages = Math.ceil(filtered.length / PAGE_SIZE);
  if (p < 1 || p > totalPages) return;
  currentPage = p;
  renderGrid();
  window.scrollTo({top:0, behavior:"smooth"});
}

// MODAL — OPEN / CLOSE / NAV（Bootstrap Modal API）

let bsModal = null;
function getModal() {
  if (!bsModal) bsModal = new bootstrap.Modal(document.getElementById("modal"), { focus: true });
  return bsModal;
}
function openModal(globalIdx) {
  currentIdx = globalIdx;
  const e = filtered[globalIdx];
  if (!e) return;
  if (e.type === "curated") {
    renderCuratedModal(e, globalIdx);
  } else if (e.type === "set") {
    renderSetModal(e, globalIdx);
  } else {
    renderMiraModal(e, globalIdx);
  }
  getModal().show();
  // 切換套裝時把內容捲回頂端
  const body = document.querySelector("#modal .modal-body");
  if (body) body.scrollTop = 0;
  const ic = document.getElementById("modal-info-col"); if (ic) ic.scrollTop = 0;
}

function closeModal() {
  if (bsModal) bsModal.hide();
}
// 保留相容性（舊呼叫路徑）
function closeMiraModal() { closeModal(); }

function navModal(dir) {
  const next = currentIdx + dir;
  if (next >= 0 && next < filtered.length) openModal(next);
}

function renderCuratedModal(e, idx) {

    ? (isNaN(e.timestamp) ? String(e.timestamp).split(" ")[0]

  const hDye   = lang === "en" ? "Dye"      : "染色";

      const jaName   = eq.name || "";

      const subName  = dispName !== jaName && jaName ? `<div class="item-en">${esc(jaName)}</div>` : "";
      const nameClass = "item-name";
      const lookupName = (zhName || jaName).replace(/'/g, "\\'");

  document.getElementById("next-btn").onclick = () => navModal(1);

// ════════════════════════════════════════════════════════
// BUILD EQUIPMENT TABLE (curated modal)
// ════════════════════════════════════════════════════════
function buildTable(pieces, lang) {
  if (!pieces || pieces.length === 0) return '<p style="color:var(--muted);padding:12px">無裝備資料</p>';

  const dlDye   = lang === "en" ? "Dye"      : "染色";
  const dlPatch = lang === "en" ? "Patch"    : "版本";
  const dlSrc   = lang === "en" ? "Source"   : "取得方式";
  const dlRestr = lang === "en" ? "Restrict" : "限制";

  const rows = pieces.map(p => {
    const slotEn  = SLOT_EN[p.slot] || p.slot;
    const slotLabel = lang === "en" ? slotEn : p.slot;
    const itemName = lang === "en" ? p.en : (p.zh || p.en);
    const nameClass = (!p.zh || p.zh.includes("待確認") || p.zh.includes("尚未")) ? "item-name unconfirmed" : "item-name";

    // Dye cells（含色票）
    const d1 = dyeHtml(p.dye1);
    const d2 = dyeHtml(p.dye2);

    // Source tag
    const stClass = SRC_CLASS[p.st] || "src-other";
    const srcHtml = p.source
      ? `<span class="source-tag ${stClass}">${esc(p.source)}</span>` : "—";

    // Restriction
    const lvHtml  = p.lv && p.lv !== "1"  ? `<span class="restrict-level">Lv.${p.lv}</span>` : "";
    const jobHtml = p.job && p.job !== "全職業" ? `<span class="restrict-job">${esc(p.job)}</span>` : "";
    const gHtml   = p.gender ? `<span class="restrict-gender">${p.gender==="female"?"♀":"♂"}</span>` : "";
    const rHtml   = p.race   ? `<span class="restrict-race">${(lang==="en"?RACE_LABEL:RACE_ZH)[p.race]||p.race}</span>` : "";
    const patchHtml = p.patch ? `<span class="patch-tag">${esc(p.patch)}</span>` : "";

    const lookupName = p.zh || p.en;
    const nameHtml = itemName
      ? `<span class="item-link" title="查看使用此裝備的其他套裝" onclick="searchItem('${esc(lookupName).replace(/'/g,"\\'")}')">${esc(itemName)}</span>`
      : "";
    return `<tr>
      <td class="slot-cell"><span class="slot-badge">${esc(slotLabel)}</span></td>
      <td class="${nameClass}">${nameHtml}${badgeChips(p, true)}</td>
      <td class="dye-cell" data-label="${dlDye}">${d1} ${d2}</td>
      <td class="patch-cell" data-label="${dlPatch}">${patchHtml}</td>
      <td class="src-cell" data-label="${dlSrc}">${srcHtml}</td>
      <td class="restrict-cell" data-label="${dlRestr}">${lvHtml}${jobHtml}${gHtml}${rHtml}</td>
    </tr>`;
  }).join("");

  const hSlot  = lang === "en" ? "Slot"   : "部位";
  const hItem  = lang === "en" ? "Item"   : "裝備";
  const hDye   = lang === "en" ? "Dye"    : "染色";
  const hPatch = lang === "en" ? "Patch"  : "版本";
  const hSrc   = lang === "en" ? "Source" : "取得方式";
  const hRestr = lang === "en" ? "Restrict" : "限制";

  return `<table class="equip-table">
    <thead><tr>
      <th>${hSlot}</th><th>${hItem}</th><th>${hDye}</th>
      <th>${hPatch}</th><th>${hSrc}</th><th>${hRestr}</th>
    </tr></thead>
    <tbody>${rows}</tbody>
  </table>`;
}

// ════════════════════════════════════════════════════════
// 複製裝備清單
// ════════════════════════════════════════════════════════
function copyOutfit(e) {
  const ps = e.type === "mirapri" ? (e.equipments || []) : (e.pieces || []);
  const lines = [`#${e.id || ""} ${e.name}${e.color ? "（" + e.color + "）" : ""}`.trim()];
  ps.forEach(p => {
    if (typeof p === "string") { lines.push(p); return; }
    const name = p.zh || p.en || p.name || "";
    if (!name) return;
    const dyes = [p.dye1, p.dye2].filter(d => d && d !== "—").join("／");
    lines.push(`${p.slot || "－"}：${name}${dyes ? "（染：" + dyes + "）" : ""}`);
  });
  const text = lines.join("\n");
  const done = () => {
    const btn = document.getElementById("copy-btn");
    const orig = btn.textContent;
    btn.textContent = "✅ 已複製";
    setTimeout(() => { btn.textContent = orig; }, 1500);
  };
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(done).catch(() => fallbackCopy(text, done));
  } else fallbackCopy(text, done);
}
function fallbackCopy(text, done) {
  const ta = document.createElement("textarea");
  ta.value = text; ta.style.position = "fixed"; ta.style.opacity = "0";
  document.body.appendChild(ta); ta.select();
  try { document.execCommand("copy"); done(); } catch (e) {}
  document.body.removeChild(ta);
}

// ════════════════════════════════════════════════════════
// HELPERS
// ════════════════════════════════════════════════════════
function esc(s) {
  return String(s || "")
    .replace(/&/g,"&amp;").replace(/</g,"&lt;")
    .replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

function updateSubtitle() {
  const el = document.getElementById("site-subtitle");
  if (viewMode === "sets") {
    const loading = setsLoaded ? "" : (currentLang === "en" ? " · loading…" : " · 官方套裝載入中…");
    el.textContent = currentLang === "en"
      ? `${filtered.length} gear sets${loading}`
      : `官方套裝 ${filtered.length} 套${loading}`;
  } else {
    const curated = filtered.filter(e => e.type === "curated").length;
    const mira    = filtered.filter(e => e.type === "mirapri").length;
    const loading = miraLoaded ? "" : (currentLang === "en" ? " · loading community…" : " · 社群配裝載入中…");
    if (currentLang === "en") {
      el.textContent = `${filtered.length} outfits (⭐ ${curated} curated · ${mira} community)${loading}`;
    } else {
      el.textContent = `共 ${filtered.length} 套（⭐ 精選 ${curated} 套 · 社群 ${mira} 套）${loading}`;
    }
  }
  document.getElementById("result-count").textContent =
    currentLang === "en" ? filtered.length + " results" : filtered.length + " 件";
  // 有任何篩選啟用時才顯示「清除篩選」
  const anyFilter = srcTags.size || srcDetail || jobTags.size || favOnly || twOnly || q ||
                    miraFilters.gender || miraFilters.race;
  document.getElementById("clear-filters-btn").classList.toggle("d-none", !anyFilter);
}

  viewMode = mode;
  document.getElementById("view-outfits-btn").classList.toggle("view-active", mode === "outfits");
  document.getElementById("view-sets-btn").classList.toggle("view-active", mode === "sets");

  applyFilters();

}

function resetFilters() {
  srcTags.clear(); jobTags.clear();
  srcDetail = "";
  favOnly = twOnly = false;
  q = "";
  miraFilters = { gender: "", race: "" };
  document.getElementById("search-input").value = "";
  document.querySelectorAll(".filter-btn.active").forEach(b => b.classList.remove("active"));
  document.querySelectorAll(".filter-btn.filter-reset").forEach(b => b.classList.add("active"));
  populateSrcDetail();

function setLang(lang) {

  document.querySelectorAll(".lang-btn").forEach(b => b.classList.remove("lang-active"));

    if (el.dataset.zh) el.textContent = lang === "en" ? (el.dataset.en || el.dataset.zh) : el.dataset.zh;
  });
  document.querySelectorAll("[data-zh-placeholder]").forEach(el => {
    el.placeholder = lang === "en" ? el.dataset.enPlaceholder : el.dataset.zhPlaceholder;

  populateSrcDetail();   // 「全部」那列的字要跟著語言走

// INIT
// ════════════════════════════════════════════════════════
document.addEventListener("DOMContentLoaded", () => {
  ALL_OUTFITS = (typeof _CURATED_RAW !== "undefined" ? _CURATED_RAW : []).map(annotate);
  filtered = [...ALL_OUTFITS];
  populateSrcDetail();
  renderGrid();
  updateSubtitle();
  loadMirapri();   // 社群配裝（8MB）背景載入，完成後自動併入

  // Filter buttons (source/job，可複選)
  document.querySelectorAll(".filter-btn[data-filter]").forEach(btn => {
    btn.addEventListener("click", () => {
      const tag = btn.dataset.filter;
      const set = btn.dataset.group === "src" ? srcTags : jobTags;
      if (set.has(tag)) { set.delete(tag); btn.classList.remove("active"); }
      else              { set.add(tag);    btn.classList.add("active"); }
      if (btn.dataset.group === "src") populateSrcDetail();   // 細項只列選中的分類
      applyFilters();
    });
  });

  // 我的收藏
  document.getElementById("fav-filter-btn").addEventListener("click", function () {
    favOnly = !favOnly;
    this.classList.toggle("active", favOnly);
    applyFilters();
  });

  // 繁中版可幻化
  document.getElementById("tw-btn").addEventListener("click", function () {
    twOnly = !twOnly;
    this.classList.toggle("active", twOnly);
    applyFilters();
  });

  // 取得方式細項
  document.getElementById("src-detail-select").addEventListener("change", function () {
    srcDetail = this.value;
    applyFilters();
  });

  // 排序
  document.getElementById("sort-select").addEventListener("change", function () {
    sortMode = this.value;
    applyFilters();
  });

  // 清除篩選
  document.getElementById("clear-filters-btn").addEventListener("click", resetFilters);

  // Gender / Race filter buttons
  document.querySelectorAll(".filter-btn[data-mf]").forEach(btn => {
    btn.addEventListener("click", () => {
      const field = btn.dataset.mf;
      const val   = btn.dataset.val;
      miraFilters[field] = (miraFilters[field] === val && val !== "") ? "" : val;
      document.querySelectorAll(`.filter-btn[data-mf="${field}"]`).forEach(b => b.classList.remove("active"));
      const activeBtn = document.querySelector(`.filter-btn[data-mf="${field}"][data-val="${miraFilters[field]}"]`);
      if (activeBtn) activeBtn.classList.add("active");
      applyFilters();
    });
  });

  // Search
  document.getElementById("search-input").addEventListener("input", ev => {
    q = ev.target.value.trim();
    applyFilters();
  });

  // Lightbox 開啟時，Esc 先關放大圖（攔截，避免一起把彈窗也關掉）
  document.addEventListener("keydown", ev => {
    if (ev.key === "Escape" && document.getElementById("img-lightbox").classList.contains("show")) {
      ev.stopImmediatePropagation();
      closeLightbox();
    }
  }, true);

  // Lightbox 縮放／平移：滾輪縮放、拖曳平移、雙擊還原
  const lb = document.getElementById("img-lightbox");
  const lbImg = document.getElementById("img-lightbox-img");
  lb.addEventListener("wheel", ev => { ev.preventDefault(); lbZoom(ev.deltaY < 0 ? 1 : -1); }, { passive: false });
  lbImg.addEventListener("dblclick", ev => {
    ev.preventDefault();
    if (lbScale > 1) lbReset(); else { lbScale = 2.5; lbApply(); }
  });
  lbImg.addEventListener("pointerdown", ev => {
    if (lbScale <= 1) return;
    lbDrag = true; lbSX = ev.clientX - lbX; lbSY = ev.clientY - lbY;
    lbImg.setPointerCapture(ev.pointerId); lbImg.style.cursor = "grabbing";
  });
  lbImg.addEventListener("pointermove", ev => {
    if (!lbDrag) return;
    lbX = ev.clientX - lbSX; lbY = ev.clientY - lbSY; lbApply();
  });
  lbImg.addEventListener("pointerup", () => { lbDrag = false; lbApply(); });

  // Keyboard nav（Bootstrap 已處理 Esc，這裡補方向鍵）
  document.addEventListener("keydown", ev => {
    const modalOpen = document.getElementById("modal").classList.contains("show");
    if (modalOpen) {
      if (ev.key === "ArrowLeft")  navModal(-1);
      if (ev.key === "ArrowRight") navModal(1);
    }
  });

  // Set initial active gender button (全部)
  const allGenderBtn = document.querySelector('.filter-btn[data-mf="gender"][data-val=""]');
  if (allGenderBtn) allGenderBtn.classList.add("active");
  const allRaceBtn = document.querySelector('.filter-btn[data-mf="race"][data-val=""]');
  if (allRaceBtn) allRaceBtn.classList.add("active");
});
</script>
</body>
</html>
