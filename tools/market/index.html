<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="FF14 市場查價 + 比價 — 繁中服陸行鳥 DC 即時價格、跨服比價、製作清單原料樹狀圖與買/做成本試算">
  <title>市場查價 + 比價 | 水神的工具箱</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-base:    #0a0c10;
      --bg-surface: #0f1117;
      --bg-card:    #14181f;
      --bg-card-hover: #1a1f2b;
      --border:     rgba(255,255,255,0.07);
      --border-hover: rgba(200,169,110,0.4);
      --gold:       #c8a96e;
      --gold-light: #e2c98a;
      --gold-dim:   rgba(200,169,110,0.15);
      --blue:       #4fc3f7;
      --blue-dim:   rgba(79,195,247,0.12);
      --green:      #4ade80;
      --green-dim:  rgba(74,222,128,0.12);
      --purple:     #a78bfa;
      --purple-dim: rgba(167,139,250,0.12);
      --red:        #f87171;
      --red-dim:    rgba(248,113,113,0.12);
      --amber:      #fbbf24;
      --text:           #e8eaf0;
      --text-dim:       #8892a4;
      --text-muted:     #717c91;
      --radius:     10px;
      --radius-sm:  6px;
      --transition: 0.18s cubic-bezier(0.4,0,0.2,1);
    }

    html { scroll-behavior: smooth; font-size: 17.5px; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans TC', sans-serif;
      background: var(--bg-base); color: var(--text); min-height: 100vh; line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }
    a { color: inherit; text-decoration: none; }
    .container { max-width: 1500px; margin: 0 auto; padding: 0 20px; }

    /* nav */
    .nav-back {
      display: inline-flex; align-items: center; gap: 0.4rem;
      color: var(--text-dim); font-size: 0.85rem; padding: 14px 18px; transition: color var(--transition);
    }
    .nav-back:hover { color: var(--gold); }

    /* header */
    .page-head { padding: 8px 0 20px; }
    .page-head h1 { font-size: 1.5rem; color: var(--gold-light); font-weight: 700; }
    .page-head .subtitle { font-size: 0.85rem; color: var(--text-dim); margin-top: 4px; }

    /* toolbar */
    .toolbar {
      display: flex; flex-wrap: wrap; align-items: center; gap: 12px;
      background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius);
      padding: 12px 16px; margin-bottom: 16px;
    }
    .toolbar label { font-size: 0.8rem; color: var(--text-dim); display: flex; align-items: center; gap: 8px; }
    select, input[type="text"], input[type="search"], input[type="number"] {
      background: var(--bg-surface); border: 1px solid var(--border); color: var(--text);
      border-radius: var(--radius-sm); padding: 7px 10px; font-size: 0.9rem; font-family: inherit;
    }
    select:focus, input:focus { outline: none; border-color: var(--gold); }
    .btn {
      background: var(--bg-surface); border: 1px solid var(--border); color: var(--text-dim);
      border-radius: var(--radius-sm); padding: 7px 12px; font-size: 0.82rem; cursor: pointer;
      transition: all var(--transition); font-family: inherit;
    }
    .btn:hover { color: var(--text); border-color: rgba(255,255,255,0.2); }
    .btn.primary { color: var(--gold); border-color: rgba(200,169,110,0.35); background: var(--gold-dim); }
    .btn.primary:hover { background: rgba(200,169,110,0.25); }
    .btn.danger:hover { color: var(--red); border-color: rgba(248,113,113,0.4); }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .update-time { font-size: 0.74rem; color: var(--text-muted); margin-left: auto; }

    /* tabs */
    .tabs { display: flex; gap: 6px; margin-bottom: 18px; border-bottom: 1px solid var(--border); }
    .tab {
      background: none; border: none; border-bottom: 2px solid transparent; color: var(--text-dim);
      padding: 10px 14px; font-size: 0.9rem; cursor: pointer; font-family: inherit; transition: all var(--transition);
      display: flex; align-items: center; gap: 6px; white-space: nowrap;
    }
    .tab:hover { color: var(--text); }
    .tab.active { color: var(--gold); border-bottom-color: var(--gold); }
    .pill { font-size: 0.68rem; background: var(--gold-dim); color: var(--gold); border-radius: 20px; padding: 1px 7px; }
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* search */
    .search-wrap { position: relative; margin-bottom: 16px; }
    .search-input-row { position: relative; display: flex; gap: 8px; }
    .search-input-row .icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--text-muted); }
    #searchInput { flex: 1; min-width: 0; padding-left: 36px; }
    #searchBtn { white-space: nowrap; }
    /* 條件已變更、尚未執行搜尋的提示 */
    #searchBtn.dirty { border-color: var(--gold); background: rgba(200,169,110,0.35); color: var(--gold-light); }
    .lv-input { width: 68px; }
    /* 搜尋結果：卡片格線（每行 4 筆，點卡看詳情） */
    .search-results {
      margin-top: 12px;
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
    }
    @media (max-width: 1100px) { .search-results { grid-template-columns: repeat(3, minmax(0, 1fr)); } }
    @media (max-width: 800px)  { .search-results { grid-template-columns: repeat(2, minmax(0, 1fr)); } }
    @media (max-width: 520px)  { .search-results { grid-template-columns: 1fr; } }
    .search-results:empty { display: none; }
    /* 分頁列 */
    .search-pager { grid-column: 1 / -1; display: flex; flex-wrap: wrap; align-items: center; gap: 6px; padding: 12px 4px 2px; color: var(--text-dim); font-size: 0.82rem; }
    .page-btn {
      background: var(--bg-surface); border: 1px solid var(--border); color: var(--text-dim);
      border-radius: var(--radius-sm); padding: 5px 11px; font-size: 0.8rem; cursor: pointer;
      font-family: inherit; transition: all var(--transition);
    }
    .page-btn:hover:not(:disabled) { color: var(--text); border-color: rgba(255,255,255,0.2); }
    .page-btn.active { color: var(--gold); background: var(--gold-dim); border-color: rgba(200,169,110,0.5); }
    .page-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .search-note { grid-column: 1 / -1; padding: 14px 4px; color: var(--text-muted); font-size: 0.85rem; }
    .result-card {
      display: flex; align-items: center; gap: 10px; padding: 12px; cursor: pointer;
      background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius);
      transition: all var(--transition); position: relative;
    }
    .result-card:hover, .result-card.kbd { border-color: var(--border-hover); background: var(--bg-card-hover); transform: translateY(-1px); }
    .item-icon { width: 44px; height: 44px; border-radius: 6px; background: var(--bg-surface); flex-shrink: 0; object-fit: contain; }
    .result-meta { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 2px; }
    .result-name { font-size: 0.9rem; font-weight: 500; line-height: 1.3; word-break: break-word; }
    .result-cat { font-size: 0.72rem; color: var(--text-muted); }
    .result-craft { font-size: 0.7rem; color: var(--purple); }

    /* 製作職業篩選（複選 chip）*/
    .job-filter { display: flex; flex-wrap: wrap; align-items: center; gap: 6px; margin-top: 10px; }
    .job-filter .jf-label { font-size: 0.76rem; color: var(--text-muted); margin-right: 2px; }
    .job-chip {
      background: var(--bg-surface); border: 1px solid var(--border); color: var(--text-dim);
      border-radius: 20px; padding: 3px 12px; font-size: 0.8rem; cursor: pointer;
      transition: all var(--transition); font-family: inherit;
    }
    .job-chip:hover { color: var(--text); border-color: rgba(255,255,255,0.2); }
    .job-chip.active { color: var(--purple); background: var(--purple-dim); border-color: rgba(167,139,250,0.5); }
    .tag {
      font-size: 0.68rem; padding: 1px 7px; border-radius: 4px; border: 1px solid transparent; white-space: nowrap;
    }
    .tag.untradable { color: var(--red); background: var(--red-dim); border-color: rgba(248,113,113,0.25); }
    .tag.craftable  { color: var(--purple); background: var(--purple-dim); border-color: rgba(167,139,250,0.25); }
    .tag.hq { color: var(--amber); background: rgba(251,191,36,0.12); border-color: rgba(251,191,36,0.25); }
    .tag.nq { color: var(--text-dim); background: var(--bg-surface); border-color: var(--border); }
    .tag.world { color: var(--blue); background: var(--blue-dim); border-color: rgba(79,195,247,0.25); }

    /* item detail */
    .item-detail:empty { display: none; }
    .item-detail:not(:empty) { margin-top: 20px; padding-top: 18px; border-top: 1px solid var(--border); }
    .detail-head { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; }
    .detail-head .item-icon { width: 44px; height: 44px; }
    .detail-title { font-size: 1.15rem; font-weight: 600; }
    .detail-sub { font-size: 0.76rem; color: var(--text-muted); }
    .stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px,1fr)); gap: 10px; margin-bottom: 16px; }
    .stat {
      background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px 14px;
    }
    .stat .label { font-size: 0.72rem; color: var(--text-muted); }
    .stat .value { font-size: 1.05rem; font-weight: 600; color: var(--gold-light); margin-top: 2px; }
    .stat .value small { font-size: 0.72rem; color: var(--text-dim); font-weight: 400; }

    table.listings { width: 100%; border-collapse: collapse; font-size: 0.84rem; margin-top: 6px; }
    table.listings th, table.listings td { text-align: left; padding: 7px 10px; border-bottom: 1px solid var(--border); }
    table.listings th { color: var(--text-muted); font-weight: 600; font-size: 0.74rem; }
    table.listings td.num, table.listings th.num { text-align: right; font-variant-numeric: tabular-nums; }
    table.listings tr:hover td { background: var(--bg-card-hover); }

    .section-title { font-size: 0.8rem; color: var(--text-dim); font-weight: 600; margin: 16px 0 8px; text-transform: uppercase; letter-spacing: 0.5px; }
    .toggle-row { display: flex; gap: 6px; align-items: center; }
    .seg { display: inline-flex; border: 1px solid var(--border); border-radius: var(--radius-sm); overflow: hidden; }
    .seg button { background: var(--bg-surface); border: none; color: var(--text-dim); padding: 5px 12px; font-size: 0.78rem; cursor: pointer; font-family: inherit; }
    .seg button.active { background: var(--gold-dim); color: var(--gold); }

    .qty-add { display: flex; align-items: center; gap: 8px; margin-top: 16px; }
    .qty-add input { width: 72px; }

    /* craft list */
    .empty-state { text-align: center; color: var(--text-muted); padding: 48px 16px; font-size: 0.9rem; }

    /* craft 子分頁（簡易 / 樹狀）*/
    .craft-subtabs { margin-bottom: 12px; }

    /* 簡易清單：橫向一層式（成品 ▶ 直接原料） */
    .simple-row {
      display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
      background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius);
      padding: 12px 14px; margin-bottom: 10px;
    }
    .sr-prod, .sr-mat {
      display: flex; align-items: center; gap: 8px; cursor: pointer;
      border-radius: var(--radius-sm); padding: 7px 11px; transition: all var(--transition);
    }
    .sr-prod { background: var(--gold-dim); border: 1px solid rgba(200,169,110,0.5); flex: 0 0 auto; }
    .sr-prod:hover { border-color: var(--gold); }
    .sr-mat { background: var(--bg-surface); border: 1px solid var(--border); }
    .sr-mat:hover { border-color: var(--border-hover); background: var(--bg-card-hover); }
    .sr-arrow { color: var(--text-muted); font-size: 0.9rem; flex: 0 0 auto; }
    .sr-mats { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; flex: 1; min-width: 0; }
    .sr-ic { width: 32px; height: 32px; border-radius: 5px; background: var(--bg-card); object-fit: contain; flex-shrink: 0; }
    .sr-nm { font-size: 0.84rem; line-height: 1.3; }
    .sr-sub { font-size: 0.72rem; color: var(--text-dim); font-variant-numeric: tabular-nums; }
    .sr-price { color: var(--gold-light); font-weight: 600; }
    .sr-total { font-size: 0.78rem; color: var(--text-dim); padding: 4px 8px; white-space: nowrap; }

    /* craft 子工具列（水晶 / HQ 選項）*/
    .craft-tools { display: flex; flex-wrap: wrap; align-items: center; gap: 16px; background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 10px 16px; margin-bottom: 14px; }
    .switch { display: inline-flex; align-items: center; gap: 8px; font-size: 0.82rem; color: var(--text-dim); cursor: pointer; user-select: none; }
    .switch input { display: none; }
    .switch .track { width: 38px; height: 20px; border-radius: 20px; background: var(--bg-surface); border: 1px solid var(--border); position: relative; transition: all var(--transition); flex-shrink: 0; }
    .switch .track::after { content: ''; position: absolute; top: 2px; left: 2px; width: 14px; height: 14px; border-radius: 50%; background: var(--text-muted); transition: all var(--transition); }
    .switch input:checked + .track { background: var(--gold-dim); border-color: rgba(200,169,110,0.5); }
    .switch input:checked + .track::after { left: 20px; background: var(--gold); }

    /* per-item panel */
    .craft-item { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 14px; }
    .stepper { display: inline-flex; align-items: center; border: 1px solid var(--border); border-radius: var(--radius-sm); overflow: hidden; }
    .stepper button { background: var(--bg-surface); border: none; color: var(--text-dim); width: 24px; height: 26px; cursor: pointer; font-size: 0.95rem; }
    .stepper button:hover { color: var(--text); background: var(--bg-card-hover); }
    .stepper input { width: 42px; text-align: center; border: none; border-left: 1px solid var(--border); border-right: 1px solid var(--border); border-radius: 0; padding: 4px 0; font-size: 0.85rem; }

    /* ── 製作價格樹（節點圖 / org-chart）── */
    .tree-scroll { overflow-x: auto; padding: 16px 10px 18px; }
    .tree { display: inline-block; min-width: 100%; }
    .tree ul { display: flex; justify-content: center; padding-top: 18px; position: relative; margin: 0; }
    .tree li { list-style: none; position: relative; padding: 18px 6px 0; display: flex; flex-direction: column; align-items: center; }
    .tree li::before, .tree li::after { content: ''; position: absolute; top: 0; right: 50%; border-top: 2px solid var(--line, var(--border)); width: 50%; height: 18px; }
    .tree li::after { right: auto; left: 50%; border-left: 2px solid var(--line, var(--border)); }
    .tree li:only-child::before, .tree li:only-child::after { display: none; }
    .tree > ul > li { padding-top: 0; }
    .tree > ul > li::before, .tree > ul > li::after { display: none; }
    .tree li:first-child::before, .tree li:last-child::after { border: 0 none; }
    .tree li:last-child::before { border-right: 2px solid var(--line, var(--border)); border-radius: 0 6px 0 0; }
    .tree li:first-child::after { border-radius: 6px 0 0 0; }
    .tree ul.children::before { content: ''; position: absolute; top: 0; left: 50%; border-left: 2px solid var(--line, var(--border)); width: 0; height: 18px; }
    .tree ul.children.green, .tree ul.children.green > li { --line: var(--green); }

    /* node card */
    .node-card { position: relative; width: 132px; background: var(--bg-surface); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 10px 8px 8px; text-align: center; cursor: pointer; transition: all var(--transition); }
    .node-card:hover { border-color: var(--gold); background: var(--bg-card-hover); transform: translateY(-1px); box-shadow: var(--shadow-card); }
    .node-card.root { width: 156px; border-color: rgba(200,169,110,0.6); background: var(--gold-dim); }
    .node-card.grand-root { width: 200px; cursor: default; border-color: rgba(200,169,110,0.7); background: var(--gold-dim); padding: 12px 10px; }
    .node-card.grand-root .nm { font-size: 0.86rem; font-weight: 600; color: var(--gold-light); max-height: none; }
    .node-card.grand-root .pr { font-size: 1.05rem; color: var(--gold-light); }
    .node-card.grand-root .wd { color: var(--text-dim); }
    .node-card.prod { border-color: rgba(74,222,128,0.45); }
    .node-card.mat  { border-color: var(--border); }
    .node-qty { position: absolute; top: -9px; left: -9px; min-width: 20px; height: 20px; padding: 0 5px; border-radius: 20px; background: var(--purple); color: #fff; font-size: 0.72rem; font-weight: 700; display: flex; align-items: center; justify-content: center; box-shadow: 0 1px 4px rgba(0,0,0,.4); }
    .node-copy, .node-del { position: absolute; top: 4px; background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 0.78rem; padding: 2px; line-height: 1; }
    .node-copy { right: 4px; }
    .node-copy:hover { color: var(--gold); }
    .node-del { right: 22px; font-size: 0.8rem; }
    .node-del:hover { color: var(--red); }
    .node-card .ic { width: 40px; height: 40px; border-radius: 5px; background: var(--bg-card); object-fit: contain; margin: 4px auto 4px; display: block; }
    .node-card .nm { font-size: 0.78rem; line-height: 1.25; max-height: 2.5em; overflow: hidden; }
    .node-card .pr { font-size: 0.88rem; font-weight: 600; color: var(--gold-light); font-variant-numeric: tabular-nums; margin-top: 3px; }
    .node-card .pr.none { color: var(--text-muted); font-weight: 400; font-size: 0.76rem; }
    .node-card .hqb { display: inline-block; font-size: 0.6rem; font-weight: 700; color: var(--amber); background: rgba(251,191,36,0.15); border: 1px solid rgba(251,191,36,0.3); border-radius: 3px; padding: 0 3px; margin-right: 3px; vertical-align: 1px; }
    .node-card .wd { font-size: 0.66rem; color: var(--blue); margin-top: 1px; }
    .node-root-controls { display: flex; align-items: center; justify-content: center; margin-top: 6px; }

    /* comparison badge */
    .cmp-badge { margin: 14px auto 0; font-size: 0.72rem; line-height: 1.4; border-radius: 6px; padding: 5px 9px; text-align: center; max-width: 210px; }
    .cmp-badge .l2 { font-weight: 700; margin-top: 1px; }
    .cmp-craft { background: var(--green-dim); border: 1px solid rgba(74,222,128,0.3); }
    .cmp-craft .l2 { color: var(--green); }
    .cmp-buy { background: var(--red-dim); border: 1px solid rgba(248,113,113,0.3); }
    .cmp-buy .l2 { color: var(--red); }
    .cmp-na { background: var(--bg-surface); border: 1px solid var(--border); }
    .cmp-na .l2 { color: var(--amber); }
    .root-badge { margin: 0 auto; font-size: 0.76rem; background: var(--green-dim); border: 1px solid rgba(74,222,128,0.3); border-radius: 6px; padding: 6px 12px; text-align: center; max-width: 300px; }
    .root-badge.cmp-na { background: var(--bg-surface); border-color: var(--border); }
    .root-badge .big { font-weight: 700; color: var(--green); margin-top: 1px; }
    .root-badge.cmp-na .big { color: var(--amber); }

    /* legend */
    .legend { display: flex; flex-wrap: wrap; gap: 14px; font-size: 0.72rem; color: var(--text-muted); padding: 12px 16px; border-top: 1px solid var(--border); align-items: center; }
    .legend .sw { display: inline-block; width: 11px; height: 11px; border-radius: 3px; margin-right: 5px; vertical-align: -1px; border: 1px solid; }
    .sw-root { border-color: rgba(200,169,110,0.6); background: var(--gold-dim); }
    .sw-prod { border-color: rgba(74,222,128,0.6); background: var(--green-dim); }
    .sw-mat  { border-color: var(--border); background: var(--bg-surface); }
    .sw-line { width: 16px; height: 0; border: 0; border-top: 2px solid var(--green); border-radius: 0; margin-right: 5px; vertical-align: 3px; }

    /* node detail modal */
    .modal-mask { position: fixed; inset: 0; background: rgba(0,0,0,0.62); display: none; align-items: flex-start; justify-content: center; z-index: 50; padding: 40px 16px; overflow-y: auto; }
    .modal-mask.open { display: flex; }
    .modal { background: var(--bg-card); border: 1px solid var(--border-hover); border-radius: var(--radius); max-width: 560px; width: 100%; padding: 18px; box-shadow: 0 12px 48px rgba(0,0,0,.5); }
    .modal-head { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; }
    .modal-head .ic { width: 40px; height: 40px; border-radius: 5px; background: var(--bg-surface); }
    .modal-head .t { font-size: 1.05rem; font-weight: 600; flex: 1; }
    .modal-close { background: none; border: none; color: var(--text-dim); font-size: 1.3rem; cursor: pointer; line-height: 1; }
    .modal-close:hover { color: var(--red); }
    .nav-list { display: flex; flex-wrap: wrap; gap: 6px; margin: 4px 0 6px; }
    .nav-chip { display: inline-flex; align-items: center; gap: 5px; background: var(--bg-surface); border: 1px solid var(--border); border-radius: 20px; padding: 4px 10px 4px 4px; font-size: 0.78rem; cursor: pointer; transition: all var(--transition); }
    .nav-chip:hover { border-color: var(--gold); color: var(--gold-light); }
    .nav-chip img { width: 20px; height: 20px; border-radius: 50%; background: var(--bg-card); }

    /* summary */
    .summary-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; margin: 18px 0; }
    .summary-totals { display: grid; grid-template-columns: repeat(auto-fit,minmax(170px,1fr)); gap: 12px; margin-bottom: 14px; }
    .summary-totals .stat .value.save { color: var(--green); }
    .summary-totals .stat .value.bad  { color: var(--red); }

    /* 最適採買路線（依伺服器） */
    .route-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 10px; margin-top: 8px; }

    .route-head { display: flex; align-items: center; justify-content: space-between; gap: 8px; margin-bottom: 6px; padding-bottom: 6px; border-bottom: 1px solid var(--border); }
    .route-head .route-sub { font-size: 0.82rem; font-weight: 600; color: var(--gold-light); font-variant-numeric: tabular-nums; }
    .route-line { display: flex; justify-content: space-between; gap: 10px; font-size: 0.78rem; color: var(--text-dim); padding: 2px 0; }

      border-radius: var(--radius); padding: 12px 14px; margin-bottom: 10px;
    }
    .saved-row .meta { flex: 1; }
    .saved-row .nm { font-weight: 600; }
    .saved-row .sub { font-size: 0.74rem; color: var(--text-muted); }

    .note { font-size: 0.78rem; color: var(--text-muted); }
    .loading { color: var(--text-dim); font-size: 0.85rem; padding: 10px 0; }

    @media (max-width: 600px) {
      .page-head h1 { font-size: 1.25rem; }
      .update-time { margin-left: 0; width: 100%; }
