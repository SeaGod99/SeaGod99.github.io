<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>天氣預報 — 水神的工具箱</title>
<style>
  :root {
    --gold: #c8a96e;
    --bg-base: #0a0c10;
    --bg-card: #12161e;
    --bg-hover: #1a2030;
    --border: #2a3040;
    --text: #d4cfc7;
    --text-dim: #7a8090;
    --accent: #4a90d9;
    --accent-dim: rgba(74,144,217,0.15);
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg-base); color: var(--text); font-family: 'Segoe UI','Noto Sans TC',sans-serif; min-height: 100vh; font-size: 18px; }

  /* Header */
  .site-header { background: var(--bg-surface); border-bottom: 1px solid var(--border); padding: 14px 28px; display: flex; align-items: center; gap: 14px; }
  .back-link { color: var(--gold); text-decoration: none; font-size: 16px; opacity: .8; transition: opacity .2s; }
  .back-link:hover { opacity: 1; }
  .sep { color: var(--border); }
  .page-title { font-size: 22px; color: var(--gold); font-weight: 600; letter-spacing: .04em; }

  .main { max-width: 1560px; margin: 0 auto; padding: 28px 28px; }

  /* ET Clock bar */
  .et-bar { background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; padding: 16px 28px; margin-bottom: 28px; display: flex; align-items: center; gap: 28px; flex-wrap: wrap; }
  .et-clock { font-size: 36px; font-weight: 700; color: var(--gold); font-variant-numeric: tabular-nums; }
  .et-label { font-size: 14px; color: var(--text-dim); margin-bottom: 3px; }
  .progress-wrap { flex: 1 1 180px; }
  .progress-bar { height: 5px; background: var(--border); border-radius: 2px; overflow: hidden; margin-top: 5px; }
  .progress-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width .5s linear; }
  .progress-text { font-size: 13px; color: var(--text-dim); margin-top: 4px; }
  .rt-clock { font-size: 16px; color: var(--text-dim); margin-left: auto; font-variant-numeric: tabular-nums; }

  /* Tabs */
  .tabs { display: flex; border-bottom: 1px solid var(--border); margin-bottom: 24px; gap: 0; }
  .tab { background: none; border: none; border-bottom: 2px solid transparent; padding: 12px 26px; color: var(--text-dim); font-size: 17px; cursor: pointer; margin-bottom: -1px; transition: color .15s, border-color .15s; }
  .tab:hover { color: var(--text); }
  .tab.active { color: var(--gold); border-bottom-color: var(--gold); }
  .tab-content { display: none; }
  .tab-content.active { display: block; }

  /* Zone selector */
  .zone-controls { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; margin-bottom: 18px; }
  .grp-btn { background: var(--bg-card); border: 1px solid var(--border); border-radius: 6px; color: var(--text-dim); padding: 7px 18px; font-size: 15px; cursor: pointer; transition: all .15s; }
  .grp-btn:hover { border-color: var(--gold); color: var(--gold); }
  .grp-btn.active { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }
  select { background: var(--bg-card); border: 1px solid var(--border); border-radius: 6px; color: var(--text); padding: 8px 16px; font-size: 16px; cursor: pointer; outline: none; min-width: 240px; }
  select:focus { border-color: var(--gold); }

  /* Section title */
  .sec-title { font-size: 16px; color: var(--gold); font-weight: 600; margin-bottom: 14px; display: flex; align-items: center; gap: 8px; }
  .sec-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }

  /* Forecast grid */
  .forecast-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 32px; }
  .fc-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 10px; padding: 16px 20px; }
  .fc-card.now { border-color: var(--accent); background: var(--accent-dim); }
  .fc-time { font-size: 15px; color: var(--text-dim); margin-bottom: 7px; font-variant-numeric: tabular-nums; }
  .fc-card.now .fc-time { color: var(--accent); }
  .fc-weather { font-size: 22px; font-weight: 700; display: flex; align-items: center; gap: 8px; }
  .fc-icon { font-size: 26px; }
  .fc-rt { font-size: 14px; color: var(--text-dim); margin-top: 6px; }

  /* Search panel */
  .search-panel { background: var(--bg-card); border: 1px solid var(--border); border-radius: 10px; padding: 20px 22px; margin-bottom: 24px; }
  .chips { display: flex; flex-wrap: wrap; gap: 8px; margin: 12px 0 16px; }
  .chip { background: var(--bg-hover); border: 1px solid rgba(255,255,255,0.2); border-radius: 20px; padding: 6px 14px; font-size: 15px; cursor: pointer; transition: all .15s; display: flex; align-items: center; gap: 5px; color: var(--text); }
  .chip:hover { border-color: var(--gold); color: var(--gold); }
  .chip.on { background: rgba(200,169,110,.2); border-color: var(--gold); color: var(--gold); }
  .results { display: flex; flex-direction: column; gap: 6px; }
  .result-row { background: var(--bg-hover); border-radius: 6px; padding: 11px 18px; display: flex; gap: 18px; align-items: center; font-size: 16px; }
  .r-idx { color: var(--text-dim); min-width: 26px; }
  .r-et { font-weight: 600; color: var(--gold); min-width: 100px; font-variant-numeric: tabular-nums; }
  .r-rt { color: var(--text-dim); font-size: 14px; font-variant-numeric: tabular-nums; }
  .empty { color: var(--text-dim); font-size: 15px; padding: 8px 0; }

  /* Multi-zone */
  .mz-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 14px; }
  .mz-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 10px; padding: 17px 19px; }
  .mz-name { font-size: 15px; color: var(--text-dim); font-weight: 600; margin-bottom: 12px; letter-spacing: .03em; }
  .mz-row { display: flex; gap: 8px; }
  .mz-cell { flex: 1; text-align: center; background: var(--bg-hover); border-radius: 6px; padding: 10px 5px; }
  .mz-cell.now { background: var(--accent-dim); }
  .mz-icon { font-size: 22px; display: block; }
  .mz-wname { font-size: 13px; color: var(--text-dim); margin-top: 4px; line-height: 1.3; }
  .mz-when { font-size: 12px; color: var(--text-dim); margin-top: 2px; }

  /* Chain search */
  .chain-panel { background: var(--bg-card); border: 1px solid var(--border); border-radius: 10px; padding: 20px 22px; margin-bottom: 24px; }
  .chain-row { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; margin-bottom: 16px; }
  .chain-arrow { color: var(--text-dim); font-size: 24px; }
  .chain-desc { font-size: 14px; color: var(--text-dim); margin-bottom: 16px; }
</style>
  <link rel="stylesheet" href="../../assets/css/theme.css">
  <script src="../../assets/js/theme.js"></script>
</head>
<body>

<header class="site-header">
  <a href="../../" class="back-link">&larr; 水神的工具箱</a>
  <span class="sep">›</span>
  <span class="page-title">⛅ 艾歐澤亞天氣預報</span>
</header>

<main class="main">

  <!-- ET Clock -->
  <div class="et-bar">
    <div>
      <div class="et-label">艾歐澤亞時間</div>
      <div class="et-clock" id="et-clock">00:00</div>
    </div>
    <div class="progress-wrap">
      <div class="et-label">下次換天氣</div>
      <div class="progress-bar"><div class="progress-fill" id="prog-fill" style="width:0%"></div></div>
      <div class="progress-text" id="prog-text">--</div>
    </div>
    <div class="rt-clock" id="rt-clock"></div>
  </div>

  <!-- Tabs -->
  <div class="tabs">
    <button class="tab active" onclick="switchTab('single')">單地圖預報</button>
    <button class="tab" onclick="switchTab('multi')">多地圖概覽</button>
    <button class="tab" onclick="switchTab('chain')">天氣鏈搜尋</button>
  </div>

  <!-- Tab: Single -->
  <div class="tab-content active" id="tab-single">
    <div class="zone-controls">
      <button class="grp-btn active" id="grp-lanoscea" onclick="setGroup('lanoscea')">拉諾西亞</button>
      <button class="grp-btn" id="grp-thanalan"  onclick="setGroup('thanalan')">薩納蘭</button>
      <button class="grp-btn" id="grp-shroud"    onclick="setGroup('shroud')">黑衣森林</button>
      <button class="grp-btn" id="grp-hw"        onclick="setGroup('hw')">3.0 蒼天</button>
      <button class="grp-btn" id="grp-sb"        onclick="setGroup('sb')">4.0 紅蓮</button>
      <button class="grp-btn" id="grp-shb"       onclick="setGroup('shb')">5.0 暗影</button>
      <button class="grp-btn" id="grp-ew"        onclick="setGroup('ew')">6.0 曉月</button>
      <button class="grp-btn" id="grp-dt"        onclick="setGroup('dt')">7.0 金曦</button>
      <button class="grp-btn" id="grp-eureka"    onclick="setGroup('eureka')">優雷卡 ⚠️</button>
      <select id="zone-sel" onchange="onZoneChange()"></select>
    </div>
    <div id="unverified-notice" style="display:none;background:rgba(248,190,0,0.12);border:1px solid rgba(248,190,0,0.4);border-radius:7px;padding:9px 14px;font-size:13px;color:#f8be00;margin-bottom:14px;">
      ⚠️ 優雷卡天氣表為社群推測值（maps.json 無官方資料），可能不完全準確。如發現錯誤歡迎回報。
    </div>
    <div class="sec-title">未來 24 個天氣時段</div>
    <div class="forecast-grid" id="forecast-grid"></div>
    <div class="search-panel">
      <div class="sec-title" style="margin-bottom:8px;">🔍 目標天氣搜尋</div>
      <div class="chips" id="weather-chips"></div>
      <div class="results" id="search-results"><div class="empty">點選上方天氣標籤以搜尋下次出現時間</div></div>
    </div>
  </div>

  <!-- Tab: Multi -->
  <div class="tab-content" id="tab-multi">
    <div class="zone-controls" style="margin-bottom:16px;">
      <button class="grp-btn active" id="mgrp-lanoscea" onclick="setMGroup('lanoscea')">拉諾西亞</button>
      <button class="grp-btn" id="mgrp-thanalan"  onclick="setMGroup('thanalan')">薩納蘭</button>
      <button class="grp-btn" id="mgrp-shroud"    onclick="setMGroup('shroud')">黑衣森林</button>
      <button class="grp-btn" id="mgrp-hw"        onclick="setMGroup('hw')">3.0 蒼天</button>
      <button class="grp-btn" id="mgrp-sb"        onclick="setMGroup('sb')">4.0 紅蓮</button>
      <button class="grp-btn" id="mgrp-shb"       onclick="setMGroup('shb')">5.0 暗影</button>
      <button class="grp-btn" id="mgrp-ew"        onclick="setMGroup('ew')">6.0 曉月</button>
      <button class="grp-btn" id="mgrp-dt"        onclick="setMGroup('dt')">7.0 金曦</button>
      <button class="grp-btn" id="mgrp-eureka"    onclick="setMGroup('eureka')">優雷卡 ⚠️</button>
    </div>
    <div class="mz-grid" id="mz-grid"></div>
  </div>

  <!-- Tab: Chain -->
  <div class="tab-content" id="tab-chain">
    <div class="chain-panel">
      <div class="sec-title" style="margin-bottom:6px;">⛓ 天氣鏈搜尋</div>
      <div class="chain-desc">搜尋「前一天氣 → 目標天氣」連續出現的時間點，適合釣魚王、農場活動。</div>
      <div class="chain-row">
        <span style="font-size:13px;color:var(--text-dim);">地圖：</span>
        <select id="chain-zone" onchange="onChainZoneChange()"></select>
        <span style="font-size:13px;color:var(--text-dim);">前天氣：</span>
        <select id="chain-prev" onchange="renderChain()"></select>
        <span class="chain-arrow">→</span>
        <span style="font-size:13px;color:var(--text-dim);">目標：</span>
        <select id="chain-next" onchange="renderChain()"></select>
      </div>
      <div class="results" id="chain-results"><div class="empty">請選擇天氣組合</div></div>
    </div>
  </div>

</main>

<script type="module">
import {
  WEATHER_PERIOD, periodStart, wi,
  initWeatherTables, getWeatherAt, getWeatherTable,
  fmtET, fmtRT, fmtCountdown
} from '../../assets/js/eorzea-weather.js';

// ============================================================

// 6.0/7.0 天氣表已由 maps.json weatherRates 提供（台服官方資料），不再是推測值
// ============================================================
const GROUPS = {

      { mapId:6, name:'黑衣森林南部林區' },

  },

};

// ============================================================
// State
// ============================================================
let curGroup = 'lanoscea';
let curZone  = 11;
let selWeathers = new Set();
let curMGroup = 'lanoscea';

// ============================================================
// Single zone tab
// ============================================================
function populateZoneSel(selId, groupKey) {
  const sel = document.getElementById(selId);
  sel.innerHTML = '';
  for (const z of GROUPS[groupKey].zones) {
    const o = document.createElement('option');
    o.value = z.mapId; o.textContent = z.name;
    sel.appendChild(o);
  }
}

function setGroup(g) {
  curGroup = g;
  Object.keys(GROUPS).forEach(k => document.getElementById('grp-'+k)?.classList.toggle('active', k===g));
  populateZoneSel('zone-sel', g);
  curZone = Number(document.getElementById('zone-sel').value);
  selWeathers.clear();
  // 顯示/隱藏未驗證警告
  const notice = document.getElementById('unverified-notice');
  if (notice) notice.style.display = GROUPS[g]?.unverified ? 'block' : 'none';
  renderForecast(); renderChips(); renderSearch();
}

function onZoneChange() {
  curZone = Number(document.getElementById('zone-sel').value);
  selWeathers.clear();
  renderForecast(); renderChips(); renderSearch();
}

function renderForecast() {
  const now = Date.now();
  const cur = periodStart(now);
  const grid = document.getElementById('forecast-grid');
  grid.innerHTML = Array.from({length:12}, (_,i) => {
    const t = cur + i * WEATHER_PERIOD;
    const w = getWeatherAt(curZone, t);
    const info = wi(w);
    const isNow = i === 0;
    const diff = t - now;
    return `<div class="fc-card${isNow?' now':''}">
      <div class="fc-time">${fmtET(t)}${isNow?' ⟵ 現在':''}</div>
      <div class="fc-weather"><span class="fc-icon">${info.icon}</span>${info.name}</div>
      <div class="fc-rt">${fmtRT(t)} ${isNow?'':`（${fmtCountdown(diff)}）`}</div>
    </div>`;
  }).join('');
}

function renderChips() {
  const weathers = [...new Set(getWeatherTable(curZone)?.map(([,k])=>k) || [])];
  document.getElementById('weather-chips').innerHTML = weathers.map(w => {
    const info = wi(w);
    return `<button class="chip${selWeathers.has(w)?' on':''}" onclick="toggleW('${w}')">${info.icon} ${info.name}</button>`;
  }).join('');
}

function toggleW(w) {
  selWeathers.has(w) ? selWeathers.delete(w) : selWeathers.add(w);
  renderChips(); renderSearch();
}

function renderSearch() {
  const el = document.getElementById('search-results');
  if (!selWeathers.size) { el.innerHTML = '<div class="empty">點選上方天氣標籤以搜尋下次出現時間</div>'; return; }
  const now = Date.now();
  const cur = periodStart(now);
  const rows = [];
  for (let i = 0; i < 480 && rows.length < 12; i++) {
    const t = cur + i * WEATHER_PERIOD;
    const w = getWeatherAt(curZone, t);
    if (selWeathers.has(w)) {
      const info = wi(w);
      const diff = t - now;
      rows.push(`<div class="result-row">
        <span class="r-idx">#${rows.length+1}</span>
        <span class="r-et">${fmtET(t)}</span>
        <span>${info.icon} ${info.name}</span>
        <span class="r-rt">${fmtRT(t)} ${diff>0?`（${fmtCountdown(diff)}）`:'（現在）'}</span>
      </div>`);
    }
  }
  el.innerHTML = rows.length ? rows.join('') : '<div class="empty">未來 480 個時段內未找到。</div>';
}

// ============================================================
// Multi zone tab
// ============================================================
function setMGroup(g) {
  curMGroup = g;
  Object.keys(GROUPS).forEach(k => document.getElementById('mgrp-'+k)?.classList.toggle('active', k===g));
  // 顯示/隱藏未驗證警告（多地圖概覽用同一個 notice 元素）
  const notice = document.getElementById('unverified-notice');
  if (notice) notice.style.display = GROUPS[g]?.unverified ? 'block' : 'none';
  renderMulti();
}

function renderMulti() {
  const now = Date.now();
  const cur = periodStart(now);
  const zones = GROUPS[curMGroup]?.zones || [];
  document.getElementById('mz-grid').innerHTML = zones.map(z => {
    const cells = [0,1,2].map(i => {
      const t = cur + i * WEATHER_PERIOD;
      const w = getWeatherAt(z.mapId, t);
      const info = wi(w);
      const diff = t - now;
      const when = i===0 ? '現在' : '+'+Math.round(diff/60000)+'分';
      return `<div class="mz-cell${i===0?' now':''}">
        <span class="mz-icon">${info.icon}</span>
        <div class="mz-wname">${info.name}</div>
        <div class="mz-when">${when}</div>
      </div>`;
    }).join('');
    return `<div class="mz-card"><div class="mz-name">${z.name}</div><div class="mz-row">${cells}</div></div>`;
  }).join('');
}

// ============================================================
// Chain search tab
// ============================================================
let chainZone = 17; // 東拉諾西亞

function initChain() {
  // 用所有地圖做 chain zone select
  const allZones = Object.values(GROUPS).flatMap(g => g.zones);
  const sel = document.getElementById('chain-zone');
  const seen = new Set();
  allZones.forEach(z => {
    if (!seen.has(z.mapId)) { seen.add(z.mapId); const o=document.createElement('option'); o.value=z.mapId; o.textContent=z.name; sel.appendChild(o); }
  });
  sel.value = chainZone;
  onChainZoneChange();
}

function onChainZoneChange() {
  chainZone = Number(document.getElementById('chain-zone').value);
  const weathers = [...new Set(getWeatherTable(chainZone)?.map(([,k])=>k) || [])];
  const mkOpts = () => '<option value="">（任意）</option>' +
    weathers.map(w => { const i=wi(w); return `<option value="${w}">${i.icon} ${i.name}</option>`; }).join('');
  document.getElementById('chain-prev').innerHTML = mkOpts();
  document.getElementById('chain-next').innerHTML = mkOpts();
  renderChain();
}

function renderChain() {
  const prev = document.getElementById('chain-prev').value;
  const next = document.getElementById('chain-next').value;
  const el   = document.getElementById('chain-results');
  if (!prev && !next) { el.innerHTML = '<div class="empty">請選擇前天氣或目標天氣</div>'; return; }
  const now = Date.now();
  const cur = periodStart(now);
  const rows = [];
  for (let i = 1; i < 480 && rows.length < 12; i++) {
    const tPrev = cur + (i-1)*WEATHER_PERIOD;
    const tNext = cur + i*WEATHER_PERIOD;
    const wPrev = getWeatherAt(chainZone, tPrev);
    const wNext = getWeatherAt(chainZone, tNext);
    if ((!prev||wPrev===prev) && (!next||wNext===next)) {
      const iP=wi(wPrev), iN=wi(wNext);
      const diff = tNext - now;
      rows.push(`<div class="result-row">
        <span class="r-idx">#${rows.length+1}</span>
        <span class="r-et">${fmtET(tNext)}</span>
        <span>${iP.icon}${iP.name} → ${iN.icon}${iN.name}</span>
        <span class="r-rt">${fmtRT(tNext)} ${diff>0?`（${fmtCountdown(diff)}）`:'（現在）'}</span>
      </div>`);
    }
  }
  el.innerHTML = rows.length ? rows.join('') : '<div class="empty">未來 480 個時段內未找到。</div>';
}

// ============================================================
// Tab switch
// ============================================================
function switchTab(name) {
  document.querySelectorAll('.tab').forEach((b,i)=>b.classList.toggle('active',['single','multi','chain'][i]===name));
  document.querySelectorAll('.tab-content').forEach(c=>c.classList.toggle('active', c.id==='tab-'+name));
  if (name==='multi') renderMulti();
}

// ============================================================
// Clock
// ============================================================
function tick() {
  const now = Date.now();
  // ET clock
  const etSec = now / 1000 * (24 * 3600 / 4200);
  const h = String(Math.floor(etSec/3600)%24).padStart(2,'0');
  const m = String(Math.floor(etSec/60)%60).padStart(2,'0');
  document.getElementById('et-clock').textContent = `${h}:${m}`;
  // RT clock
  const d = new Date(now);
  document.getElementById('rt-clock').textContent =
    `現實 ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}:${String(d.getSeconds()).padStart(2,'0')}`;
  // Progress
  const ps = periodStart(now);
  const pct = ((now-ps)/WEATHER_PERIOD*100).toFixed(1);
  const rem = WEATHER_PERIOD - (now-ps);
  document.getElementById('prog-fill').style.width = pct+'%';
  document.getElementById('prog-text').textContent = fmtCountdown(rem);
}

// ============================================================
// Expose handlers used by inline onclick="" (module scope is not global)
// ============================================================
window.switchTab = switchTab;
window.setGroup = setGroup;
window.setMGroup = setMGroup;
window.onZoneChange = onZoneChange;
window.onChainZoneChange = onChainZoneChange;
window.renderChain = renderChain;
window.toggleW = toggleW;

// ============================================================
// Init
// ============================================================
(async function init() {
  await initWeatherTables('../../data/maps.json');
  // 初始化分組按鈕（只顯示對應到 GROUPS 的按鈕）
  Object.keys(GROUPS).forEach(k => {
    const btn = document.getElementById('grp-'+k);
    if (!btn) return;
    btn.textContent = GROUPS[k].label || k;
  });
  setGroup('lanoscea');
  initChain();
  tick();
  setInterval(tick, 1000);
  setInterval(() => {
    renderForecast(); renderSearch(); renderChain();
    if (document.getElementById('tab-multi').classList.contains('active')) renderMulti();
  }, 20000);
})();
</script>
