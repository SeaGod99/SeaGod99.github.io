<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="FF14 寵物收藏追蹤 — 查詢所有隨從寵物、行為與來源篩選、記錄擁有進度">
  <title>寵物收藏追蹤 | 水神的工具箱</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-base:    #0a0c10;
      --bg-surface: #0f1117;
      --bg-card:    #14181f;
      --bg-card-hover: #1a1f2b;
      --border:     rgba(255,255,255,0.07);
      --border-hover: rgba(200,169,110,0.4);

      --gold:       #c8a96e;
      --gold-light: #e2c98a;
      --gold-dim:   rgba(200,169,110,0.15);
      --purple:     #a78bfa;
      --purple-dim: rgba(167,139,250,0.12);
      --green:      #4ade80;
      --green-dim:  rgba(74,222,128,0.12);
      --blue:       #4fc3f7;
      --red:        #f87171;

      --text-primary:   #e8eaf0;
      --text-secondary: #8892a4;
      --text-muted:     #717c91;

      --radius-sm: 6px;
      --radius-md: 10px;
      --radius-lg: 16px;
      --transition: 0.18s cubic-bezier(0.4,0,0.2,1);
    }

    html { scroll-behavior: smooth; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans TC', sans-serif;
      background: var(--bg-base);
      color: var(--text-primary);
      min-height: 100vh;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

    body::before {
      content: '';
      position: fixed; inset: 0;
      background:
        radial-gradient(ellipse 80% 50% at 20% 0%, rgba(200,169,110,0.05) 0%, transparent 60%),
        radial-gradient(ellipse 60% 40% at 80% 100%, rgba(79,195,247,0.04) 0%, transparent 60%);
      pointer-events: none; z-index: 0;
    }

    a { color: inherit; text-decoration: none; }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 20px;
      position: relative;
      z-index: 1;
    }

    /* ── Header ── */
    .page-header {
      padding: 36px 0 28px;
      display: flex;
      align-items: center;
      gap: 16px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 28px;
      flex-wrap: wrap;
    }

    .back-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      color: var(--text-secondary);
      padding: 6px 12px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      transition: var(--transition);
    }
    .back-btn:hover { color: var(--gold); border-color: var(--border-hover); }

    .page-title-wrap { flex: 1; }

    .page-title {
      font-size: 22px;
      font-weight: 700;
      color: var(--gold-light);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .page-subtitle {
      font-size: 13px;
      color: var(--text-secondary);
      margin-top: 4px;
    }

    /* ── Progress bar ── */
    .progress-bar-wrap {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 16px 20px;
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      gap: 20px;
      flex-wrap: wrap;
    }

    .progress-info {
      font-size: 22px;
      font-weight: 700;
      color: var(--gold-light);
      white-space: nowrap;
    }
    .progress-info span {
      font-size: 13px;
      font-weight: 400;
      color: var(--text-secondary);
      margin-left: 6px;
    }

    .progress-track {
      flex: 1;
      min-width: 120px;
      height: 8px;
      background: var(--raise);
      border-radius: 99px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--gold), var(--gold-light));
      border-radius: 99px;
      transition: width 0.4s ease;
    }

    .progress-pct {
      font-size: 14px;
      color: var(--text-secondary);
      white-space: nowrap;
    }

    /* ── Toolbar ── */
    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 18px;
      align-items: center;
    }

    .search-wrap {
      position: relative;
      flex: 1;
      min-width: 180px;
    }
    .search-icon {
      position: absolute;
      left: 11px; top: 50%;
      transform: translateY(-50%);
      font-size: 14px;
      color: var(--text-muted);
      pointer-events: none;
    }
    .search-input {
      width: 100%;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text-primary);
      font-size: 13px;
      padding: 8px 12px 8px 34px;
      outline: none;
      transition: var(--transition);
    }
    .search-input:focus { border-color: rgba(200,169,110,0.5); }
    .search-input::placeholder { color: var(--text-muted); }

    .own-toggle {
      display: flex;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      overflow: hidden;
    }
    .own-btn {
      padding: 8px 14px;
      font-size: 12px;
      cursor: pointer;
      border: none;
      background: transparent;
      color: var(--text-secondary);
      transition: var(--transition);
      white-space: nowrap;
    }
    .own-btn.active { background: var(--gold-dim); color: var(--gold-light); }
    .own-btn:hover:not(.active) { color: var(--text-primary); }

    .icon-btn {
      padding: 8px 14px;
      font-size: 12px;
      cursor: pointer;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text-muted);
      transition: var(--transition);
      white-space: nowrap;
    }
    .icon-btn:hover { color: var(--text-primary); border-color: rgba(255,255,255,0.2); }
    .icon-btn.danger:hover { color: var(--red); border-color: rgba(248,113,113,0.4); }

    /* ── Filter tags ── */
    .filter-section {
      margin-bottom: 18px;
    }
    .filter-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--text-muted);
      margin-bottom: 8px;
    }
    .filter-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    .filter-tag {
      padding: 4px 12px;
      font-size: 12px;
      border: 1px solid var(--border);
      border-radius: 99px;
      cursor: pointer;
      background: transparent;
      color: var(--text-secondary);
      transition: var(--transition);
    }
    .filter-tag:hover { color: var(--text-primary); border-color: rgba(255,255,255,0.2); }
    .filter-tag.active {
      background: var(--gold-dim);
      border-color: rgba(200,169,110,0.4);
      color: var(--gold-light);
    }

    /* ── Result count ── */
    .result-meta {
      font-size: 12px;
      color: var(--text-muted);
      margin-bottom: 14px;
    }
    .result-meta em { color: var(--text-secondary); font-style: normal; }

    /* ── Minion grid ── */
    .minion-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(96px, 1fr));
      gap: 8px;
    }

    /* ── Minion card ── */
    .minion-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 10px 6px 8px;
      cursor: pointer;
      transition: var(--transition);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      position: relative;
      user-select: none;
    }
    .minion-card:hover {
      border-color: rgba(200,169,110,0.3);
      background: var(--bg-card-hover);
      transform: translateY(-1px);
    }
    .minion-card.owned {
      border-color: rgba(74,222,128,0.4);
      background: rgba(74,222,128,0.05);
    }
    .minion-card.owned .minion-name { color: var(--green); }

    .minion-icon-wrap {
      position: relative;
      width: 48px;
      height: 48px;
    }
    .minion-icon {
      width: 48px;
      height: 48px;
      border-radius: var(--radius-sm);
      object-fit: cover;
      background: var(--raise);
      display: block;
    }
    .check-badge {
      position: absolute;
      bottom: -4px;
      right: -4px;
      width: 18px;
      height: 18px;
      background: var(--green);
      border: 2px solid var(--bg-base);
      border-radius: 50%;
      display: none;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      color: #0a0c10;
      font-weight: 700;
    }
    .minion-card.owned .check-badge { display: flex; }

    .minion-name {
      font-size: 11px;
      color: var(--text-secondary);
      text-align: center;
      line-height: 1.3;
      word-break: break-all;
      max-width: 100%;
    }

    /* ── Empty state ── */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-muted);
      font-size: 14px;
    }

    /* ── Tooltip ── */
    .tooltip {
      position: fixed;
      background: var(--bg-card);
      border: 1px solid rgba(200,169,110,0.3);
      border-radius: var(--radius-md);
      padding: 10px 14px;
      font-size: 12px;
      color: var(--text-secondary);
      max-width: 240px;
      pointer-events: none;
      z-index: 999;
      opacity: 0;
      transition: opacity 0.15s;
      line-height: 1.5;
    }
    .tooltip.show { opacity: 1; }
    .tooltip .tt-name {
      font-size: 13px;
      font-weight: 600;
      color: var(--gold-light);
      margin-bottom: 4px;
    }
    .tooltip .tt-row {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 2px;
    }
    .tooltip .tt-source {
      display: inline-block;
      font-size: 11px;
      background: var(--gold-dim);
      color: var(--gold);
      border-radius: 4px;
      padding: 1px 6px;
      margin-top: 6px;
      margin-right: 4px;
    }
    .tooltip .tt-placeholder {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 6px;
      font-style: italic;
    }

    /* ── Footer ── */
    .page-footer {
      border-top: 1px solid var(--border);
      padding: 24px 0 32px;
      text-align: center;
      margin-top: 48px;
    }
    .footer-text { font-size: 12px; color: var(--text-muted); line-height: 2; }
    .footer-text a { color: var(--text-secondary); transition: var(--transition); }
    .footer-text a:hover { color: var(--gold); }

    /* ── Responsive ── */
    @media (max-width: 600px) {
      .page-header { flex-wrap: wrap; padding: 24px 0 20px; }
      .minion-grid { grid-template-columns: repeat(auto-fill, minmax(76px, 1fr)); gap: 6px; }
      .progress-bar-wrap { flex-wrap: wrap; }
    }
  </style>
  <script src="../assets/js/patch-gate.js"></script>
  <link rel="stylesheet" href="../assets/css/theme.css">
  <script src="../assets/js/theme.js"></script>
</head>
<body>

<div class="container">

  <!-- Header -->
  <header class="page-header">
    <a href="../" class="back-btn">← 水神的工具箱</a>
    <div class="page-title-wrap">
      <h1 class="page-title">🐣 寵物收藏追蹤</h1>
      <p class="page-subtitle">點擊寵物卡片標記已擁有，進度自動儲存於瀏覽器</p>
    </div>
  </header>

  <!-- Progress -->
  <div class="progress-bar-wrap">
    <div class="progress-info">
      <span id="ownedCount">0</span> / <span id="totalCount">0</span>
      <span>已擁有</span>
    </div>
    <div class="progress-track">
      <div class="progress-fill" id="progressFill" style="width:0%"></div>
    </div>
    <div class="progress-pct" id="progressPct">0%</div>
  </div>

  <!-- Toolbar -->
  <div class="toolbar">
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input class="search-input" type="text" id="searchInput" placeholder="搜尋寵物名稱…" autocomplete="off">
    </div>
    <div class="own-toggle">
      <button class="own-btn active" data-own="all">全部</button>
      <button class="own-btn" data-own="owned">已擁有</button>
      <button class="own-btn" data-own="missing">未擁有</button>
    </div>
    <button class="icon-btn" id="exportBtn">匯出進度</button>
    <button class="icon-btn" id="importBtn">匯入進度</button>
    <input type="file" id="importFile" accept="application/json" style="display:none">
    <button class="icon-btn danger" id="clearBtn">清除進度</button>
  </div>

  <!-- Behavior filter -->
  <div class="filter-section">
    <div class="filter-label">行為篩選</div>
    <div class="filter-tags" id="behaviorFilters"></div>
  </div>

  <!-- Source type filter -->
  <div class="filter-section">
    <div class="filter-label">來源篩選</div>
    <div class="filter-tags" id="sourceFilters"></div>
  </div>

  <!-- Result meta -->
  <div class="result-meta" id="resultMeta"></div>

  <!-- Grid -->
  <div class="minion-grid" id="minionGrid"></div>

  <div class="empty-state" id="emptyState" style="display:none">
    找不到符合條件的寵物
  </div>

</div>

<!-- Footer -->
<footer class="page-footer">
  <div class="container">
    <p class="footer-text">
      <a href="../">水神的工具箱</a> · 資料來源：遊戲本體、<a href="https://xivapi.com" target="_blank">XIVAPI</a>、<a href="https://ffxivteamcraft.com" target="_blank">Teamcraft</a>
    </p>
    <p class="footer-text" style="margin-top:4px">
      FINAL FANTASY XIV © SQUARE ENIX　此為玩家自製非官方工具
    </p>
  </div>
</footer>

<!-- Tooltip -->
<div class="tooltip" id="tooltip">
  <div class="tt-name" id="ttName"></div>
  <div class="tt-row" id="ttMeta"></div>
  <div id="ttSources"></div>
</div>

<script>
(function() {
  const STORAGE_KEY = 'ffxiv_minions_owned';
  const DATA_URL = '../data/minions.json';

  // 行為英→中對照
  const BEHAVIOR_LABELS = {
    'Independent': '獨立行動',
    'Obedient':    '聽從指令',
    'Stationary':  '靜止不動',
  };
  const BEHAVIORS = ['Independent', 'Obedient', 'Stationary'];

  // ── State ──
  let MINION_DATA = [];
  let SOURCE_TYPES = [];
  let owned = new Set(JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'));
  let filterOwn = 'all';       // all | owned | missing
  let filterBehavior = null;   // string | null
  let filterSource = null;     // string | null  ('__none__' = 待補充)
  let searchQ = '';

  const $ = id => document.getElementById(id);

  // ── Save ──
  function save() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify([...owned]));
  }

  // ── Toggle ──
  function toggle(id) {
    if (owned.has(id)) owned.delete(id);
    else owned.add(id);
    save();
    updateProgress();
    renderGrid();
  }

  // ── Progress ──
  function updateProgress() {
    const total = MINION_DATA.length;
    const count = MINION_DATA.filter(m => owned.has(m.id)).length;
    const pct = total ? Math.round(count / total * 100) : 0;
    $('ownedCount').textContent = count;
    $('totalCount').textContent = total;
    $('progressFill').style.width = pct + '%';
    $('progressPct').textContent = pct + '%';
  }

  // ── Render behavior filters ──
  function renderBehaviorFilters() {
    const wrap = $('behaviorFilters');
    wrap.innerHTML = '';
    BEHAVIORS.forEach(b => {
      if (!MINION_DATA.some(m => m.behavior === b)) return;
      const btn = document.createElement('button');
      btn.className = 'filter-tag' + (filterBehavior === b ? ' active' : '');
      btn.textContent = BEHAVIOR_LABELS[b] || b;
      btn.addEventListener('click', () => {
        filterBehavior = filterBehavior === b ? null : b;
        renderBehaviorFilters();
        renderGrid();
      });
      wrap.appendChild(btn);
    });
  }

  // ── Render source filters ──
  function renderSourceFilters() {
    const wrap = $('sourceFilters');
    wrap.innerHTML = '';
    SOURCE_TYPES.forEach(type => {
      const btn = document.createElement('button');
      btn.className = 'filter-tag' + (filterSource === type ? ' active' : '');
      btn.textContent = type;
      btn.addEventListener('click', () => {
        filterSource = filterSource === type ? null : type;
        renderSourceFilters();
        renderGrid();
      });
      wrap.appendChild(btn);
    });

    // 待補充（sources 為空陣列）
    const noneBtn = document.createElement('button');
    noneBtn.className = 'filter-tag' + (filterSource === '__none__' ? ' active' : '');
    noneBtn.textContent = '待補充';
    noneBtn.addEventListener('click', () => {
      filterSource = filterSource === '__none__' ? null : '__none__';
      renderSourceFilters();
      renderGrid();
    });
    wrap.appendChild(noneBtn);
  }

  // ── Filter minions ──
  function filtered() {
    return MINION_DATA.filter(m => {
      // ownership
      if (filterOwn === 'owned'   && !owned.has(m.id)) return false;
      if (filterOwn === 'missing' &&  owned.has(m.id)) return false;

      // behavior
      if (filterBehavior && m.behavior !== filterBehavior) return false;

      // source
      if (filterSource === '__none__') {
        if (m.sources.length > 0) return false;
      } else if (filterSource) {
        if (!m.sources.some(s => s.type === filterSource)) return false;
      }

      // search
      if (searchQ && !m.name.includes(searchQ)) return false;

      return true;
    });
  }

  // ── Render grid ──
  function renderGrid() {
    const list = filtered();
    const grid = $('minionGrid');
    const empty = $('emptyState');
    const meta = $('resultMeta');

    grid.innerHTML = '';
    if (list.length === 0) {
      grid.style.display = 'none';
      empty.style.display = '';
    } else {
      grid.style.display = '';
      empty.style.display = 'none';
    }

    const ownedInView = list.filter(m => owned.has(m.id)).length;
    meta.innerHTML = `顯示 <em>${list.length}</em> / ${MINION_DATA.length} 隻 · 已擁有 <em>${ownedInView}</em> / ${list.length}`;

    const frag = document.createDocumentFragment();
    list.forEach(m => {
      const isOwned = owned.has(m.id);
      const card = document.createElement('div');
      card.className = 'minion-card' + (isOwned ? ' owned' : '');
      card.dataset.id = m.id;

      card.innerHTML = `
        <div class="minion-icon-wrap">
          <img class="minion-icon" src="${m.icon}" alt="${m.name}" loading="lazy" decoding="async"
               onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%2248%22 height=%2248%22><rect fill=%22%23ffffff08%22 width=%2248%22 height=%2248%22 rx=%226%22/></svg>'">
          <div class="check-badge">✓</div>
        </div>
        <div class="minion-name">${m.name}</div>
      `;

      card.addEventListener('click', () => toggle(m.id));
      card.addEventListener('mouseenter', e => showTooltip(e, m));
      card.addEventListener('mouseleave', hideTooltip);
      card.addEventListener('mousemove', moveTooltip);

      frag.appendChild(card);
    });
    grid.appendChild(frag);
  }

  // ── Tooltip ──
  function showTooltip(e, m) {
    $('ttName').textContent = m.name;
    $('ttMeta').textContent = `行為：${BEHAVIOR_LABELS[m.behavior] || m.behavior}　版本：${m.patch}`;

    const srcWrap = $('ttSources');
    if (m.sources && m.sources.length > 0) {
      srcWrap.innerHTML = m.sources.map(s =>
        `<span class="tt-source">${s.type}${s.detail ? '：' + s.detail : ''}</span>`
      ).join('');
    } else {
      srcWrap.innerHTML = `<div class="tt-placeholder">取得方式：待補充</div>`;
    }

    $('tooltip').classList.add('show');
    moveTooltip(e);
  }
  function hideTooltip() {
    $('tooltip').classList.remove('show');
  }
  function moveTooltip(e) {
    const tt = $('tooltip');
    const x = e.clientX + 14;
    const y = e.clientY + 14;
    const w = tt.offsetWidth;
    const h = tt.offsetHeight;
    tt.style.left = (x + w > window.innerWidth  ? x - w - 20 : x) + 'px';
    tt.style.top  = (y + h > window.innerHeight ? y - h - 20 : y) + 'px';
  }

  // ── Own-toggle buttons ──
  document.querySelectorAll('.own-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      filterOwn = btn.dataset.own;
      document.querySelectorAll('.own-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderGrid();
    });
  });

  // ── Search ──
  $('searchInput').addEventListener('input', e => {
    searchQ = e.target.value.trim();
    renderGrid();
  });

  // ── Clear ──
  $('clearBtn').addEventListener('click', () => {
    if (!confirm('確定要清除所有擁有記錄嗎？')) return;
    owned.clear();
    save();
    updateProgress();
    renderGrid();
  });

  // ── Export ──
  $('exportBtn').addEventListener('click', () => {
    const payload = {
      schema: 'minions_owned',
      exported: new Date().toISOString(),
      owned: [...owned],
    };
    const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'minions_owned.json';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  });

  // ── Import ──
  $('importBtn').addEventListener('click', () => $('importFile').click());
  $('importFile').addEventListener('change', e => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      try {
        const data = JSON.parse(ev.target.result);
        const list = Array.isArray(data) ? data : data.owned;
        if (!Array.isArray(list)) throw new Error('格式錯誤');
        owned = new Set(list.map(Number));
        save();
        updateProgress();
        renderGrid();
        alert(`已匯入 ${owned.size} 筆擁有記錄`);
      } catch (err) {
        alert('匯入失敗：檔案格式不正確');
      }
      $('importFile').value = '';
    };
    reader.readAsText(file);
  });

  // ── Load data ──
  async function loadData() {
    try {
      const res = await fetch(DATA_URL);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const json = await res.json();
      const gp = await PatchGate.loadGamePatch('../data/_meta.json');

      // 過濾掉名稱為空、或台服未開放（patch > gamePatch）的項目
      MINION_DATA = (json.data || []).filter(m => m.name && m.name.trim() !== '' && PatchGate.released(m.patch, gp));

      // 收集來源類型
      const types = new Set();
      MINION_DATA.forEach(m => (m.sources || []).forEach(s => types.add(s.type)));
      SOURCE_TYPES = [...types].sort();

      renderBehaviorFilters();
      renderSourceFilters();
      updateProgress();
      renderGrid();
    } catch (err) {
      console.error('載入寵物資料失敗', err);
      $('minionGrid').style.display = 'none';
      const empty = $('emptyState');
      empty.style.display = '';
      empty.textContent = '資料載入失敗，請重新整理頁面。';
    }
  }

  loadData();
})();
</script>
</body>
</html>
