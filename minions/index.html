<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="FF14 寵物收藏追蹤 — 查詢所有隨從寵物、行為與來源篩選、記錄擁有進度">
  <title>寵物收藏追蹤 | 水神的工具箱</title>
  <link rel="stylesheet" href="../assets/css/common.css">
  <link rel="stylesheet" href="../assets/css/tool-header.css">
  <style>
    /* 寵物頁專屬樣式；通用版面（header/toolbar/filter/progress/footer）見 assets/css/common.css。
       本頁為「小方格 + hover 提示框」版型，以 gridClass/cardClass 指定 minion-grid/minion-card，
       控制面其餘由 assets/js/collection-tracker.js 渲染。 */
    :root {
      --accent:   #c8a96e;                 /* 金（外框強調）*/
      --accent-2: #e2c98a;                 /* 進度條尾色：淺金 */
      --glow-1:   rgba(200,169,110,0.05);
      --glow-2:   rgba(79,195,247,0.04);
    }
    .footer-text { line-height: 2; }

    /* ── Grid ── */
    .minion-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(112px, 1fr));
      gap: 10px;
    }
    /* ── Card ── */
    .minion-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 12px 8px 10px;
      cursor: pointer;
      transition: var(--transition);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      position: relative;
      user-select: none;
      /* 大清單效能：跳過畫面外卡片渲染（533 隻）*/
      content-visibility: auto;
      contain-intrinsic-size: auto 120px;
    }
    .minion-card:hover {
      border-color: rgba(200,169,110,0.3);
      background: var(--bg-card-hover);
      transform: translateY(-1px);
    }
    .minion-card.owned {
      border-color: rgba(74,222,128,0.4);
      background: rgba(74,222,128,0.05);
    }
    .minion-card.owned .minion-name { color: var(--green); }

    .minion-icon-wrap { position: relative; width: 60px; height: 60px; }
    .minion-icon {
      width: 60px; height: 60px;
      border-radius: var(--radius-sm);
      object-fit: cover;
      background: var(--raise);
      display: block;
    }
    .check-badge {
      position: absolute;
      bottom: -4px; right: -4px;
      width: 18px; height: 18px;
      background: var(--green);
      border: 2px solid var(--bg-base);
      border-radius: 50%;
      display: none;
      align-items: center; justify-content: center;
      font-size: 10px; color: #0a0c10; font-weight: 700;
    }
    .minion-card.owned .check-badge { display: flex; }

    .minion-name {
      font-size: 12px;
      color: var(--text-secondary);
      text-align: center;
      line-height: 1.3;
      word-break: break-all;
      max-width: 100%;
    }
    /* 取得方式：預設顯示的最優先資訊（類別；完整細節點 ⓘ） */
    .minion-src {
      font-size: 10px;
      color: var(--gold);
      text-align: center;
      line-height: 1.3;
      max-width: 100%;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .minion-src.none { color: var(--text-muted); }

    /* ── Tooltip ── */
    .tooltip {
      position: fixed;
      background: var(--bg-card);
      border: 1px solid rgba(200,169,110,0.3);
      border-radius: var(--radius-md);
      padding: 10px 14px;
      font-size: 12px;
      color: var(--text-secondary);
      max-width: 240px;
      pointer-events: none;
      z-index: 999;
      opacity: 0;
      transition: opacity 0.15s;
      line-height: 1.5;
    }
    .tooltip.show { opacity: 1; }
    .tooltip .tt-name { font-size: 13px; font-weight: 600; color: var(--gold-light); margin-bottom: 4px; }
    .tooltip .tt-row { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
    .tooltip .tt-source {
      display: inline-block;
      font-size: 11px;
      background: var(--gold-dim);
      color: var(--gold);
      border-radius: 4px;
      padding: 1px 6px;
      margin-top: 6px;
      margin-right: 4px;
    }
    .tooltip .tt-placeholder { font-size: 11px; color: var(--text-muted); margin-top: 6px; font-style: italic; }
    .tooltip.pinned { pointer-events: auto; }

    /* 取得方式 ⓘ 鈕（觸控/點擊用，不靠 hover） */
    .minion-info {
      position: absolute;
      top: 4px; left: 4px;
      width: 20px; height: 20px;
      display: flex; align-items: center; justify-content: center;
      padding: 0;
      font: 600 12px/1 'Segoe UI', system-ui, sans-serif;
      color: var(--gold);
      background: var(--bg-card);
      border: 1px solid var(--border-hover);
      border-radius: 50%;
      cursor: pointer;
      opacity: 0.85;
      transition: opacity 0.15s, background 0.15s;
      z-index: 2;
    }
    .minion-info:hover { opacity: 1; background: var(--gold-dim); }
    .minion-info:focus-visible { outline: 2px solid var(--gold); outline-offset: 1px; }

    @media (max-width: 600px) {
      .minion-grid { grid-template-columns: repeat(auto-fill, minmax(92px, 1fr)); gap: 8px; }
    }
  </style>
  <script src="../assets/js/patch-gate.js"></script>
  <script src="../assets/js/collection-tracker.js"></script>
  <link rel="stylesheet" href="../assets/css/theme.css">
  <script src="../assets/js/theme.js"></script>
</head>
<body>

<div class="container">

  <!-- Header -->
  <div class="tool-header">
    <h1 class="tool-title">🐣 寵物收藏追蹤</h1>
    <p class="tool-subtitle">點擊寵物卡片標記已擁有，進度自動儲存於瀏覽器</p>
    <div class="header-divider"></div>
  </div>

  <!-- 控制面（進度／工具列／篩選／格線）由 collection-tracker.js 渲染 -->
  <div id="ct-root"></div>

</div>

<!-- Footer -->
<footer class="page-footer">
  <div class="container">
    <p class="footer-text">
      <a href="../">水神的工具箱</a> · 資料來源：遊戲本體、<a href="https://xivapi.com" target="_blank">XIVAPI</a>、<a href="https://ffxivteamcraft.com" target="_blank">Teamcraft</a>
    </p>
    <p class="footer-text" style="margin-top:4px">
      FINAL FANTASY XIV © SQUARE ENIX　此為玩家自製非官方工具
    </p>
  </div>
</footer>

<!-- Tooltip -->
<div class="tooltip" id="tooltip">
  <div class="tt-name" id="ttName"></div>
  <div class="tt-row" id="ttMeta"></div>
  <div id="ttSources"></div>
</div>

<script>
(function () {
  var esc = CollectionTracker.esc;
  var $ = function (id) { return document.getElementById(id); };

  var BEHAVIOR_LABELS = { 'Independent': '獨立行動', 'Obedient': '聽從指令', 'Stationary': '靜止不動' };
  var BEHAVIORS = ['Independent', 'Obedient', 'Stationary'];

  // ── Tooltip（hover 顯示；ⓘ 釘住，觸控/點擊用）──
  var pinnedCard = null;
  function fillTooltip(m) {
    $('ttName').textContent = m.name;
    $('ttMeta').textContent = '行為：' + (BEHAVIOR_LABELS[m.behavior] || m.behavior) + '　版本：' + m.patch;
    var srcWrap = $('ttSources');
    if (m.sources && m.sources.length > 0) {
      srcWrap.innerHTML = m.sources.map(function (s) {
        return '<span class="tt-source">' + esc(s.type) + (s.detail ? '：' + esc(s.detail) : '') + '</span>';
      }).join('');
    } else {
      srcWrap.innerHTML = '<div class="tt-placeholder">取得方式：待補充</div>';
    }
  }
  function showTooltip(e, m) { if (pinnedCard) return; fillTooltip(m); $('tooltip').classList.add('show'); moveTooltip(e); }
  function hideTooltip() { if (pinnedCard) return; $('tooltip').classList.remove('show'); }
  function moveTooltip(e) {
    if (pinnedCard) return;
    var tt = $('tooltip');
    var x = e.clientX + 14, y = e.clientY + 14, w = tt.offsetWidth, h = tt.offsetHeight;
    tt.style.left = (x + w > window.innerWidth ? x - w - 20 : x) + 'px';
    tt.style.top = (y + h > window.innerHeight ? y - h - 20 : y) + 'px';
  }
  function pinTooltip(m, card) {
    fillTooltip(m);
    var tt = $('tooltip');
    pinnedCard = card;
    tt.classList.add('show', 'pinned');
    var r = card.getBoundingClientRect(), w = tt.offsetWidth, h = tt.offsetHeight;
    var x = r.left, y = r.bottom + 6;
    if (x + w > window.innerWidth) x = window.innerWidth - w - 8;
    if (y + h > window.innerHeight) y = r.top - h - 6;
    tt.style.left = Math.max(8, x) + 'px';
    tt.style.top = Math.max(8, y) + 'px';
  }
  function unpinTooltip() { pinnedCard = null; $('tooltip').classList.remove('show', 'pinned'); }
  document.addEventListener('click', function (e) {
    if (pinnedCard && !e.target.closest('#tooltip') && !e.target.closest('.minion-info')) unpinTooltip();
  });
  document.addEventListener('keydown', function (e) { if (e.key === 'Escape' && pinnedCard) unpinTooltip(); });

  CollectionTracker.init({
    dataUrl: '../data/minions.json',
    metaUrl: '../data/_meta.json',
    storageKey: 'ffxiv_minions_owned',
    snapKey: 'minions',
    fileBase: 'minions_owned',
    schema: 'minions_owned',
    verb: '擁有',
    unit: '隻',
    noun: '寵物',
    gridClass: 'minion-grid',
    cardClass: 'minion-card',
    searchPlaceholder: '搜尋寵物名稱（中／英文）、取得方式…',
    // 沿用既有進度：owned 存純數字 id
    keyOf: function (m) { return m.id; },
    include: function (m, gp) { return m.name && m.name.trim() !== '' && PatchGate.released(m.patch, gp); },
    sorts: ['patch-desc', 'patch-asc', 'name'],
    filters: [
      {
        id: 'behavior', label: '行為篩選',
        options: function (list) {
          return BEHAVIORS.filter(function (b) { return list.some(function (m) { return m.behavior === b; }); })
            .map(function (b) { return { value: b, label: BEHAVIOR_LABELS[b] || b }; });
        },
        match: function (m, v) { return m.behavior === v; }
      },
      {
        id: 'source', label: '來源篩選',
        options: function (list) {
          var set = new Set();
          list.forEach(function (m) { (m.sources || []).forEach(function (s) { if (s.type) set.add(s.type); }); });
          return Array.from(set).sort().map(function (t) { return { value: t, label: t }; })
            .concat([{ value: '__none__', label: '待補充' }]);
        },
        match: function (m, v) {
          var srcs = m.sources || [];
          return v === '__none__' ? srcs.length === 0 : srcs.some(function (s) { return s.type === v; });
        }
      },
      { kind: 'patch' }
    ],
    card: function (m) {
      var srcTypes = Array.from(new Set((m.sources || []).map(function (s) { return s.type; })));
      var srcInline = srcTypes.length
        ? '<div class="minion-src" title="' + esc(srcTypes.join(' · ')) + '">' + esc(srcTypes.join(' · ')) + '</div>'
        : '<div class="minion-src none">取得方式待補充</div>';
      return '' +
        '<div class="minion-icon-wrap">' +
          '<img class="minion-icon" src="' + esc(m.icon) + '" alt="' + esc(m.name) + '" loading="lazy" decoding="async"' +
            ' onerror="this.src=\'data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%2248%22 height=%2248%22><rect fill=%22%23ffffff08%22 width=%2248%22 height=%2248%22 rx=%226%22/></svg>\'">' +
          '<div class="check-badge">✓</div>' +
          '<button class="minion-info" type="button" aria-label="取得方式" title="取得方式">i</button>' +
        '</div>' +
        '<div class="minion-name">' + esc(m.name) + '</div>' +
        srcInline;
    },
    onCardCreate: function (m, card) {
      var info = card.querySelector('.minion-info');
      if (info) info.addEventListener('click', function (e) {
        e.stopPropagation();
        if (pinnedCard === card) unpinTooltip(); else pinTooltip(m, card);
      });
      card.addEventListener('mouseenter', function (e) { showTooltip(e, m); });
      card.addEventListener('mouseleave', hideTooltip);
      card.addEventListener('mousemove', moveTooltip);
    }
  });
})();
</script>
</body>
</html>
