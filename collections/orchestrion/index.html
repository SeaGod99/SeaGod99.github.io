<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="FF14 樂譜收藏追蹤 — 查詢管弦樂機樂譜、版本篩選、記錄擁有進度">
  <title>樂譜收藏追蹤 | 水神的工具箱</title>
  <link rel="stylesheet" href="../../assets/css/common.css">
  <link rel="stylesheet" href="../../assets/css/tool-header.css">
  <style>
    /* 樂譜頁專屬樣式；通用版面與 .col-* 卡片系統見 assets/css/common.css，
       控制面由 assets/js/collection-tracker.js 渲染 */
    :root {
      --accent:   #c8a96e;                 /* 金 */
      --accent-2: #4fc3f7;                 /* 進度條尾色：藍 */
      --glow-1:   rgba(200,169,110,0.06);
      --glow-2:   rgba(79,195,247,0.04);
    }
    .col-grid { grid-template-columns: repeat(auto-fill, minmax(230px, 1fr)); }
    .col-card { padding: 18px; gap: 8px; }
    .col-name { padding-right: 16px; }

    .oc-icon-wrap { display: flex; align-items: center; gap: 8px; }
    .oc-icon-placeholder {
      width: 48px; height: 48px;
      border-radius: var(--radius-sm);
      background: var(--raise);
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; flex-shrink: 0;
    }
    .oc-meta { font-size: 10px; color: var(--text-muted); }

    .tag.src-tag { background: var(--raise); color: var(--text-secondary); border-color: var(--border); }
    /* 資料片分類配色 */
    .tag.cat-原初之地   { background: rgba(74,222,128,0.1);   color: var(--green);  border-color: rgba(74,222,128,0.25); }
    .tag.cat-蒼天之禁地 { background: rgba(79,195,247,0.1);   color: var(--blue);   border-color: rgba(79,195,247,0.25); }
    .tag.cat-紅蓮之狂潮 { background: rgba(251,146,60,0.1);   color: var(--orange); border-color: rgba(251,146,60,0.25); }
    .tag.cat-暗影之逆焰 { background: rgba(167,139,250,0.12); color: var(--purple); border-color: rgba(167,139,250,0.25); }
    .tag.cat-曉月之終途 { background: rgba(34,211,238,0.1);   color: var(--cyan);   border-color: rgba(34,211,238,0.25); }
    .tag.cat-金曦之遺輝 { background: rgba(200,169,110,0.12); color: var(--gold);   border-color: rgba(200,169,110,0.25); }
    .tag.cat-未分類     { background: var(--raise); color: var(--text-muted); border-color: var(--border); }
    .tag.gcat { background: rgba(79,195,247,0.1); color: var(--blue); border-color: rgba(79,195,247,0.25); }

    .col-detail .detail-line { margin-top: 2px; }
    .col-detail .detail-line b { color: var(--text-secondary); font-weight: 500; }

    @media (max-width: 600px) { .col-grid { grid-template-columns: 1fr 1fr; } }
    @media (max-width: 380px) { .col-grid { grid-template-columns: 1fr; } }
  </style>
  <script src="../../assets/js/patch-gate.js"></script>
  <script src="../../assets/js/collection-tracker.js"></script>
  <link rel="stylesheet" href="../../assets/css/theme.css">
  <script src="../../assets/js/theme.js"></script>
</head>
<body>

<div class="container">

  <!-- Header -->
  <div class="tool-header">
    <h1 class="tool-title">🎵 樂譜收藏追蹤</h1>
    <p class="tool-subtitle">點擊卡片標記已取得，進度自動儲存於瀏覽器</p>
    <div class="header-divider"></div>
  </div>

  <!-- 控制面（進度／工具列／篩選／格線）由 collection-tracker.js 渲染 -->
  <div id="ct-root"></div>

</div>

<!-- Footer -->
<footer class="page-footer">
  <div class="container">
    <p class="footer-text">
      <a href="../../">水神的工具箱</a> · 資料來源：遊戲本體、<a href="https://xivapi.com" target="_blank">XIVAPI</a>
    </p>
    <p class="footer-text" style="margin-top:4px">
      FINAL FANTASY XIV © SQUARE ENIX　此為玩家自製非官方工具
    </p>
  </div>
</footer>

<script>
(function () {
  var CATEGORY_ORDER = ['原初之地', '蒼天之禁地', '紅蓮之狂潮', '暗影之逆焰', '曉月之終途', '金曦之遺輝', '未分類'];
  var GAME_CATEGORY_ORDER = ['區域場景1', '區域場景2', '迷宮挑戰', '迷宮挑戰2', '大型任務1', '大型任務2', '討伐殲滅戰', '任務相關', '季節活動', '環境音', '商城與特典', '其他'];
  var EXP_PREFIX = { '原初之地': '2.x', '蒼天之禁地': '3.x', '紅蓮之狂潮': '4.x', '暗影之逆焰': '5.x', '曉月之終途': '6.x', '金曦之遺輝': '7.x' };

  CollectionTracker.init({
    dataUrl: '../../data/orchestrion.json',
    metaUrl: '../../data/_meta.json',
    storageKey: 'ffxiv_orchestrion_owned',
    snapKey: 'orchestrion',
    verb: '取得',
    unit: '個',
    noun: '樂譜',
    searchPlaceholder: '搜尋樂譜名稱、取得方式…',
    // 樂譜含台服官方英文曲名（Answers 等），故只需 name 非空
    include: function (r, gp) { return r.name && PatchGate.released(r.patch, gp); },
    prepare: function (list) { return list.slice().sort(function (a, b) { return (a.number || 0) - (b.number || 0); }); },
    sorts: ['patch-desc', 'patch-asc', 'name'],
    filters: [
      {
        id: 'gcat', label: '分類',
        options: function (list) {
          var set = new Set(list.map(function (r) { return r.gameCategory; }).filter(Boolean));
          return GAME_CATEGORY_ORDER.filter(function (c) { return set.has(c); }).map(function (c) { return { value: c, label: c }; });
        },
        match: function (r, v) { return r.gameCategory === v; }
      },
      {
        id: 'category', label: '版本',
        options: function (list) {
          var set = new Set(list.map(function (r) { return r.category; }).filter(Boolean));
          return CATEGORY_ORDER.filter(function (c) { return set.has(c); })
            .map(function (c) { return { value: c, label: EXP_PREFIX[c] ? EXP_PREFIX[c] + ' ' + c : c }; });
        },
        match: function (r, v) { return r.category === v; }
      },
      {
        id: 'source', label: '取得方式',
        options: function (list) {
          var set = new Set();
          list.forEach(function (r) { (r.sources || []).forEach(function (s) { if (s.type) set.add(s.type); }); });
          return Array.from(set).sort().map(function (t) { return { value: t, label: t }; })
            .concat([{ value: '__none__', label: '待補充' }]);
        },
        match: function (r, v) {
          var srcs = r.sources || [];
          return v === '__none__' ? srcs.length === 0 : srcs.some(function (s) { return s.type === v; });
        }
      }
    ],
    onCardClick: function (r, ev) { return !!ev.target.closest('.ct-market'); },
    card: function (r) {
      var esc = CollectionTracker.esc;
      var srcs = r.sources || [];
      var sourceTags = srcs.length
        ? Array.from(new Set(srcs.map(function (s) { return s.type; }))).slice(0, 2)
            .map(function (t) { return '<span class="tag src-tag">' + esc(t) + '</span>'; }).join('')
        : '<span class="tag placeholder">待補充</span>';
      var catName = r.category || '未分類';
      var catTag = '<span class="tag cat-' + esc(catName) + '">' + esc(catName) + '</span>';
      var gcatTag = r.gameCategory ? '<span class="tag gcat">' + esc(r.gameCategory) + '</span>' : '';
      var lines = [];
      if (r.number) lines.push('<div class="detail-line"><b>編號：</b>No.' + esc(r.number) + '</div>');
      if (r.nameEn) lines.push('<div class="detail-line"><b>英文名：</b>' + esc(r.nameEn) + '</div>');
      if (srcs.length) srcs.forEach(function (s) { lines.push('<div class="detail-line"><b>' + esc(s.type) + '：</b>' + esc(s.detail || '') + '</div>'); });
      else lines.push('<div class="detail-line">取得方式：待補充</div>');
      return '' +
        '<div class="oc-icon-wrap"><div class="oc-icon-placeholder">🎵</div></div>' +
        '<div class="col-name">' + esc(r.name) + '</div>' +
        '<div class="oc-meta">No.' + esc(r.number) + (r.patch ? ' · ' + esc(r.patch) : '') + '</div>' +
        '<div class="col-tags">' + gcatTag + catTag + sourceTags + '</div>' +
        '<div class="col-detail">' + lines.join('') + '</div>' +
        (r.itemId ? '<a class="ct-market" href="../../tools/market/#item=' + esc(r.itemId) + '" title="到市場查價工具查此物品行情">💰 市場行情</a>' : '');
    }
  });
})();
</script>
</body>
</html>
