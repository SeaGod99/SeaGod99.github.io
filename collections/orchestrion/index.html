<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="FF14 樂譜收藏追蹤 — 查詢管弦樂機樂譜、版本篩選、記錄擁有進度">
  <title>樂譜收藏追蹤 | 水神的工具箱</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-base:    #0a0c10;
      --bg-surface: #0f1117;
      --bg-card:    #14181f;
      --bg-card-hover: #1a1f2b;
      --border:     rgba(255,255,255,0.07);
      --border-hover: rgba(200,169,110,0.4);

      --gold:       #c8a96e;
      --gold-light: #e2c98a;
      --gold-dim:   rgba(200,169,110,0.15);
      --purple:     #a78bfa;
      --purple-dim: rgba(167,139,250,0.12);
      --green:      #4ade80;
      --green-dim:  rgba(74,222,128,0.12);
      --blue:       #4fc3f7;
      --blue-dim:   rgba(79,195,247,0.12);
      --cyan:       #22d3ee;
      --cyan-dim:   rgba(34,211,238,0.12);
      --orange:     #fb923c;
      --orange-dim: rgba(251,146,60,0.12);
      --red:        #f87171;

      --text-primary:   #e8eaf0;
      --text-secondary: #8892a4;
      --text-muted:     #4a5568;

      --radius-sm: 6px;
      --radius-md: 10px;
      --radius-lg: 16px;
      --transition: 0.18s cubic-bezier(0.4,0,0.2,1);
    }

    html { scroll-behavior: smooth; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans TC', sans-serif;
      background: var(--bg-base);
      color: var(--text-primary);
      min-height: 100vh;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

    body::before {
      content: '';
      position: fixed; inset: 0;
      background:
        radial-gradient(ellipse 80% 50% at 20% 0%, rgba(200,169,110,0.06) 0%, transparent 60%),
        radial-gradient(ellipse 60% 40% at 80% 100%, rgba(79,195,247,0.04) 0%, transparent 60%);
      pointer-events: none; z-index: 0;
    }

    a { color: inherit; text-decoration: none; }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 20px;
      position: relative;
      z-index: 1;
    }

    /* ── Header ── */
    .page-header {
      padding: 36px 0 28px;
      display: flex;
      align-items: center;
      gap: 16px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 28px;
    }

    .back-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      color: var(--text-secondary);
      padding: 6px 12px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      transition: var(--transition);
    }
    .back-btn:hover { color: var(--gold); border-color: var(--border-hover); }

    .page-title-wrap { flex: 1; }

    .page-title {
      font-size: 22px;
      font-weight: 700;
      color: var(--gold-light);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .page-subtitle {
      font-size: 13px;
      color: var(--text-secondary);
      margin-top: 4px;
    }

    /* ── Progress bar ── */
    .progress-bar-wrap {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 16px 20px;
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .progress-info {
      font-size: 22px;
      font-weight: 700;
      color: var(--gold-light);
      white-space: nowrap;
    }
    .progress-info span {
      font-size: 13px;
      font-weight: 400;
      color: var(--text-secondary);
      margin-left: 6px;
    }

    .progress-track {
      flex: 1;
      height: 8px;
      background: rgba(255,255,255,0.07);
      border-radius: 99px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--gold), var(--blue));
      border-radius: 99px;
      transition: width 0.4s ease;
    }

    .progress-pct {
      font-size: 14px;
      color: var(--text-secondary);
      white-space: nowrap;
    }

    /* ── Toolbar ── */
    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 18px;
      align-items: center;
    }

    .search-wrap {
      position: relative;
      flex: 1;
      min-width: 180px;
    }
    .search-icon {
      position: absolute;
      left: 11px; top: 50%;
      transform: translateY(-50%);
      font-size: 14px;
      color: var(--text-muted);
      pointer-events: none;
    }
    .search-input {
      width: 100%;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text-primary);
      font-size: 13px;
      padding: 8px 12px 8px 34px;
      outline: none;
      transition: var(--transition);
    }
    .search-input:focus { border-color: rgba(200,169,110,0.5); }
    .search-input::placeholder { color: var(--text-muted); }

    .own-toggle {
      display: flex;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      overflow: hidden;
    }
    .own-btn {
      padding: 8px 14px;
      font-size: 12px;
      cursor: pointer;
      border: none;
      background: transparent;
      color: var(--text-secondary);
      transition: var(--transition);
      white-space: nowrap;
    }
    .own-btn.active { background: var(--gold-dim); color: var(--gold); }
    .own-btn:hover:not(.active) { color: var(--text-primary); }

    .icon-btn {
      padding: 8px 14px;
      font-size: 12px;
      cursor: pointer;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text-muted);
      transition: var(--transition);
      white-space: nowrap;
    }
    .icon-btn:hover { color: var(--text-primary); border-color: rgba(255,255,255,0.2); }
    .clear-btn:hover { color: var(--red); border-color: rgba(248,113,113,0.4); }

    /* ── Filter tags ── */
    .filter-section {
      margin-bottom: 18px;
    }
    .filter-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--text-muted);
      margin-bottom: 8px;
    }
    .filter-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    .filter-tag {
      padding: 4px 12px;
      font-size: 12px;
      border: 1px solid var(--border);
      border-radius: 99px;
      cursor: pointer;
      background: transparent;
      color: var(--text-secondary);
      transition: var(--transition);
    }
    .filter-tag:hover { color: var(--text-primary); border-color: rgba(255,255,255,0.2); }
    .filter-tag.active {
      background: var(--gold-dim);
      border-color: rgba(200,169,110,0.4);
      color: var(--gold);
    }

    /* ── Result count ── */
    .result-meta {
      font-size: 12px;
      color: var(--text-muted);
      margin-bottom: 14px;
    }
    .result-meta em { color: var(--text-secondary); font-style: normal; }

    /* ── Grid ── */
    .oc-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(190px, 1fr));
      gap: 10px;
    }

    /* ── Card ── */
    .oc-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 14px;
      cursor: pointer;
      transition: var(--transition);
      user-select: none;
      position: relative;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .oc-card:hover {
      background: var(--bg-card-hover);
      border-color: rgba(200,169,110,0.3);
    }
    .oc-card.owned {
      border-color: rgba(200,169,110,0.5);
      background: rgba(200,169,110,0.06);
    }
    .oc-card.owned::before {
      content: '✓';
      position: absolute;
      top: 8px; right: 10px;
      font-size: 12px;
      font-weight: 700;
      color: var(--gold);
    }

    .oc-icon-wrap {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .oc-icon {
      width: 40px;
      height: 40px;
      border-radius: var(--radius-sm);
      background: rgba(255,255,255,0.04);
      object-fit: cover;
      flex-shrink: 0;
    }
    .oc-icon-placeholder {
      width: 40px;
      height: 40px;
      border-radius: var(--radius-sm);
      background: rgba(255,255,255,0.04);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }

    .oc-name {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-primary);
      line-height: 1.3;
      padding-right: 16px;
    }
    .oc-card.owned .oc-name { color: var(--gold); }

    .oc-meta {
      font-size: 10px;
      color: var(--text-muted);
    }

    .oc-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      margin-top: 2px;
    }

    .tag {
      font-size: 10px;
      padding: 2px 7px;
      border-radius: 99px;
      background: rgba(255,255,255,0.04);
      color: var(--text-secondary);
      border: 1px solid var(--border);
      white-space: nowrap;
    }
    .tag.placeholder { color: var(--text-muted); }
    .tag.src-tag { background: rgba(255,255,255,0.04); color: var(--text-secondary); border-color: var(--border); }

    /* Version category tag colours */
    .tag.cat-原初之地  { background: rgba(74,222,128,0.1);   color: var(--green);  border-color: rgba(74,222,128,0.25); }
    .tag.cat-蒼天之禁地 { background: rgba(79,195,247,0.1);   color: var(--blue);   border-color: rgba(79,195,247,0.25); }
    .tag.cat-紅蓮之狂潮 { background: rgba(251,146,60,0.1);   color: var(--orange); border-color: rgba(251,146,60,0.25); }
    .tag.cat-暗影之逆焰 { background: rgba(167,139,250,0.12); color: var(--purple); border-color: rgba(167,139,250,0.25); }
    .tag.cat-曉月之終途 { background: rgba(34,211,238,0.1);   color: var(--cyan);   border-color: rgba(34,211,238,0.25); }
    .tag.cat-金曦之遺輝 { background: rgba(200,169,110,0.12); color: var(--gold);   border-color: rgba(200,169,110,0.25); }
    .tag.cat-未分類    { background: rgba(255,255,255,0.04); color: var(--text-muted); border-color: var(--border); }

    /* ── Hover detail ── */
    .oc-detail {
      font-size: 11px;
      color: var(--text-muted);
      line-height: 1.5;
      display: none;
    }
    .oc-card:hover .oc-detail { display: block; }
    .oc-detail .detail-line { margin-top: 2px; }
    .oc-detail .detail-line b { color: var(--text-secondary); font-weight: 500; }

    /* ── Empty state ── */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-muted);
      font-size: 14px;
    }

    /* ── Footer ── */
    .page-footer {
      border-top: 1px solid var(--border);
      padding: 24px 0 32px;
      text-align: center;
      margin-top: 48px;
    }
    .footer-text { font-size: 12px; color: var(--text-muted); }
    .footer-text a { color: var(--text-secondary); transition: var(--transition); }
    .footer-text a:hover { color: var(--gold); }

    /* ── Responsive ── */
    @media (max-width: 600px) {
      .page-header { flex-wrap: wrap; padding: 24px 0 20px; }
      .oc-grid { grid-template-columns: 1fr 1fr; }
      .progress-bar-wrap { flex-wrap: wrap; }
    }
    @media (max-width: 380px) {
      .oc-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<div class="container">

  <!-- Header -->
  <header class="page-header">
    <a href="../../" class="back-btn">← 水神的工具箱</a>
    <div class="page-title-wrap">
      <h1 class="page-title">🎵 樂譜收藏追蹤</h1>
      <p class="page-subtitle">點擊卡片標記已取得，進度自動儲存於瀏覽器</p>
    </div>
  </header>

  <!-- Progress -->
  <div class="progress-bar-wrap">
    <div class="progress-info">
      <span id="ownedCount">0</span> / <span id="totalCount">0</span>
      <span>已取得</span>
    </div>
    <div class="progress-track">
      <div class="progress-fill" id="progressFill" style="width:0%"></div>
    </div>
    <div class="progress-pct" id="progressPct">0%</div>
  </div>

  <!-- Toolbar -->
  <div class="toolbar">
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input class="search-input" type="text" id="searchInput" placeholder="搜尋樂譜名稱…" autocomplete="off">
    </div>
    <div class="own-toggle">
      <button class="own-btn active" data-own="all">全部</button>
      <button class="own-btn" data-own="owned">已取得</button>
      <button class="own-btn" data-own="missing">未取得</button>
    </div>
    <button class="icon-btn" id="exportBtn">匯出進度</button>
    <button class="icon-btn" id="importBtn">匯入進度</button>
    <input type="file" id="importFile" accept="application/json" style="display:none">
    <button class="icon-btn clear-btn" id="clearBtn">清除進度</button>
  </div>

  <!-- Version filter -->
  <div class="filter-section">
    <div class="filter-label">版本</div>
    <div class="filter-tags" id="categoryFilters"></div>
  </div>

  <!-- Source filter -->
  <div class="filter-section">
    <div class="filter-label">取得方式</div>
    <div class="filter-tags" id="sourceFilters"></div>
  </div>

  <!-- Result meta -->
  <div class="result-meta" id="resultMeta"></div>

  <!-- Grid -->
  <div class="oc-grid" id="ocGrid"></div>

  <div class="empty-state" id="emptyState" style="display:none">
    找不到符合條件的樂譜
  </div>

</div>

<!-- Footer -->
<footer class="page-footer">
  <div class="container">
    <p class="footer-text">
      <a href="../../">水神的工具箱</a> · 資料來源：遊戲本體、<a href="https://xivapi.com" target="_blank">XIVAPI</a>
    </p>
    <p class="footer-text" style="margin-top:4px">
      FINAL FANTASY XIV © SQUARE ENIX　此為玩家自製非官方工具
    </p>
  </div>
</footer>

<script>
(function() {
  const STORAGE_KEY = 'ffxiv_orchestrion_owned';
  const DATA_URL = '../../data/orchestrion.json';
  // icons not used

  // Version order for filter display
  const CATEGORY_ORDER = ['原初之地', '蒼天之禁地', '紅蓮之狂潮', '暗影之逆焰', '曉月之終途', '金曦之遺輝', '未分類'];

  // ── State ──
  let OC_DATA = [];
  let CATEGORIES = [];
  let SOURCE_TYPES = [];
  let owned = new Set(JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'));
  let filterOwn = 'all';
  let filterCategory = null;
  let filterSource = null;
  let searchQ = '';

  // ── Unique key ──
  function keyOf(r) {
    return 'id:' + r.id;
  }

  // ── Save ──
  function save() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify([...owned]));
  }

  // ── Toggle ──
  function toggle(k) {
    if (owned.has(k)) owned.delete(k);
    else owned.add(k);
    save();
    updateProgress();
    renderGrid();
  }

  // ── Progress ──
  function updateProgress() {
    const total = OC_DATA.length;
    const count = OC_DATA.filter(r => owned.has(keyOf(r))).length;
    const pct = total ? Math.round(count / total * 100) : 0;
    document.getElementById('ownedCount').textContent = count;
    document.getElementById('totalCount').textContent = total;
    document.getElementById('progressFill').style.width = pct + '%';
    document.getElementById('progressPct').textContent = pct + '%';
  }

  // ── Generic filter tag renderer ──
  function renderTagFilters(containerId, values, current, onClick, labelFn) {
    const wrap = document.getElementById(containerId);
    wrap.innerHTML = '';
    values.forEach(v => {
      const btn = document.createElement('button');
      btn.className = 'filter-tag' + (current === v ? ' active' : '');
      btn.textContent = labelFn ? labelFn(v) : v;
      btn.addEventListener('click', () => onClick(v));
      wrap.appendChild(btn);
    });
  }

  function renderCategoryFilters() {
    renderTagFilters('categoryFilters', CATEGORIES, filterCategory,
      v => { filterCategory = filterCategory === v ? null : v; renderCategoryFilters(); renderGrid(); }
    );
  }

  function renderSourceFilters() {
    renderTagFilters('sourceFilters', [...SOURCE_TYPES, '__none__'], filterSource,
      v => { filterSource = filterSource === v ? null : v; renderSourceFilters(); renderGrid(); },
      v => v === '__none__' ? '待補充' : v
    );
  }

  // ── Filter ──
  function filtered() {
    return OC_DATA.filter(r => {
      const k = keyOf(r);

      if (filterOwn === 'owned'   && !owned.has(k)) return false;
      if (filterOwn === 'missing' &&  owned.has(k)) return false;

      if (filterCategory && r.category !== filterCategory) return false;

      if (filterSource) {
        const srcs = r.sources || [];
        if (filterSource === '__none__') {
          if (srcs.length > 0) return false;
        } else {
          if (!srcs.some(s => s.type === filterSource)) return false;
        }
      }

      if (searchQ) {
        const q = searchQ.toLowerCase();
        const nameMatch = r.name && r.name.toLowerCase().includes(q);
        const enMatch = r.nameEn && r.nameEn.toLowerCase().includes(q);
        if (!nameMatch && !enMatch) return false;
      }

      return true;
    });
  }

  // ── Icon URL ──
  function iconUrl(r) {
    return null;
  }

  // ── Render grid ──
  function renderGrid() {
    const list = filtered();
    const grid = document.getElementById('ocGrid');
    const empty = document.getElementById('emptyState');
    const meta = document.getElementById('resultMeta');

    grid.innerHTML = '';
    if (list.length === 0) {
      grid.style.display = 'none';
      empty.style.display = '';
    } else {
      grid.style.display = '';
      empty.style.display = 'none';
    }

    const ownedInView = list.filter(r => owned.has(keyOf(r))).length;
    meta.innerHTML = `顯示 <em>${list.length}</em> / ${OC_DATA.length} 個 · 已取得 <em>${ownedInView}</em> / ${list.length}`;

    list.forEach(r => {
      const k = keyOf(r);
      const isOwned = owned.has(k);
      const card = document.createElement('div');
      card.className = 'oc-card' + (isOwned ? ' owned' : '');

      const srcs = r.sources || [];

      const sourceTags = srcs.length
        ? [...new Set(srcs.map(s => s.type))].slice(0, 2)
            .map(t => `<span class="tag src-tag">${t}</span>`).join('')
        : `<span class="tag placeholder">待補充</span>`;

      const catClass = 'cat-' + (r.category || '未分類');
      const catTag = `<span class="tag ${catClass}">${r.category || '未分類'}</span>`;

      const iconHtml = `<div class="oc-icon-placeholder">🎵</div>`;

      const detailLines = [];
      if (r.number) detailLines.push(`<div class="detail-line"><b>編號：</b>No.${r.number}</div>`);
      if (r.nameEn) detailLines.push(`<div class="detail-line"><b>英文名：</b>${r.nameEn}</div>`);
      if (srcs.length) {
        srcs.forEach(s => {
          detailLines.push(`<div class="detail-line"><b>${s.type}：</b>${s.detail || ''}</div>`);
        });
      } else {
        detailLines.push(`<div class="detail-line">取得方式：待補充</div>`);
      }

      card.innerHTML = `
        <div class="oc-icon-wrap">
          ${iconHtml}
        </div>
        <div class="oc-name">${r.name}</div>
        <div class="oc-meta">No.${r.number}${r.patch ? ' · ' + r.patch : ''}</div>
        <div class="oc-tags">
          ${catTag}
          ${sourceTags}
        </div>
        <div class="oc-detail">${detailLines.join('')}</div>
      `;

      card.addEventListener('click', () => toggle(k));
      grid.appendChild(card);
    });
  }

  // ── Export / Import ──
  function exportProgress() {
    const payload = {
      schema: 'orchestrion-progress',
      exported: new Date().toISOString(),
      owned: [...owned]
    };
    const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'orchestrion-progress.json';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }

  function importProgress(file) {
    const reader = new FileReader();
    reader.onload = e => {
      try {
        const data = JSON.parse(e.target.result);
        const list = Array.isArray(data) ? data : data.owned;
        if (!Array.isArray(list)) throw new Error('格式錯誤');
        owned = new Set(list);
        save();
        updateProgress();
        renderGrid();
        alert('匯入成功，共 ' + owned.size + ' 筆已取得記錄');
      } catch (err) {
        alert('匯入失敗：檔案格式不正確');
      }
    };
    reader.readAsText(file);
  }

  // ── Own-toggle buttons ──
  document.querySelectorAll('.own-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      filterOwn = btn.dataset.own;
      document.querySelectorAll('.own-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderGrid();
    });
  });

  // ── Search ──
  document.getElementById('searchInput').addEventListener('input', e => {
    searchQ = e.target.value.trim();
    renderGrid();
  });

  // ── Export / Import / Clear ──
  document.getElementById('exportBtn').addEventListener('click', exportProgress);
  document.getElementById('importBtn').addEventListener('click', () => {
    document.getElementById('importFile').click();
  });
  document.getElementById('importFile').addEventListener('change', e => {
    const file = e.target.files[0];
    if (file) importProgress(file);
    e.target.value = '';
  });

  document.getElementById('clearBtn').addEventListener('click', () => {
    if (!confirm('確定要清除所有取得記錄嗎？')) return;
    owned.clear();
    save();
    updateProgress();
    renderGrid();
  });

  // ── Init: load data ──
  fetch(DATA_URL)
    .then(res => {
      if (!res.ok) throw new Error('無法載入資料 (' + res.status + ')');
      return res.json();
    })
    .then(json => {
      const raw = (json && json.data) ? json.data : [];

      // 僅顯示有繁中漢字名稱的項目（台服未開放者隱藏）
      OC_DATA = raw.filter(r => r.name && /[一-鿿]/.test(r.name));

      // 依編號排序
      OC_DATA.sort((a, b) => (a.number || 0) - (b.number || 0));

      // 版本清單（依固定順序）
      const catSet = new Set(OC_DATA.map(r => r.category).filter(Boolean));
      CATEGORIES = CATEGORY_ORDER.filter(c => catSet.has(c));

      // 取得方式清單
      const sourceSet = new Set();
      OC_DATA.forEach(r => (r.sources || []).forEach(s => { if (s.type) sourceSet.add(s.type); }));
      SOURCE_TYPES = [...sourceSet].sort();

      renderCategoryFilters();
      renderSourceFilters();
      updateProgress();
      renderGrid();
    })
    .catch(err => {
      const grid = document.getElementById('ocGrid');
      const empty = document.getElementById('emptyState');
      grid.style.display = 'none';
      empty.style.display = '';
      empty.textContent = '資料載入失敗：' + err.message;
    });
})();
</script>
</body>
</html>
