<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="FF14 表情收藏追蹤 — 指令搜尋、版本篩選、記錄已解鎖進度">
  <title>表情收藏追蹤 | 水神的工具箱</title>
  <link rel="stylesheet" href="../../assets/css/common.css">
  <link rel="stylesheet" href="../../assets/css/tool-header.css">
  <style>
    /* 表情頁專屬樣式；通用版面與 .col-* 卡片系統見 assets/css/common.css，
       控制面由 assets/js/collection-tracker.js 渲染 */
    :root {
      --accent:   #c8a96e;                 /* 金 */
      --accent-2: #a78bfa;                 /* 進度條尾色：紫 */
      --glow-1:   rgba(200,169,110,0.06);
      --glow-2:   rgba(167,139,250,0.04);
    }
    /* 表情卡：置中版型 */
    .col-card { align-items: center; text-align: center; }
    .col-tags { justify-content: center; }
    .col-detail { border-left: 0; padding-left: 0; }
    .col-card.locked { cursor: default; }
    .col-icon-wrap, .col-icon { width: 56px; height: 56px; }
    .col-icon-ph { font-size: 26px; }
    .col-name { font-size: 14px; word-break: break-word; }

    .em-command {
      font-size: 11px;
      color: var(--blue);
      font-family: 'SF Mono', 'Consolas', monospace;
      background: var(--blue-dim);
      padding: 2px 7px;
      border-radius: 4px;
    }
    /* 表情頁語意：type-任務 為藍色任務（覆寫 common 的綠色） */
    .src-tag.type-任務 { background: rgba(79,195,247,0.1); color: var(--blue); border-color: rgba(79,195,247,0.2); }

    @media (max-width: 600px) { .col-grid { grid-template-columns: repeat(3, 1fr); } }
    @media (max-width: 380px) { .col-grid { grid-template-columns: repeat(2, 1fr); } }
  </style>
  <script src="../../assets/js/patch-gate.js"></script>
  <script src="../../assets/js/collection-tracker.js"></script>
  <link rel="stylesheet" href="../../assets/css/theme.css">
  <script src="../../assets/js/theme.js"></script>
</head>
<body>

<div class="container">

  <!-- Header -->
  <div class="tool-header">
    <h1 class="tool-title">表情收藏追蹤</h1>
    <p class="tool-subtitle">點擊卡片標記已解鎖，進度自動儲存於瀏覽器（預設表情恆為已解鎖）</p>
    <div class="header-divider"></div>
  </div>

  <!-- 控制面（進度／工具列／篩選／格線）由 collection-tracker.js 渲染 -->
  <div id="ct-root"></div>

</div>

<!-- Footer -->
<footer class="page-footer">
  <div class="container">
    <p class="footer-text">
      <a href="../../">水神的工具箱</a> · 資料來源：遊戲本體、<a href="https://xivapi.com" target="_blank">XIVAPI</a>
    </p>
    <p class="footer-text" style="margin-top:4px">
      FINAL FANTASY XIV © SQUARE ENIX　此為玩家自製非官方工具
    </p>
  </div>
</footer>

<script>
(function () {
  var CATEGORY_TABS = [
    { key: 'General',     label: '一般' },
    { key: 'Special',     label: '特殊' },
    { key: 'Expressions', label: '情感表現' }
  ];

  CollectionTracker.init({
    dataUrl: '../../data/emotes.json',
    metaUrl: '../../data/_meta.json',
    storageKey: 'ffxiv_emotes_owned',
    snapKey: 'emotes',
    verb: '解鎖',
    unit: '個',
    noun: '表情',
    searchPlaceholder: '搜尋表情名稱或指令…',
    // 台服未開放（name=null 或 patch>gamePatch）隱藏
    include: function (e, gp) { return e.name !== null && PatchGate.released(e.patch, gp); },
    // 預設表情恆為已解鎖、且不可點掉
    alwaysOwned: function (e) { return (e.sources || []).some(function (s) { return s.type === '預設'; }); },
    // 搜尋涵蓋名稱／英文名／指令
    searchText: function (e) {
      return [e.name, e.nameEn, e.command].filter(Boolean).join(' ').toLowerCase();
    },
    // 依 id 排序作為預設順序
    prepare: function (list) { return list.slice().sort(function (a, b) { return (a.id || 0) - (b.id || 0); }); },
    sorts: ['patch-desc', 'patch-asc', 'name'],
    filters: [
      {
        id: 'category', label: '遊戲內分頁',
        options: function (list) {
          return CATEGORY_TABS.filter(function (t) { return list.some(function (e) { return e.category === t.key; }); })
            .map(function (t) { return { value: t.key, label: t.label }; });
        },
        match: function (e, v) { return e.category === v; }
      },
      {
        id: 'source', label: '取得來源',
        options: function (list) {
          var ORDER = ['預設', '動作指南書', '任務', '成就', 'App', '待補充'];
          var set = new Set();
          list.forEach(function (e) {
            var types = (e.sources || []).map(function (s) { return s.type; });
            if (!types.length) set.add('待補充'); else types.forEach(function (t) { set.add(t); });
          });
          return ORDER.filter(function (x) { return set.has(x); })
            .concat(Array.from(set).filter(function (x) { return ORDER.indexOf(x) < 0; }))
            .map(function (x) { return { value: x, label: x }; });
        },
        match: function (e, v) {
          var types = (e.sources || []).map(function (s) { return s.type; });
          return v === '待補充' ? types.length === 0 : types.indexOf(v) >= 0;
        }
      }
    ],
    card: function (e) {
      var esc = CollectionTracker.esc;
      var ICON_BASE = '../../assets/emotes';
      var iconFile = e.icon ? e.icon.split('/').pop().replace(/\.png$/i, '.webp') : null;
      var iconHtml = iconFile
        ? '<img class="col-icon" src="' + ICON_BASE + '/' + esc(iconFile) + '" alt="" loading="lazy" onerror="this.parentElement.innerHTML=\'<span class=col-icon-ph>💃</span>\'">'
        : '<span class="col-icon-ph">💃</span>';
      var nameHtml = (e.name && /[一-鿿]/.test(e.name))
        ? '<div class="col-name">' + esc(e.name) + '</div>'
        : '<div class="col-name">' + esc(e.nameEn) + '</div>';
      var cmdHtml = e.command ? '<span class="em-command">' + esc(e.command) + '</span>' : '';
      var patchHtml = e.patch ? '<span class="tag patch-tag">ver ' + esc(e.patch) + '</span>' : '';
      var catTab = CATEGORY_TABS.filter(function (t) { return t.key === e.category; })[0];
      var catHtml = catTab ? '<span class="tag">' + catTab.label + '</span>' : '';
      var sources = e.sources || [];
      var sourceTags = sources.length
        ? sources.map(function (s) { return '<span class="src-tag type-' + esc(s.type) + '">' + esc(s.type) + '</span>'; }).join('')
        : '<span class="src-tag placeholder">待補充</span>';
      var detailText = sources.length
        ? esc(sources.map(function (s) { return s.detail; }).filter(Boolean).join('、'))
        : '取得方式待補充';
      return '' +
        '<div class="col-icon-wrap">' + iconHtml + '</div>' +
        nameHtml + cmdHtml +
        '<div class="col-tags">' + sourceTags + '</div>' +
        '<div class="col-detail">' + detailText + '</div>' +
        '<div class="col-tags">' + catHtml + patchHtml + '</div>';
    }
  });
})();
</script>
</body>
</html>
