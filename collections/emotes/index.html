<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="FF14 表情收藏追蹤 — 指令搜尋、版本篩選、記錄已解鎖進度">
  <title>表情收藏追蹤 | 水神的工具箱</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-base:    #0a0c10;
      --bg-surface: #0f1117;
      --bg-card:    #14181f;
      --bg-card-hover: #1a1f2b;
      --border:     rgba(255,255,255,0.07);
      --border-hover: rgba(200,169,110,0.4);

      --gold:       #c8a96e;
      --gold-light: #e2c98a;
      --gold-dim:   rgba(200,169,110,0.15);
      --purple:     #a78bfa;
      --purple-dim: rgba(167,139,250,0.12);
      --green:      #4ade80;
      --green-dim:  rgba(74,222,128,0.12);
      --blue:       #4fc3f7;
      --blue-dim:   rgba(79,195,247,0.12);
      --red:        #f87171;

      --text-primary:   #e8eaf0;
      --text-secondary: #8892a4;
      --text-muted:     #717c91;

      --radius-sm: 6px;
      --radius-md: 10px;
      --radius-lg: 16px;
      --transition: 0.18s cubic-bezier(0.4,0,0.2,1);
    }

    html { scroll-behavior: smooth; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans TC', sans-serif;
      background: var(--bg-base);
      color: var(--text-primary);
      min-height: 100vh;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

    body::before {
      content: '';
      position: fixed; inset: 0;
      background:
        radial-gradient(ellipse 80% 50% at 20% 0%, rgba(200,169,110,0.06) 0%, transparent 60%),
        radial-gradient(ellipse 60% 40% at 80% 100%, rgba(167,139,250,0.04) 0%, transparent 60%);
      pointer-events: none; z-index: 0;
    }

    a { color: inherit; text-decoration: none; }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 20px;
      position: relative;
      z-index: 1;
    }

    /* ── Header ── */
    .page-header {
      padding: 36px 0 28px;
      display: flex;
      align-items: center;
      gap: 16px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 28px;
    }

    .back-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      color: var(--text-secondary);
      padding: 6px 12px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      transition: var(--transition);
    }
    .back-btn:hover { color: var(--gold); border-color: var(--border-hover); }

    .page-title-wrap { flex: 1; }

    .page-title {
      font-size: 22px;
      font-weight: 700;
      color: var(--gold-light);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .page-subtitle {
      font-size: 13px;
      color: var(--text-secondary);
      margin-top: 4px;
    }

    /* ── Progress bar ── */
    .progress-bar-wrap {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 16px 20px;
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .progress-info {
      font-size: 22px;
      font-weight: 700;
      color: var(--gold-light);
      white-space: nowrap;
    }
    .progress-info span {
      font-size: 13px;
      font-weight: 400;
      color: var(--text-secondary);
      margin-left: 6px;
    }

    .progress-track {
      flex: 1;
      height: 8px;
      background: rgba(255,255,255,0.07);
      border-radius: 99px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--gold), var(--purple));
      border-radius: 99px;
      transition: width 0.4s ease;
    }

    .progress-pct {
      font-size: 14px;
      color: var(--text-secondary);
      white-space: nowrap;
    }

    /* ── Toolbar ── */
    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 18px;
      align-items: center;
    }

    .search-wrap {
      position: relative;
      flex: 1;
      min-width: 180px;
    }
    .search-icon {
      position: absolute;
      left: 11px; top: 50%;
      transform: translateY(-50%);
      font-size: 14px;
      color: var(--text-muted);
      pointer-events: none;
    }
    .search-input {
      width: 100%;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text-primary);
      font-size: 13px;
      padding: 8px 12px 8px 34px;
      outline: none;
      transition: var(--transition);
    }
    .search-input:focus { border-color: rgba(200,169,110,0.5); }
    .search-input::placeholder { color: var(--text-muted); }

    .own-toggle {
      display: flex;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      overflow: hidden;
    }
    .own-btn {
      padding: 8px 14px;
      font-size: 12px;
      cursor: pointer;
      border: none;
      background: transparent;
      color: var(--text-secondary);
      transition: var(--transition);
      white-space: nowrap;
    }
    .own-btn.active { background: var(--gold-dim); color: var(--gold); }
    .own-btn:hover:not(.active) { color: var(--text-primary); }

    .icon-btn {
      padding: 8px 14px;
      font-size: 12px;
      cursor: pointer;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text-muted);
      transition: var(--transition);
      white-space: nowrap;
    }
    .icon-btn:hover { color: var(--text-primary); border-color: rgba(255,255,255,0.2); }
    .clear-btn:hover { color: var(--red); border-color: rgba(248,113,113,0.4); }

    /* ── Filter tags ── */
    .filter-section {
      margin-bottom: 18px;
    }
    .filter-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--text-muted);
      margin-bottom: 8px;
    }
    .filter-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    .filter-tag {
      padding: 4px 12px;
      font-size: 12px;
      border: 1px solid var(--border);
      border-radius: 99px;
      cursor: pointer;
      background: transparent;
      color: var(--text-secondary);
      transition: var(--transition);
    }
    .filter-tag:hover { color: var(--text-primary); border-color: rgba(255,255,255,0.2); }
    .filter-tag.active {
      background: var(--gold-dim);
      border-color: rgba(200,169,110,0.4);
      color: var(--gold);
    }

    /* ── Result count ── */
    .result-meta {
      font-size: 12px;
      color: var(--text-muted);
      margin-bottom: 14px;
    }
    .result-meta em { color: var(--text-secondary); font-style: normal; }

    /* ── Grid ── */
    .em-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 10px;
    }

    /* ── Card ── */
    .em-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 12px;
      cursor: pointer;
      transition: var(--transition);
      user-select: none;
      position: relative;
      display: flex;
      flex-direction: column;
      gap: 6px;
      align-items: center;
      text-align: center;
    }
    .em-card:hover {
      background: var(--bg-card-hover);
      border-color: rgba(200,169,110,0.3);
    }
    .em-card.owned {
      border-color: rgba(200,169,110,0.5);
      background: rgba(200,169,110,0.06);
    }
    .em-card.owned::before {
      content: '✓';
      position: absolute;
      top: 7px; right: 9px;
      font-size: 11px;
      font-weight: 700;
      color: var(--gold);
    }

    .em-icon-wrap {
      width: 48px;
      height: 48px;
      border-radius: var(--radius-sm);
      background: rgba(255,255,255,0.04);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      overflow: hidden;
    }
    .em-icon {
      width: 48px;
      height: 48px;
      object-fit: cover;
    }
    .em-icon-placeholder {
      font-size: 22px;
      color: var(--text-muted);
    }

    .em-name {
      font-size: 12px;
      font-weight: 600;
      color: var(--text-primary);
      line-height: 1.3;
      word-break: break-word;
    }
    .em-card.owned .em-name { color: var(--gold); }

    .em-name-zh {
      font-size: 11px;
      color: var(--text-secondary);
      line-height: 1.2;
    }

    .em-command {
      font-size: 11px;
      color: var(--blue);
      font-family: 'SF Mono', 'Consolas', monospace;
      background: var(--blue-dim);
      padding: 2px 7px;
      border-radius: 4px;
    }

    .em-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      justify-content: center;
      margin-top: 2px;
    }

    .tag {
      font-size: 10px;
      padding: 2px 7px;
      border-radius: 99px;
      background: rgba(255,255,255,0.04);
      color: var(--text-secondary);
      border: 1px solid var(--border);
      white-space: nowrap;
    }
    .tag.placeholder { color: var(--text-muted); }
    .tag.patch-tag {
      background: rgba(167,139,250,0.1);
      color: var(--purple);
      border-color: rgba(167,139,250,0.2);
    }

    /* ── Source tags ── */
    .em-sources {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      justify-content: center;
      margin-top: 2px;
    }
    .source-tag {
      font-size: 10px;
      padding: 2px 7px;
      border-radius: 99px;
      background: var(--purple-dim);
      color: var(--purple);
      border: 1px solid rgba(167,139,250,0.2);
      white-space: nowrap;
    }
    .source-tag.placeholder {
      background: rgba(255,255,255,0.04);
      color: var(--text-muted);
      border-color: var(--border);
    }
    .source-tag.type-預設     { background: rgba(74,222,128,0.1);  color: var(--green); border-color: rgba(74,222,128,0.2); }
    .source-tag.type-任務     { background: rgba(79,195,247,0.1);  color: var(--blue); border-color: rgba(79,195,247,0.2); }
    .source-tag.type-動作指南書 { background: rgba(200,169,110,0.12); color: var(--gold); border-color: rgba(200,169,110,0.25); }
    .source-tag.type-成就     { background: rgba(255,200,80,0.1);  color: #ffc850; border-color: rgba(255,200,80,0.2); }
    .source-tag.type-App      { background: rgba(167,139,250,0.12); color: var(--purple); border-color: rgba(167,139,250,0.25); }

    .em-detail {
      font-size: 10px;
      color: var(--text-muted);
      line-height: 1.3;
      word-break: break-word;
    }

    /* ── Empty state ── */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-muted);
      font-size: 14px;
    }

    /* ── Footer ── */
    .page-footer {
      border-top: 1px solid var(--border);
      padding: 24px 0 32px;
      text-align: center;
      margin-top: 48px;
    }
    .footer-text { font-size: 12px; color: var(--text-muted); }
    .footer-text a { color: var(--text-secondary); transition: var(--transition); }
    .footer-text a:hover { color: var(--gold); }

    /* ── Responsive ── */
    @media (max-width: 600px) {
      .page-header { flex-wrap: wrap; padding: 24px 0 20px; }
      .em-grid { grid-template-columns: repeat(3, 1fr); }
      .progress-bar-wrap { flex-wrap: wrap; }
    }
    @media (max-width: 380px) {
      .em-grid { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>

<div class="container">

  <!-- Header -->
  <header class="page-header">
    <a href="../../" class="back-btn">← 水神的工具箱</a>
    <div class="page-title-wrap">
      <h1 class="page-title">表情收藏追蹤</h1>
      <p class="page-subtitle">點擊卡片標記已解鎖，進度自動儲存於瀏覽器</p>
    </div>
  </header>

  <!-- Progress -->
  <div class="progress-bar-wrap">
    <div class="progress-info">
      <span id="ownedCount">0</span> / <span id="totalCount">0</span>
      <span>已解鎖</span>
    </div>
    <div class="progress-track">
      <div class="progress-fill" id="progressFill" style="width:0%"></div>
    </div>
    <div class="progress-pct" id="progressPct">0%</div>
  </div>

  <!-- Toolbar -->
  <div class="toolbar">
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input class="search-input" type="text" id="searchInput" placeholder="搜尋表情名稱或指令…" autocomplete="off">
    </div>
    <div class="own-toggle">
      <button class="own-btn active" data-own="all">全部</button>
      <button class="own-btn" data-own="owned">已解鎖</button>
      <button class="own-btn" data-own="missing">未解鎖</button>
    </div>
    <button class="icon-btn" id="exportBtn">匯出進度</button>
    <button class="icon-btn" id="importBtn">匯入進度</button>
    <input type="file" id="importFile" accept="application/json" style="display:none">
    <button class="icon-btn clear-btn" id="clearBtn">清除進度</button>
  </div>

  <!-- Patch filter -->
  <div class="filter-section" id="patchFilterSection" style="display:none">
    <div class="filter-label">版本</div>
    <div class="filter-tags" id="patchFilters"></div>
  </div>

  <!-- Source filter -->
  <div class="filter-section" id="sourceFilterSection" style="display:none">
    <div class="filter-label">取得來源</div>
    <div class="filter-tags" id="sourceFilters"></div>
  </div>

  <!-- Result meta -->
  <div class="result-meta" id="resultMeta"></div>

  <!-- Grid -->
  <div class="em-grid" id="emGrid"></div>

  <div class="empty-state" id="emptyState" style="display:none">
    找不到符合條件的表情
  </div>

</div>

<!-- Footer -->
<footer class="page-footer">
  <div class="container">
    <p class="footer-text">
      <a href="../../">水神的工具箱</a> · 資料來源：遊戲本體、<a href="https://xivapi.com" target="_blank">XIVAPI</a>
    </p>
    <p class="footer-text" style="margin-top:4px">
      FINAL FANTASY XIV © SQUARE ENIX　此為玩家自製非官方工具
    </p>
  </div>
</footer>

<script>
(function() {
  const STORAGE_KEY = 'ffxiv_emotes_owned';
  const DATA_URL = '../../data/emotes.json';
  const ICON_BASE = '../../assets/emotes'; // 地端圖示（download-emotes-icons.mjs 下載）

  // ── State ──
  let EM_DATA = [];
  let PATCHES = [];
  let SOURCE_TYPES = [];
  let owned = new Set(JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'));
  let filterOwn = 'all';     // all | owned | missing
  let filterPatch = null;    // string | null
  let filterSource = null;   // string | null
  let searchQ = '';

  // ── Unique key ──
  function keyOf(e) {
    return 'id:' + e.id;
  }

  // ── Save ──
  function save() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify([...owned]));
  }

  // ── Toggle ──
  function toggle(k) {
    if (owned.has(k)) owned.delete(k);
    else owned.add(k);
    save();
    updateProgress();
    renderGrid();
  }

  // ── Progress ──
  function updateProgress() {
    const total = EM_DATA.length;
    const count = EM_DATA.filter(e => owned.has(keyOf(e))).length;
    const pct = total ? Math.round(count / total * 100) : 0;
    document.getElementById('ownedCount').textContent = count;
    document.getElementById('totalCount').textContent = total;
    document.getElementById('progressFill').style.width = pct + '%';
    document.getElementById('progressPct').textContent = pct + '%';
  }

  // ── Patch filter renderer ──
  function renderPatchFilters() {
    const wrap = document.getElementById('patchFilters');
    wrap.innerHTML = '';
    PATCHES.forEach(v => {
      const btn = document.createElement('button');
      btn.className = 'filter-tag' + (filterPatch === v ? ' active' : '');
      btn.textContent = v;
      btn.addEventListener('click', () => {
        filterPatch = filterPatch === v ? null : v;
        renderPatchFilters();
        renderGrid();
      });
      wrap.appendChild(btn);
    });
  }

  // ── Source filter renderer ──
  function renderSourceFilters() {
    const wrap = document.getElementById('sourceFilters');
    wrap.innerHTML = '';
    SOURCE_TYPES.forEach(v => {
      const btn = document.createElement('button');
      btn.className = 'filter-tag' + (filterSource === v ? ' active' : '');
      btn.textContent = v;
      btn.addEventListener('click', () => {
        filterSource = filterSource === v ? null : v;
        renderSourceFilters();
        renderGrid();
      });
      wrap.appendChild(btn);
    });
  }

  // ── Filter ──
  function filtered() {
    return EM_DATA.filter(e => {
      const k = keyOf(e);

      if (filterOwn === 'owned'   && !owned.has(k)) return false;
      if (filterOwn === 'missing' &&  owned.has(k)) return false;

      if (filterPatch && e.patch !== filterPatch) return false;

      if (filterSource) {
        const types = (e.sources || []).map(s => s.type);
        const match = filterSource === '待補充' ? types.length === 0 : types.includes(filterSource);
        if (!match) return false;
      }

      if (searchQ) {
        const q = searchQ.toLowerCase();
        const nameMatch  = e.name    && e.name.toLowerCase().includes(q);
        const enMatch    = e.nameEn  && e.nameEn.toLowerCase().includes(q);
        const cmdMatch   = e.command && e.command.toLowerCase().includes(q);
        if (!nameMatch && !enMatch && !cmdMatch) return false;
      }

      return true;
    });
  }

  // ── Render grid ──
  function renderGrid() {
    const list = filtered();
    const grid = document.getElementById('emGrid');
    const empty = document.getElementById('emptyState');
    const meta = document.getElementById('resultMeta');

    grid.innerHTML = '';
    if (list.length === 0) {
      grid.style.display = 'none';
      empty.style.display = '';
    } else {
      grid.style.display = '';
      empty.style.display = 'none';
    }

    const ownedInView = list.filter(e => owned.has(keyOf(e))).length;
    meta.innerHTML = `顯示 <em>${list.length}</em> / ${EM_DATA.length} 個 · 已解鎖 <em>${ownedInView}</em> / ${list.length}`;

    list.forEach(e => {
      const k = keyOf(e);
      const isOwned = owned.has(k);
      const card = document.createElement('div');
      card.className = 'em-card' + (isOwned ? ' owned' : '');

      // Icon（地端圖片：/i/246000/246201.png → 246201.webp）
      const iconFile = e.icon ? e.icon.split('/').pop().replace(/\.png$/i, '.webp') : null;
      const iconHtml = iconFile
        ? `<img class="em-icon" src="${ICON_BASE}/${iconFile}" alt="" loading="lazy" onerror="this.parentElement.innerHTML='<span class=em-icon-placeholder>💃</span>'">`
        : `<span class="em-icon-placeholder">💃</span>`;

      // 名稱：有繁中名顯示繁中 + 英文，否則只顯示英文
      const nameHtml = e.name && /[一-鿿]/.test(e.name)
        ? `<div class="em-name">${e.name}</div><div class="em-name-zh">${e.nameEn}</div>`
        : `<div class="em-name">${e.nameEn}</div>`;

      // 指令
      const cmdHtml = e.command
        ? `<span class="em-command">${e.command}</span>`
        : '';

      // Patch tag
      const patchHtml = e.patch
        ? `<span class="tag patch-tag">ver ${e.patch}</span>`
        : '';

      // 來源標籤 + 取得方式
      const sources = e.sources || [];
      const sourceTags = sources.length
        ? sources.map(s => `<span class="source-tag type-${s.type}">${s.type}</span>`).join('')
        : `<span class="source-tag placeholder">待補充</span>`;
      const detailText = sources.length
        ? sources.map(s => s.detail).filter(Boolean).join('、')
        : '取得方式待補充';

      card.innerHTML = `
        <div class="em-icon-wrap">${iconHtml}</div>
        ${nameHtml}
        ${cmdHtml}
        <div class="em-sources">${sourceTags}</div>
        <div class="em-detail">${detailText}</div>
        <div class="em-tags">${patchHtml}</div>
      `;

      card.addEventListener('click', () => toggle(k));
      grid.appendChild(card);
    });
  }

  // ── Export / Import ──
  function exportProgress() {
    const payload = {
      schema: 'emotes-progress',
      exported: new Date().toISOString(),
      owned: [...owned]
    };
    const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'emotes-progress.json';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }

  function importProgress(file) {
    const reader = new FileReader();
    reader.onload = ev => {
      try {
        const data = JSON.parse(ev.target.result);
        const list = Array.isArray(data) ? data : data.owned;
        if (!Array.isArray(list)) throw new Error('格式錯誤');
        owned = new Set(list);
        save();
        updateProgress();
        renderGrid();
        alert('匯入成功，共 ' + owned.size + ' 筆已解鎖記錄');
      } catch (err) {
        alert('匯入失敗：檔案格式不正確');
      }
    };
    reader.readAsText(file);
  }

  // ── Own-toggle buttons ──
  document.querySelectorAll('.own-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      filterOwn = btn.dataset.own;
      document.querySelectorAll('.own-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderGrid();
    });
  });

  // ── Search ──
  document.getElementById('searchInput').addEventListener('input', e => {
    searchQ = e.target.value.trim();
    renderGrid();
  });

  // ── Export / Import / Clear ──
  document.getElementById('exportBtn').addEventListener('click', exportProgress);
  document.getElementById('importBtn').addEventListener('click', () => {
    document.getElementById('importFile').click();
  });
  document.getElementById('importFile').addEventListener('change', e => {
    const file = e.target.files[0];
    if (file) importProgress(file);
    e.target.value = '';
  });
  document.getElementById('clearBtn').addEventListener('click', () => {
    if (!confirm('確定要清除所有解鎖記錄嗎？')) return;
    owned.clear();
    save();
    updateProgress();
    renderGrid();
  });

  // ── Init: load data ──
  fetch(DATA_URL)
    .then(res => {
      if (!res.ok) throw new Error('無法載入資料 (' + res.status + ')');
      return res.json();
    })
    .then(json => {
      const raw = (json && json.data) ? json.data : [];
      // name=null 表示台服未開放，前端隱藏
      EM_DATA = raw.filter(e => e.name !== null);

      // 排序：依 id
      EM_DATA.sort((a, b) => (a.id || 0) - (b.id || 0));

      // Patch 版本清單（排序）
      const patchSet = new Set(EM_DATA.map(e => e.patch).filter(Boolean));
      PATCHES = [...patchSet].sort((a, b) => {
        const [ma, pa] = a.split('.').map(Number);
        const [mb, pb] = b.split('.').map(Number);
        return ma !== mb ? ma - mb : pa - pb;
      });

      if (PATCHES.length > 0) {
        document.getElementById('patchFilterSection').style.display = '';
        renderPatchFilters();
      }

      // 來源類型清單（固定排序，未補的歸「待補充」）
      const ORDER = ['預設', '動作指南書', '任務', '成就', 'App', '待補充'];
      const typeSet = new Set();
      EM_DATA.forEach(e => {
        const types = (e.sources || []).map(s => s.type);
        if (types.length === 0) typeSet.add('待補充');
        else types.forEach(t => typeSet.add(t));
      });
      SOURCE_TYPES = ORDER.filter(t => typeSet.has(t))
        .concat([...typeSet].filter(t => !ORDER.includes(t)));
      if (SOURCE_TYPES.length > 0) {
        document.getElementById('sourceFilterSection').style.display = '';
        renderSourceFilters();
      }

      updateProgress();
      renderGrid();
    })
    .catch(err => {
      const grid = document.getElementById('emGrid');
      const empty = document.getElementById('emptyState');
      grid.style.display = 'none';
      empty.style.display = '';
      empty.textContent = '資料載入失敗：' + err.message;
    });
})();
</script>
</body>
</html>
