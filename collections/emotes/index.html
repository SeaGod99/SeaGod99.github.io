<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="FF14 表情收藏追蹤 — 指令搜尋、版本篩選、記錄已解鎖進度">
  <title>表情收藏追蹤 | 水神的工具箱</title>
  <link rel="stylesheet" href="../../assets/css/common.css">
  <style>
    /* 表情頁專屬樣式；通用版面與 .col-* 卡片系統見 assets/css/common.css */
    :root {
      --accent:   #c8a96e;                 /* 金 */
      --accent-2: #a78bfa;                 /* 進度條尾色：紫 */
      --glow-1:   rgba(200,169,110,0.06);
      --glow-2:   rgba(167,139,250,0.04);
    }
    /* 表情卡：置中版型 */
    .col-card { align-items: center; text-align: center; }
    .col-tags { justify-content: center; }
    .col-detail { border-left: 0; padding-left: 0; }
    .col-card.locked { cursor: default; }
    .col-icon-wrap, .col-icon { width: 56px; height: 56px; }
    .col-icon-ph { font-size: 26px; }
    .col-name { font-size: 14px; word-break: break-word; }

    .em-command {
      font-size: 11px;
      color: var(--blue);
      font-family: 'SF Mono', 'Consolas', monospace;
      background: var(--blue-dim);
      padding: 2px 7px;
      border-radius: 4px;
    }
    /* 表情頁語意：type-任務 為藍色任務（覆寫 common 的綠色） */
    .src-tag.type-任務 { background: rgba(79,195,247,0.1); color: var(--blue); border-color: rgba(79,195,247,0.2); }

    @media (max-width: 600px) { .col-grid { grid-template-columns: repeat(3, 1fr); } }
    @media (max-width: 380px) { .col-grid { grid-template-columns: repeat(2, 1fr); } }
  </style>
  <script src="../../assets/js/patch-gate.js"></script>
  <link rel="stylesheet" href="../../assets/css/theme.css">
  <script src="../../assets/js/theme.js"></script>
</head>
<body>

<div class="container">

  <!-- Header -->
  <header class="page-header">
    <a href="../../" class="back-btn">← 水神的工具箱</a>
    <div class="page-title-wrap">
      <h1 class="page-title">表情收藏追蹤</h1>
      <p class="page-subtitle">點擊卡片標記已解鎖，進度自動儲存於瀏覽器</p>
    </div>
  </header>

  <!-- Progress -->
  <div class="progress-bar-wrap">
    <div class="progress-info">
      <span id="ownedCount">0</span> / <span id="totalCount">0</span>
      <span>已解鎖</span>
    </div>
    <div class="progress-track">
      <div class="progress-fill" id="progressFill" style="width:0%"></div>
    </div>
    <div class="progress-pct" id="progressPct">0%</div>
  </div>

  <!-- Toolbar -->
  <div class="toolbar">
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input class="search-input" type="text" id="searchInput" placeholder="搜尋表情名稱或指令…" autocomplete="off">
    </div>
    <div class="own-toggle">
      <button class="own-btn active" data-own="all">全部</button>
      <button class="own-btn" data-own="owned">已解鎖</button>
      <button class="own-btn" data-own="missing">未解鎖</button>
    </div>
    <button class="icon-btn" id="exportBtn">匯出進度</button>
    <button class="icon-btn" id="importBtn">匯入進度</button>
    <input type="file" id="importFile" accept="application/json" style="display:none">
    <button class="icon-btn clear-btn" id="clearBtn">清除進度</button>
  </div>


  <!-- Source filter -->
  <div class="filter-section" id="sourceFilterSection" style="display:none">
    <div class="filter-label">取得來源</div>
    <div class="filter-tags" id="sourceFilters"></div>
  </div>

  <!-- Result meta -->
  <div class="result-meta" id="resultMeta"></div>

  <!-- Grid -->
  <div class="col-grid" id="emGrid"></div>

  <div class="empty-state" id="emptyState" style="display:none">
    找不到符合條件的表情
  </div>

</div>

<!-- Footer -->
<footer class="page-footer">
  <div class="container">
    <p class="footer-text">
      <a href="../../">水神的工具箱</a> · 資料來源：遊戲本體、<a href="https://xivapi.com" target="_blank">XIVAPI</a>
    </p>
    <p class="footer-text" style="margin-top:4px">
      FINAL FANTASY XIV © SQUARE ENIX　此為玩家自製非官方工具
    </p>
  </div>
</footer>

<script>
(function() {
  const STORAGE_KEY = 'ffxiv_emotes_owned';
  const DATA_URL = '../../data/emotes.json';
  const ICON_BASE = '../../assets/emotes'; // 地端圖示（download-emotes-icons.mjs 下載）

  // ── State ──
  let EM_DATA = [];
  let SOURCE_TYPES = [];
  let owned = new Set(JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'));
  let filterOwn = 'all';     // all | owned | missing
  let filterSource = null;   // string | null
  let searchQ = '';

  // ── Unique key ──
  function keyOf(e) {
    return 'id:' + e.id;
  }

  // 預設表情（角色初始即有）一律視為已收藏，且不可手動取消
  function isDefault(e) {
    return (e.sources || []).some(s => s.type === '預設');
  }
  function isOwned(e) {
    return isDefault(e) || owned.has(keyOf(e));
  }

  // ── Save ──
  function save() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify([...owned]));
  }

  // ── Toggle ──
  function toggle(k) {
    if (owned.has(k)) owned.delete(k);
    else owned.add(k);
    save();
    updateProgress();
    renderGrid();
  }

  // ── Progress ──
  function updateProgress() {
    const total = EM_DATA.length;
    const count = EM_DATA.filter(e => isOwned(e)).length;
    const pct = total ? Math.round(count / total * 100) : 0;
    document.getElementById('ownedCount').textContent = count;
    document.getElementById('totalCount').textContent = total;
    document.getElementById('progressFill').style.width = pct + '%';
    document.getElementById('progressPct').textContent = pct + '%';
    try { localStorage.setItem('ffxiv_snap_emotes', JSON.stringify({ c: count, t: total })); } catch (e) {} // 首頁進度儀表板快照
  }

  // ── Source filter renderer ──
  function renderSourceFilters() {
    const wrap = document.getElementById('sourceFilters');
    wrap.innerHTML = '';
    SOURCE_TYPES.forEach(v => {
      const btn = document.createElement('button');
      btn.className = 'filter-tag' + (filterSource === v ? ' active' : '');
      btn.textContent = v;
      btn.addEventListener('click', () => {
        filterSource = filterSource === v ? null : v;
        renderSourceFilters();
        renderGrid();
      });
      wrap.appendChild(btn);
    });
  }

  // ── Filter ──
  function filtered() {
    return EM_DATA.filter(e => {
      if (filterOwn === 'owned'   && !isOwned(e)) return false;
      if (filterOwn === 'missing' &&  isOwned(e)) return false;

      if (filterSource) {
        const types = (e.sources || []).map(s => s.type);
        const match = filterSource === '待補充' ? types.length === 0 : types.includes(filterSource);
        if (!match) return false;
      }

      if (searchQ) {
        const q = searchQ.toLowerCase();
        const nameMatch  = e.name    && e.name.toLowerCase().includes(q);
        const enMatch    = e.nameEn  && e.nameEn.toLowerCase().includes(q);
        const cmdMatch   = e.command && e.command.toLowerCase().includes(q);
        if (!nameMatch && !enMatch && !cmdMatch) return false;
      }

      return true;
    });
  }

  // ── Render grid ──
  function renderGrid() {
    const list = filtered();
    const grid = document.getElementById('emGrid');
    const empty = document.getElementById('emptyState');
    const meta = document.getElementById('resultMeta');

    grid.innerHTML = '';
    if (list.length === 0) {
      grid.style.display = 'none';
      empty.style.display = '';
    } else {
      grid.style.display = '';
      empty.style.display = 'none';
    }

    const ownedInView = list.filter(e => isOwned(e)).length;
    meta.innerHTML = `顯示 <em>${list.length}</em> / ${EM_DATA.length} 個 · 已解鎖 <em>${ownedInView}</em> / ${list.length}`;

    list.forEach(e => {
      const k = keyOf(e);
      const ownedFlag = isOwned(e);
      const lockedDefault = isDefault(e);
      const card = document.createElement('div');
      card.className = 'col-card' + (ownedFlag ? ' owned' : '') + (lockedDefault ? ' locked' : '');

      // Icon（地端圖片：/i/246000/246201.png → 246201.webp）
      const iconFile = e.icon ? e.icon.split('/').pop().replace(/\.png$/i, '.webp') : null;
      const iconHtml = iconFile
        ? `<img class="col-icon" src="${ICON_BASE}/${iconFile}" alt="" loading="lazy" onerror="this.parentElement.innerHTML='<span class=col-icon-ph>💃</span>'">`
        : `<span class="col-icon-ph">💃</span>`;

      // 名稱：顯示繁中名（指令已含英文，不另顯示英文名）；無繁中名才退回英文
      const nameHtml = e.name && /[一-鿿]/.test(e.name)
        ? `<div class="col-name">${e.name}</div>`
        : `<div class="col-name">${e.nameEn}</div>`;

      // 指令
      const cmdHtml = e.command
        ? `<span class="em-command">${e.command}</span>`
        : '';

      // Patch tag
      const patchHtml = e.patch
        ? `<span class="tag patch-tag">ver ${e.patch}</span>`
        : '';

      // 來源標籤 + 取得方式
      const sources = e.sources || [];
      const sourceTags = sources.length
        ? sources.map(s => `<span class="src-tag type-${s.type}">${s.type}</span>`).join('')
        : `<span class="src-tag placeholder">待補充</span>`;
      const detailText = sources.length
        ? sources.map(s => s.detail).filter(Boolean).join('、')
        : '取得方式待補充';

      card.innerHTML = `
        <div class="col-icon-wrap">${iconHtml}</div>
        ${nameHtml}
        ${cmdHtml}
        <div class="col-tags">${sourceTags}</div>
        <div class="col-detail">${detailText}</div>
        <div class="col-tags">${patchHtml}</div>
      `;

      // 預設表情恆為已收藏，不可點掉；其餘可切換
      if (!lockedDefault) card.addEventListener('click', () => toggle(k));
      grid.appendChild(card);
    });
  }

  // ── Export / Import ──
  function exportProgress() {
    const payload = {
      schema: 'emotes-progress',
      exported: new Date().toISOString(),
      owned: [...owned]
    };
    const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'emotes-progress.json';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }

  function importProgress(file) {
    const reader = new FileReader();
    reader.onload = ev => {
      try {
        const data = JSON.parse(ev.target.result);
        const list = Array.isArray(data) ? data : data.owned;
        if (!Array.isArray(list)) throw new Error('格式錯誤');
        owned = new Set(list);
        save();
        updateProgress();
        renderGrid();
        alert('匯入成功，共 ' + owned.size + ' 筆已解鎖記錄');
      } catch (err) {
        alert('匯入失敗：檔案格式不正確');
      }
    };
    reader.readAsText(file);
  }

  // ── Own-toggle buttons ──
  document.querySelectorAll('.own-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      filterOwn = btn.dataset.own;
      document.querySelectorAll('.own-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderGrid();
    });
  });

  // ── Search ──
  document.getElementById('searchInput').addEventListener('input', e => {
    searchQ = e.target.value.trim();
    renderGrid();
  });

  // ── Export / Import / Clear ──
  document.getElementById('exportBtn').addEventListener('click', exportProgress);
  document.getElementById('importBtn').addEventListener('click', () => {
    document.getElementById('importFile').click();
  });
  document.getElementById('importFile').addEventListener('change', e => {
    const file = e.target.files[0];
    if (file) importProgress(file);
    e.target.value = '';
  });
  document.getElementById('clearBtn').addEventListener('click', () => {
    if (!confirm('確定要清除所有解鎖記錄嗎？')) return;
    owned.clear();
    save();
    updateProgress();
    renderGrid();
  });

  // ── Init: load data ──
  fetch(DATA_URL)
    .then(res => {
      if (!res.ok) throw new Error('無法載入資料 (' + res.status + ')');
      return res.json();
    })
    .then(async json => {
      const raw = (json && json.data) ? json.data : [];
      const gp = await PatchGate.loadGamePatch('../../data/_meta.json');
      // name=null 或 patch > gamePatch 表示台服未開放，前端隱藏
      EM_DATA = raw.filter(e => e.name !== null && PatchGate.released(e.patch, gp));

      // 排序：依 id
      EM_DATA.sort((a, b) => (a.id || 0) - (b.id || 0));


      // 來源類型清單（固定排序，未補的歸「待補充」）
      const ORDER = ['預設', '動作指南書', '任務', '成就', 'App', '待補充'];
      const typeSet = new Set();
      EM_DATA.forEach(e => {
        const types = (e.sources || []).map(s => s.type);
        if (types.length === 0) typeSet.add('待補充');
        else types.forEach(t => typeSet.add(t));
      });
      SOURCE_TYPES = ORDER.filter(t => typeSet.has(t))
        .concat([...typeSet].filter(t => !ORDER.includes(t)));
      if (SOURCE_TYPES.length > 0) {
        document.getElementById('sourceFilterSection').style.display = '';
        renderSourceFilters();
      }

      updateProgress();
      renderGrid();
    })
    .catch(err => {
      const grid = document.getElementById('emGrid');
      const empty = document.getElementById('emptyState');
      grid.style.display = 'none';
      empty.style.display = '';
      empty.textContent = '資料載入失敗：' + err.message;
    });
})();
</script>
</body>
</html>
