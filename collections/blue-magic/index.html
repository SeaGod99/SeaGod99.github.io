<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="FF14 青魔法術收藏 — 查詢習得來源、屬性/類型篩選、記錄習得進度">
  <title>青魔法術收藏 | 水神的工具箱</title>
  <link rel="stylesheet" href="../../assets/css/common.css">
  <link rel="stylesheet" href="../../assets/css/tool-header.css">
  <style>
    /* 青魔頁專屬樣式；通用版面與 .col-* 卡片系統見 assets/css/common.css，
       控制面由 assets/js/collection-tracker.js 渲染 */
    :root {
      --accent:   #4fc3f7;                 /* 藍 */
      --accent-2: #a78bfa;                 /* 進度條尾色：紫 */
      --glow-1:   rgba(79,195,247,0.06);
      --glow-2:   rgba(200,169,110,0.04);
    }
    .col-grid { grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); }
    .col-card { padding: 18px; }
    .col-name { padding-right: 16px; }
    .bm-meta { font-size: 10px; color: var(--text-muted); }

    /* 階級 / 屬性 / 來源標籤 */
    .tag.rank-1 { background: rgba(74,222,128,0.1);  color: var(--green); border-color: rgba(74,222,128,0.2); }
    .tag.rank-2 { background: rgba(79,195,247,0.1);  color: var(--blue);  border-color: rgba(79,195,247,0.2); }
    .tag.rank-3 { background: rgba(167,139,250,0.1); color: var(--purple); border-color: rgba(167,139,250,0.2); }
    .tag.rank-4 { background: rgba(255,200,80,0.1);  color: #ffc850; border-color: rgba(255,200,80,0.2); }
    .tag.rank-5 { background: rgba(248,113,113,0.1); color: var(--red); border-color: rgba(248,113,113,0.2); }
    .tag.aspect-火 { background: rgba(248,113,113,0.1); color: var(--red); border-color: rgba(248,113,113,0.2); }
    .tag.aspect-水 { background: rgba(79,195,247,0.1); color: var(--blue); border-color: rgba(79,195,247,0.2); }
    .tag.aspect-風 { background: rgba(74,222,128,0.1); color: var(--green); border-color: rgba(74,222,128,0.2); }
    .tag.aspect-土 { background: rgba(200,169,110,0.12); color: var(--gold); border-color: rgba(200,169,110,0.25); }
    .tag.aspect-雷 { background: rgba(167,139,250,0.1); color: var(--purple); border-color: rgba(167,139,250,0.2); }
    .tag.aspect-冰 { background: rgba(79,195,247,0.1); color: var(--blue); border-color: rgba(79,195,247,0.2); }
    .tag.aspect-無 { background: var(--raise); color: var(--text-secondary); border-color: var(--border); }
    .tag.src-副本     { background: rgba(79,195,247,0.1);  color: var(--blue);   border-color: rgba(79,195,247,0.2); }
    .tag.src-野外     { background: rgba(74,222,128,0.1);  color: var(--green);  border-color: rgba(74,222,128,0.2); }
    .tag.src-兌換習得 { background: rgba(200,169,110,0.12); color: var(--gold);   border-color: rgba(200,169,110,0.25); }
    .tag.src-初始習得 { background: rgba(167,139,250,0.12); color: var(--purple); border-color: rgba(167,139,250,0.25); }

    /* 機制效果（藍色左條）— 與「取得方式」金色 .col-detail 並列 */
    .bm-mech {
      display: block;
      margin-top: 2px;
      padding-left: 9px;
      border-left: 2px solid var(--blue);
      font-size: 12px;
      color: var(--text-secondary);
      line-height: 1.55;
      white-space: pre-line;
    }
    .bm-mech:empty { display: none; }
    .bm-mech::before {
      content: "機制";
      display: block;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: .03em;
      color: var(--blue);
      margin-bottom: 2px;
    }

    .col-detail .detail-line { margin-top: 2px; }
    .col-detail .detail-line b { color: var(--text-secondary); font-weight: 500; }

    @media (max-width: 600px) { .col-grid { grid-template-columns: 1fr 1fr; } }
    @media (max-width: 380px) { .col-grid { grid-template-columns: 1fr; } }
  </style>
  <script src="../../assets/js/patch-gate.js"></script>
  <script src="../../assets/js/collection-tracker.js"></script>
  <link rel="stylesheet" href="../../assets/css/theme.css">
  <script src="../../assets/js/theme.js"></script>
</head>
<body>

<div class="container">

  <!-- Header -->
  <div class="tool-header">
    <h1 class="tool-title">💙 青魔法術收藏</h1>
    <p class="tool-subtitle">點擊技能卡片標記已習得，進度自動儲存於瀏覽器</p>
    <div class="header-divider"></div>
  </div>

  <!-- 控制面（進度／工具列／篩選／格線）由 collection-tracker.js 渲染 -->
  <div id="ct-root"></div>

</div>

<!-- Footer -->
<footer class="page-footer">
  <div class="container">
    <p class="footer-text">
      <a href="../../">水神的工具箱</a> · 資料來源：遊戲本體、<a href="https://xivapi.com" target="_blank">XIVAPI</a>
    </p>
    <p class="footer-text" style="margin-top:4px">
      FINAL FANTASY XIV © SQUARE ENIX　此為玩家自製非官方工具
    </p>
  </div>
</footer>

<script>
(async function () {
  var esc = CollectionTracker.esc;

  // 先載入 dungeons.json 建立 contentId→繁中副本名 對照表（learnFrom.contentId 對應 dungeons.id），
  // 再啟動追蹤引擎，確保卡片/搜尋/篩選能取到副本繁中名。
  var DUNGEON_NAMES = {};
  try {
    var dg = await fetch('../../data/dungeons.json').then(function (r) { return r.ok ? r.json() : { data: [] }; });
    (dg.data || []).forEach(function (d) { if (d.id != null && d.name) DUNGEON_NAMES[d.id] = d.name; });
  } catch (e) { /* 副本名對照失敗仍可運作，退回 detail 字串 */ }

  // 取得方式分類：擊敗怪物（副本∪野外）、兌換習得（圖騰）、初始習得（預設）；地點寫進 detail
  function resolveLearnFrom(m) {
    return (m.learnFrom || []).map(function (l) {
      var mobs = (l.mobs && l.mobs.length) ? '：' + l.mobs.join('、') : '';
      if (l.type === '副本') {
        var name = DUNGEON_NAMES[l.contentId] || l.detail || '';
        return { type: '副本', detail: (name ? '副本「' + name + '」' : '副本') + mobs };
      }
      if (l.type === '野外') return { type: '野外', detail: (l.detail ? '野外「' + l.detail + '」' : '野外') + mobs };
      if (l.type === '圖騰') {
        var cond = l.cond ? '（' + l.cond + '）' : '';
        var where = l.npc ? ' — ' + (l.npcLocation || '') + '・' + l.npc : '';
        return { type: '兌換習得', detail: (l.detail || '圖騰') + '兌換' + cond + where };
      }
      if (l.type === '預設') return { type: '初始習得', detail: l.detail || '青魔法師初始即會' };
      return { type: l.type, detail: l.detail || '' };
    });
  }

  CollectionTracker.init({
    dataUrl: '../../data/blue-magic.json',
    metaUrl: '../../data/_meta.json',
    storageKey: 'ffxiv_bluemagic_learned',
    snapKey: 'bluemagic',
    fileBase: 'blue-magic',
    schema: 'blue-magic-progress',
    verb: '習得',
    unit: '個',
    noun: '青魔法術',
    searchPlaceholder: '搜尋技能名稱、習得地點…',
    include: function (m, gp) { return m.name && PatchGate.released(m.patch, gp); },
    prepare: function (list) { return list.slice().sort(function (a, b) { return (a.no || 0) - (b.no || 0); }); },
    searchText: function (m) {
      var parts = [m.name, m.nameEn];
      resolveLearnFrom(m).forEach(function (l) { if (l.detail) parts.push(l.detail); });
      return parts.filter(Boolean).join(' ').toLowerCase();
    },
    sorts: ['patch-desc', 'patch-asc', 'name'],
    filters: [
      {
        id: 'source', label: '習得方式',
        options: function () {
          return ['擊敗怪物', '野外', '副本', '兌換習得', '初始習得'].map(function (v) { return { value: v, label: v }; });
        },
        match: function (m, v) {
          var cats = resolveLearnFrom(m).map(function (l) { return l.type; });
          return v === '擊敗怪物' ? (cats.indexOf('副本') >= 0 || cats.indexOf('野外') >= 0) : cats.indexOf(v) >= 0;
        }
      },
      {
        id: 'aspect', label: '屬性',
        options: function (list) {
          var set = new Set(list.map(function (m) { return m.aspect || '無'; }));
          return ['火', '水', '風', '土', '雷', '冰', '無'].filter(function (a) { return set.has(a); })
            .map(function (a) { return { value: a, label: a }; });
        },
        match: function (m, v) { return (m.aspect || '無') === v; }
      },
      {
        id: 'type', label: '類型',
        options: function (list) {
          var set = new Set(); list.forEach(function (m) { if (m.type) set.add(m.type); });
          return Array.from(set).sort().map(function (t) { return { value: t, label: t }; });
        },
        match: function (m, v) { return m.type === v; }
      },
      {
        id: 'rank', label: '階級',
        options: function (list) {
          var set = new Set(); list.forEach(function (m) { if (m.rank != null) set.add(m.rank); });
          return Array.from(set).sort(function (a, b) { return a - b; }).map(function (r) { return { value: String(r), label: 'Rank ' + r }; });
        },
        match: function (m, v) { return m.rank === Number(v); }
      }
    ],
    card: function (m) {
      var ICON_BASE = '../../assets/blue-magic/';
      var learn = resolveLearnFrom(m);
      var sourceTags = learn.length
        ? Array.from(new Set(learn.map(function (l) { return l.type; }))).map(function (t) { return '<span class="tag src-' + esc(t) + '">' + esc(t) + '</span>'; }).join('')
        : '<span class="tag placeholder">待補充</span>';
      var aspectLabel = m.aspect || '無';
      var iconHtml = m.icon
        ? '<img class="col-icon" src="' + ICON_BASE + esc(m.icon.split('/').pop()) + '" alt="" loading="lazy">'
        : '<div class="col-icon placeholder">💙</div>';
      var details = Array.from(new Set(learn.map(function (l) { return l.detail; }).filter(Boolean)));
      var detailLines = details.length
        ? details.map(function (d) { return '<div class="detail-line">' + esc(d) + '</div>'; }).join('')
        : '<div class="detail-line">待補充</div>';
      return '' +
        '<div class="col-head">' + iconHtml +
          '<div style="flex:1; min-width:0;">' +
            '<div class="col-name">' + esc(m.name) + '</div>' +
            '<div class="bm-meta">No.' + esc(m.no) + (m.patch ? ' · ver ' + esc(m.patch) : '') + '</div>' +
          '</div>' +
        '</div>' +
        '<div class="col-tags">' +
          '<span class="tag rank-' + esc(m.rank) + '">Rank ' + esc(m.rank) + '</span>' +
          '<span class="tag aspect-' + esc(aspectLabel) + '">' + esc(aspectLabel) + '</span>' +
          '<span class="tag">' + esc(m.type) + '</span>' + sourceTags +
        '</div>' +
        '<div class="bm-mech">' + esc(m.mechanic || '') + '</div>' +
        '<div class="col-detail">' + detailLines + '</div>';
    }
  });
})();
</script>
</body>
</html>
