<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="FF14 青魔法術收藏 — 查詢習得來源、屬性/類型篩選、記錄習得進度">
  <title>青魔法術收藏 | 水神的工具箱</title>
  <link rel="stylesheet" href="../../assets/css/common.css">
  <style>
    /* 青魔頁專屬樣式；通用版面與 .col-* 卡片系統見 assets/css/common.css */
    :root {
      --accent:   #4fc3f7;                 /* 藍 */
      --accent-2: #a78bfa;                 /* 進度條尾色：紫 */
      --glow-1:   rgba(79,195,247,0.06);
      --glow-2:   rgba(200,169,110,0.04);
    }
    .col-grid { grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); }
    .col-card { padding: 18px; }
    .col-name { padding-right: 16px; }
    .bm-meta { font-size: 10px; color: var(--text-muted); }

    /* 階級 / 屬性 / 來源標籤 */
    .tag.rank-1 { background: rgba(74,222,128,0.1);  color: var(--green); border-color: rgba(74,222,128,0.2); }
    .tag.rank-2 { background: rgba(79,195,247,0.1);  color: var(--blue);  border-color: rgba(79,195,247,0.2); }
    .tag.rank-3 { background: rgba(167,139,250,0.1); color: var(--purple); border-color: rgba(167,139,250,0.2); }
    .tag.rank-4 { background: rgba(255,200,80,0.1);  color: #ffc850; border-color: rgba(255,200,80,0.2); }
    .tag.rank-5 { background: rgba(248,113,113,0.1); color: var(--red); border-color: rgba(248,113,113,0.2); }
    .tag.aspect-火 { background: rgba(248,113,113,0.1); color: var(--red); border-color: rgba(248,113,113,0.2); }
    .tag.aspect-水 { background: rgba(79,195,247,0.1); color: var(--blue); border-color: rgba(79,195,247,0.2); }
    .tag.aspect-風 { background: rgba(74,222,128,0.1); color: var(--green); border-color: rgba(74,222,128,0.2); }
    .tag.aspect-土 { background: rgba(200,169,110,0.12); color: var(--gold); border-color: rgba(200,169,110,0.25); }
    .tag.aspect-雷 { background: rgba(167,139,250,0.1); color: var(--purple); border-color: rgba(167,139,250,0.2); }
    .tag.aspect-冰 { background: rgba(79,195,247,0.1); color: var(--blue); border-color: rgba(79,195,247,0.2); }
    .tag.aspect-無 { background: var(--raise); color: var(--text-secondary); border-color: var(--border); }
    .tag.src-副本     { background: rgba(79,195,247,0.1);  color: var(--blue);   border-color: rgba(79,195,247,0.2); }
    .tag.src-野外     { background: rgba(74,222,128,0.1);  color: var(--green);  border-color: rgba(74,222,128,0.2); }
    .tag.src-兌換習得 { background: rgba(200,169,110,0.12); color: var(--gold);   border-color: rgba(200,169,110,0.25); }
    .tag.src-初始習得 { background: rgba(167,139,250,0.12); color: var(--purple); border-color: rgba(167,139,250,0.25); }

    /* 機制效果（藍色左條）— 與「取得方式」金色 .col-detail 並列 */
    .bm-mech {
      display: block;
      margin-top: 2px;
      padding-left: 9px;
      border-left: 2px solid var(--blue);
      font-size: 12px;
      color: var(--text-secondary);
      line-height: 1.55;
      white-space: pre-line;
    }
    .bm-mech:empty { display: none; }
    .bm-mech::before {
      content: "機制";
      display: block;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: .03em;
      color: var(--blue);
      margin-bottom: 2px;
    }

    .col-detail .detail-line { margin-top: 2px; }
    .col-detail .detail-line b { color: var(--text-secondary); font-weight: 500; }

    @media (max-width: 600px) { .col-grid { grid-template-columns: 1fr 1fr; } }
    @media (max-width: 380px) { .col-grid { grid-template-columns: 1fr; } }
  </style>
  <script src="../../assets/js/patch-gate.js"></script>
  <link rel="stylesheet" href="../../assets/css/theme.css">
  <script src="../../assets/js/theme.js"></script>
</head>
<body>

<div class="container">

  <!-- Header -->
  <header class="page-header">
    <a href="../../" class="back-btn">← 水神的工具箱</a>
    <div class="page-title-wrap">
      <h1 class="page-title">💙 青魔法術收藏</h1>
      <p class="page-subtitle">點擊技能卡片標記已習得，進度自動儲存於瀏覽器</p>
    </div>
  </header>

  <!-- Progress -->
  <div class="progress-bar-wrap">
    <div class="progress-info">
      <span id="ownedCount">0</span> / <span id="totalCount">0</span>
      <span>已習得</span>
    </div>
    <div class="progress-track">
      <div class="progress-fill" id="progressFill" style="width:0%"></div>
    </div>
    <div class="progress-pct" id="progressPct">0%</div>
  </div>

  <!-- Toolbar -->
  <div class="toolbar">
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input class="search-input" type="text" id="searchInput" placeholder="搜尋技能名稱…" autocomplete="off">
    </div>
    <div class="own-toggle">
      <button class="own-btn active" data-own="all">全部</button>
      <button class="own-btn" data-own="owned">已習得</button>
      <button class="own-btn" data-own="missing">未習得</button>
    </div>
    <button class="icon-btn" id="exportBtn">匯出進度</button>
    <button class="icon-btn" id="importBtn">匯入進度</button>
    <input type="file" id="importFile" accept="application/json" style="display:none">
    <button class="icon-btn clear-btn" id="clearBtn">清除進度</button>
  </div>

  <!-- Source filter -->
  <div class="filter-section">
    <div class="filter-label">習得方式</div>
    <div class="filter-tags" id="sourceFilters"></div>
  </div>

  <!-- Aspect filter -->
  <div class="filter-section">
    <div class="filter-label">屬性</div>
    <div class="filter-tags" id="aspectFilters"></div>
  </div>

  <!-- Type filter -->
  <div class="filter-section">
    <div class="filter-label">類型</div>
    <div class="filter-tags" id="typeFilters"></div>
  </div>

  <!-- Rank filter -->
  <div class="filter-section">
    <div class="filter-label">階級</div>
    <div class="filter-tags" id="rankFilters"></div>
  </div>

  <!-- Result meta -->
  <div class="result-meta" id="resultMeta"></div>

  <!-- Grid -->
  <div class="col-grid" id="bmGrid"></div>

  <div class="empty-state" id="emptyState" style="display:none">
    找不到符合條件的青魔法術
  </div>

</div>

<!-- Footer -->
<footer class="page-footer">
  <div class="container">
    <p class="footer-text">
      <a href="../../">水神的工具箱</a> · 資料來源：遊戲本體、<a href="https://xivapi.com" target="_blank">XIVAPI</a>
    </p>
    <p class="footer-text" style="margin-top:4px">
      FINAL FANTASY XIV © SQUARE ENIX　此為玩家自製非官方工具
    </p>
  </div>
</footer>

<script>
(function() {
  const STORAGE_KEY = 'ffxiv_bluemagic_learned';
  const DATA_URL = '../../data/blue-magic.json';
  const DUNGEONS_URL = '../../data/dungeons.json';
  const ICON_BASE = '../../assets/blue-magic/';

  // ── State ──
  let BM_DATA = [];
  let DUNGEON_NAMES = {}; // contentId(dungeons.id) -> 繁中名
  let ASPECTS = [];
  let TYPES = [];
  let RANKS = [];
  let owned = new Set(JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'));
  let filterOwn = 'all';       // all | owned | missing
  let filterSource = null;     // '副本' | '野外' | '__none__' | null
  let filterAspect = null;     // string | null
  let filterType = null;       // string | null
  let filterRank = null;       // number | null
  let searchQ = '';

  // ── Unique key ──
  function keyOf(m) {
    return 'id:' + m.id;
  }

  // ── Save ──
  function save() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify([...owned]));
  }

  // ── Toggle ──
  function toggle(k) {
    if (owned.has(k)) owned.delete(k);
    else owned.add(k);
    save();
    updateProgress();
    renderGrid();
  }

  // ── Progress ──
  function updateProgress() {
    const total = BM_DATA.length;
    const count = BM_DATA.filter(m => owned.has(keyOf(m))).length;
    const pct = total ? Math.round(count / total * 100) : 0;
    document.getElementById('ownedCount').textContent = count;
    document.getElementById('totalCount').textContent = total;
    document.getElementById('progressFill').style.width = pct + '%';
    document.getElementById('progressPct').textContent = pct + '%';
    try { localStorage.setItem('ffxiv_snap_bluemagic', JSON.stringify({ c: count, t: total })); } catch (e) {} // 首頁進度儀表板快照
  }

  // ── Generic filter tag renderer ──
  function renderTagFilters(containerId, values, current, onClick, labelFn) {
    const wrap = document.getElementById(containerId);
    wrap.innerHTML = '';
    values.forEach(v => {
      const btn = document.createElement('button');
      btn.className = 'filter-tag' + (current === v ? ' active' : '');
      btn.textContent = labelFn ? labelFn(v) : v;
      btn.addEventListener('click', () => onClick(v));
      wrap.appendChild(btn);
    });
  }

  function renderSourceFilters() {
    // 擊敗怪物為父類（含副本∪野外），野外／副本為其子類
    renderTagFilters('sourceFilters', ['擊敗怪物', '野外', '副本', '兌換習得', '初始習得'], filterSource,
      v => { filterSource = filterSource === v ? null : v; renderSourceFilters(); renderGrid(); }
    );
  }

  function renderAspectFilters() {
    renderTagFilters('aspectFilters', ASPECTS, filterAspect,
      v => { filterAspect = filterAspect === v ? null : v; renderAspectFilters(); renderGrid(); }
    );
  }

  function renderTypeFilters() {
    renderTagFilters('typeFilters', TYPES, filterType,
      v => { filterType = filterType === v ? null : v; renderTypeFilters(); renderGrid(); }
    );
  }

  function renderRankFilters() {
    renderTagFilters('rankFilters', RANKS, filterRank,
      v => { filterRank = filterRank === v ? null : v; renderRankFilters(); renderGrid(); },
      v => 'Rank ' + v
    );
  }

  // ── 取得方式分類：擊敗怪物再分「副本／野外」（同一法術可同時含兩者）、
  //    兌換習得（圖騰）、初始習得（預設）。地點寫進 detail。 ──
  function resolveLearnFrom(m) {
    return (m.learnFrom || []).map(l => {
      const mobs = (l.mobs && l.mobs.length) ? `：${l.mobs.join('、')}` : '';
      if (l.type === '副本') {
        const name = DUNGEON_NAMES[l.contentId] || l.detail || '';
        return { type: '副本', detail: (name ? `副本「${name}」` : '副本') + mobs };
      }
      if (l.type === '野外') {
        return { type: '野外', detail: (l.detail ? `野外「${l.detail}」` : '野外') + mobs };
      }
      if (l.type === '圖騰') {
        const cond = l.cond ? `（${l.cond}）` : '';
        const where = l.npc ? ` — ${l.npcLocation || ''}・${l.npc}` : '';
        return { type: '兌換習得', detail: `${l.detail || '圖騰'}兌換${cond}${where}` };
      }
      if (l.type === '預設') {
        return { type: '初始習得', detail: l.detail || '青魔法師初始即會' };
      }
      return { type: l.type, detail: l.detail || '' };
    });
  }

  // ── Filter ──
  function filtered() {
    return BM_DATA.filter(m => {
      const k = keyOf(m);

      // ownership
      if (filterOwn === 'owned'   && !owned.has(k)) return false;
      if (filterOwn === 'missing' &&  owned.has(k)) return false;

      // source（擊敗怪物＝副本∪野外的父類；其餘精確比對）
      if (filterSource) {
        const cats = resolveLearnFrom(m).map(l => l.type);
        const match = filterSource === '擊敗怪物'
          ? (cats.includes('副本') || cats.includes('野外'))
          : cats.includes(filterSource);
        if (!match) return false;
      }

      // aspect
      if (filterAspect) {
        const a = m.aspect || '無';
        if (a !== filterAspect) return false;
      }

      // type
      if (filterType && m.type !== filterType) return false;

      // rank
      if (filterRank != null && m.rank !== filterRank) return false;

      // search
      if (searchQ) {
        const q = searchQ.toLowerCase();
        const nameMatch = m.name && m.name.toLowerCase().includes(q);
        const enMatch = m.nameEn && m.nameEn.toLowerCase().includes(q);
        if (!nameMatch && !enMatch) return false;
      }

      return true;
    });
  }

  // ── Render grid ──
  function renderGrid() {
    const list = filtered();
    const grid = document.getElementById('bmGrid');
    const empty = document.getElementById('emptyState');
    const meta = document.getElementById('resultMeta');

    grid.innerHTML = '';
    if (list.length === 0) {
      grid.style.display = 'none';
      empty.style.display = '';
    } else {
      grid.style.display = '';
      empty.style.display = 'none';
    }

    const ownedInView = list.filter(m => owned.has(keyOf(m))).length;
    meta.innerHTML = `顯示 <em>${list.length}</em> / ${BM_DATA.length} 個 · 已習得 <em>${ownedInView}</em> / ${list.length}`;

    list.forEach(m => {
      const k = keyOf(m);
      const isOwned = owned.has(k);
      const card = document.createElement('div');
      card.className = 'col-card' + (isOwned ? ' owned' : '');

      const learn = resolveLearnFrom(m);

      const sourceTags = learn.length
        ? [...new Set(learn.map(l => l.type))].map(t => `<span class="tag src-${t}">${t}</span>`).join('')
        : `<span class="tag placeholder">待補充</span>`;

      const aspectLabel = m.aspect || '無';

      const iconHtml = m.icon
        ? `<img class="col-icon" src="${ICON_BASE}${m.icon.split('/').pop()}" alt="" loading="lazy">`
        : `<div class="col-icon placeholder">💙</div>`;

      // detail lines（取得方式內文：每筆來源一行，地點＋怪物；方法已由標籤表示）
      const detailLines = [];
      [...new Set(learn.map(l => l.detail).filter(Boolean))].forEach(d => {
        detailLines.push(`<div class="detail-line">${d}</div>`);
      });
      if (!detailLines.length) {
        detailLines.push(`<div class="detail-line">待補充</div>`);
      }

      card.innerHTML = `
        <div class="col-head">
          ${iconHtml}
          <div style="flex:1; min-width:0;">
            <div class="col-name">${m.name}</div>
            <div class="bm-meta">No.${m.no}${m.patch ? ' · ver ' + m.patch : ''}</div>
          </div>
        </div>
        <div class="col-tags">
          <span class="tag rank-${m.rank}">Rank ${m.rank}</span>
          <span class="tag aspect-${aspectLabel}">${aspectLabel}</span>
          <span class="tag">${m.type}</span>
          ${sourceTags}
        </div>
        <div class="bm-mech">${m.mechanic || ''}</div>
        <div class="col-detail">${detailLines.join('')}</div>
      `;

      card.addEventListener('click', () => toggle(k));
      grid.appendChild(card);
    });
  }

  // ── Export / Import ──
  function exportProgress() {
    const payload = {
      schema: 'blue-magic-progress',
      exported: new Date().toISOString(),
      owned: [...owned]
    };
    const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'blue-magic-progress.json';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }

  function importProgress(file) {
    const reader = new FileReader();
    reader.onload = e => {
      try {
        const data = JSON.parse(e.target.result);
        const list = Array.isArray(data) ? data : data.owned;
        if (!Array.isArray(list)) throw new Error('格式錯誤');
        owned = new Set(list);
        save();
        updateProgress();
        renderGrid();
        alert('匯入成功，共 ' + owned.size + ' 筆已習得記錄');
      } catch (err) {
        alert('匯入失敗：檔案格式不正確');
      }
    };
    reader.readAsText(file);
  }

  // ── Own-toggle buttons ──
  document.querySelectorAll('.own-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      filterOwn = btn.dataset.own;
      document.querySelectorAll('.own-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderGrid();
    });
  });

  // ── Search ──
  document.getElementById('searchInput').addEventListener('input', e => {
    searchQ = e.target.value.trim();
    renderGrid();
  });

  // ── Export / Import / Clear ──
  document.getElementById('exportBtn').addEventListener('click', exportProgress);
  document.getElementById('importBtn').addEventListener('click', () => {
    document.getElementById('importFile').click();
  });
  document.getElementById('importFile').addEventListener('change', e => {
    const file = e.target.files[0];
    if (file) importProgress(file);
    e.target.value = '';
  });

  document.getElementById('clearBtn').addEventListener('click', () => {
    if (!confirm('確定要清除所有習得記錄嗎？')) return;
    owned.clear();
    save();
    updateProgress();
    renderGrid();
  });

  // ── Init: load data ──
  Promise.all([
    fetch(DATA_URL).then(res => {
      if (!res.ok) throw new Error('無法載入資料 (' + res.status + ')');
      return res.json();
    }),
    fetch(DUNGEONS_URL).then(res => res.ok ? res.json() : { data: [] }).catch(() => ({ data: [] }))
  ])
    .then(async ([bmJson, dgJson]) => {
      const raw = (bmJson && bmJson.data) ? bmJson.data : [];
      const gp = await PatchGate.loadGamePatch('../../data/_meta.json');
      BM_DATA = raw.filter(m => m.name && PatchGate.released(m.patch, gp));

      // dungeons.id -> 繁中名 對照表（learnFrom.contentId 對應 dungeons.id）
      (dgJson.data || []).forEach(d => {
        if (d.id != null && d.name) DUNGEON_NAMES[d.id] = d.name;
      });

      // 排序：依編號
      BM_DATA.sort((a, b) => (a.no || 0) - (b.no || 0));

      // 屬性清單
      const aspectSet = new Set();
      BM_DATA.forEach(m => aspectSet.add(m.aspect || '無'));
      const aspectOrder = ['火','水','風','土','雷','冰','無'];
      ASPECTS = aspectOrder.filter(a => aspectSet.has(a));

      // 類型清單
      const typeSet = new Set();
      BM_DATA.forEach(m => { if (m.type) typeSet.add(m.type); });
      TYPES = [...typeSet].sort();

      // 階級清單
      const rankSet = new Set();
      BM_DATA.forEach(m => { if (m.rank != null) rankSet.add(m.rank); });
      RANKS = [...rankSet].sort((a,b) => a - b);

      renderSourceFilters();
      renderAspectFilters();
      renderTypeFilters();
      renderRankFilters();
      updateProgress();
      renderGrid();
    })
    .catch(err => {
      const grid = document.getElementById('bmGrid');
      const empty = document.getElementById('emptyState');
      grid.style.display = 'none';
      empty.style.display = '';
      empty.textContent = '資料載入失敗：' + err.message;
    });
})();
</script>
</body>
</html>
