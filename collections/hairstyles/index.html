<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="FF14 髮型收藏追蹤 — 版本篩選、來源查詢、記錄已解鎖進度">
  <title>髮型收藏追蹤 | 水神的工具箱</title>
  <link rel="stylesheet" href="../../assets/css/common.css">
  <link rel="stylesheet" href="../../assets/css/tool-header.css">
  <style>
    /* 髮型頁專屬樣式；通用版面（header/toolbar/filter/progress/footer）見 assets/css/common.css。
       本頁卡片為「橫向版型」（圖左資訊右），與通用 .col-* 直式卡片不同，故以 gridClass/cardClass
       指定 hs-grid/hs-card，控制面其餘由 assets/js/collection-tracker.js 渲染。 */
    :root {
      --accent:   #c8a96e;                 /* 金（外框強調）*/
      --accent-2: #e2c98a;                 /* 進度條尾色：淺金 */
      --glow-1:   rgba(200,169,110,0.06);
      --glow-2:   rgba(167,139,250,0.04);
    }
    /* 外框微調（與 common 預設不同處）*/
    .result-meta { font-size: 13px; }
    .empty-state { font-size: 15px; }
    .page-footer { padding: 24px 0; margin-top: 16px; }

    /* ── Grid（橫向卡片，較寬欄）── */
    .hs-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 12px;
      margin-bottom: 40px;
    }

    /* ── Card（橫向）── */
    .hs-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 18px 20px;
      cursor: pointer;
      transition: background var(--transition), border-color var(--transition), transform var(--transition);
      display: flex;
      align-items: center;
      gap: 14px;
      user-select: none;
      position: relative;
      overflow: hidden;
    }
    .hs-card:focus-visible {
      outline: 2px solid color-mix(in srgb, var(--accent) 60%, transparent);
      outline-offset: 2px;
    }
    .hs-card:hover {
      background: var(--bg-card-hover);
      border-color: var(--border-hover);
      transform: translateY(-1px);
    }
    .hs-card.owned {
      border-color: rgba(74,222,128,0.3);
      background: linear-gradient(135deg, var(--bg-card), rgba(74,222,128,0.04));
    }
    .hs-card.owned::before {
      content: '✓';
      position: absolute;
      top: 8px; right: 10px;
      font-size: 12px;
      color: var(--green);
      font-weight: 700;
    }

    .hs-icon-wrap {
      width: 52px; height: 52px;
      flex-shrink: 0;
      border-radius: var(--radius-sm);
      overflow: hidden;
      background: var(--raise);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .hs-icon {
      width: 52px; height: 52px;
      object-fit: contain;
      image-rendering: pixelated;
    }
    .hs-icon-placeholder { font-size: 22px; }

    .hs-info { flex: 1; min-width: 0; }
    .hs-name {
      font-size: 15px;
      font-weight: 600;
      color: var(--text-primary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 2px;
    }
    .hs-name-en {
      font-size: 11px;
      color: var(--text-muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 6px;
    }
    .hs-tags { display: flex; gap: 5px; flex-wrap: wrap; }
    .hs-tag {
      font-size: 11px;
      padding: 2px 7px;
      border-radius: 3px;
      font-weight: 500;
    }
    .tag-patch        { background: var(--purple-dim); color: var(--purple); border: 1px solid rgba(167,139,250,0.2); }
    .tag-source       { background: var(--blue-dim); color: var(--blue); border: 1px solid rgba(79,195,247,0.2); }
    .tag-source-event { background: rgba(251,191,36,0.1); color: #fbbf24; border: 1px solid rgba(251,191,36,0.2); }
    .tag-source-mgp   { background: rgba(234,179,8,0.1); color: #eab308; border: 1px solid rgba(234,179,8,0.2); }
    .tag-source-quest { background: var(--green-dim); color: var(--green); border: 1px solid rgba(74,222,128,0.2); }

    /* 資料片色 */
    .patch-arr  { color: #60a5fa; }
    .patch-hw   { color: #a78bfa; }
    .patch-sb   { color: #fb923c; }
    .patch-shb  { color: #4ade80; }
    .patch-ew   { color: #4fc3f7; }
    .patch-dt   { color: #e2c98a; }

    @media (max-width: 600px) {
      .hs-grid { grid-template-columns: 1fr; }
      .toolbar { gap: 8px; }
    }
  </style>
  <script src="../../assets/js/patch-gate.js"></script>
  <script src="../../assets/js/collection-tracker.js"></script>
  <link rel="stylesheet" href="../../assets/css/theme.css">
  <script src="../../assets/js/theme.js"></script>
</head>
<body>

<div class="container">

  <!-- Header -->
  <div class="tool-header">
    <h1 class="tool-title">髮型收藏追蹤</h1>
    <p class="tool-subtitle">點擊卡片標記已解鎖，進度自動儲存於瀏覽器</p>
    <div class="header-divider"></div>
  </div>

  <!-- 控制面（進度／工具列／篩選／格線）由 collection-tracker.js 渲染 -->
  <div id="ct-root"></div>

</div>

<!-- Footer -->
<footer class="page-footer">
  <div class="container">
    <p class="footer-text">
      <a href="../../">水神的工具箱</a> · 資料來源：遊戲本體、<a href="https://xivapi.com" target="_blank">XIVAPI</a>
    </p>
    <p class="footer-text" style="margin-top:4px">
      FINAL FANTASY XIV © SQUARE ENIX　此為玩家自製非官方工具
    </p>
  </div>
</footer>

<script>
(function () {
  function patchClass(p) {
    if (!p) return '';
    var v = parseFloat(p);
    if (v < 3) return 'patch-arr';
    if (v < 4) return 'patch-hw';
    if (v < 5) return 'patch-sb';
    if (v < 6) return 'patch-shb';
    if (v < 7) return 'patch-ew';
    return 'patch-dt';
  }
  function sourceClass(s) {
    if (s === '聯名活動' || s === '節慶活動') return 'tag-source-event';
    if (s === '金碟遊樂場') return 'tag-source-mgp';
    if (s === '主線任務' || s === '任務') return 'tag-source-quest';
    return 'tag-source';
  }

  CollectionTracker.init({
    dataUrl: '../../data/hairstyles.json',
    metaUrl: '../../data/_meta.json',
    storageKey: 'ffxiv_hairstyles_owned',
    snapKey: 'hairstyles',
    schema: 'hairstyles',          // 沿用既有匯出檔 schema（非 hairstyles-progress）
    verb: '解鎖',
    unit: '個',
    noun: '髮型',
    gridClass: 'hs-grid',
    cardClass: 'hs-card',
    searchPlaceholder: '搜尋髮型名稱、來源…',
    include: function (h, gp) { return PatchGate.released(h.patch, gp); },
    // 髮型 sources 為字串陣列
    searchText: function (h) {
      return [h.name, h.nameEn].concat(h.sources || []).filter(Boolean).join(' ').toLowerCase();
    },
    sorts: ['patch-desc', 'patch-asc', 'name'],
    filters: [
      { kind: 'patch' },
      {
        id: 'source', label: '來源',
        options: function (list) {
          var set = new Set();
          list.forEach(function (h) { (h.sources || []).forEach(function (s) { set.add(s); }); });
          return Array.from(set).sort().map(function (s) { return { value: s, label: s }; });
        },
        match: function (h, v) { return (h.sources || []).indexOf(v) >= 0; }
      }
    ],
    card: function (h) {
      var esc = CollectionTracker.esc;
      var nameHtml = h.name
        ? '<div class="hs-name">' + esc(h.name) + '</div><div class="hs-name-en">' + esc(h.nameEn) + '</div>'
        : '<div class="hs-name">' + esc(h.nameEn) + '</div>';
      var patchTag = h.patch ? '<span class="hs-tag tag-patch ' + patchClass(h.patch) + '">' + esc(h.patch) + '</span>' : '';
      var sourceTags = (h.sources || []).map(function (s) { return '<span class="hs-tag ' + sourceClass(s) + '">' + esc(s) + '</span>'; }).join('');
      return '' +
        '<div class="hs-icon-wrap"><span class="hs-icon-placeholder">💇</span></div>' +
        '<div class="hs-info">' + nameHtml + '<div class="hs-tags">' + patchTag + sourceTags + '</div></div>';
    }
  });
})();
</script>
</body>
</html>
