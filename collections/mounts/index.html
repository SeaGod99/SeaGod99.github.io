<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="FF14 坐騎收藏追蹤 — 查詢取得來源、版本篩選、記錄擁有進度">
  <title>坐騎收藏追蹤 | 水神的工具箱</title>
  <link rel="stylesheet" href="../../assets/css/common.css">
  <link rel="stylesheet" href="../../assets/css/tool-header.css">
  <style>
    /* 坐騎頁專屬樣式；通用版面與 .col-* 卡片系統見 assets/css/common.css，
       控制面（工具列／篩選／格線）由 assets/js/collection-tracker.js 渲染 */
    :root {
      --accent:   #a78bfa;                 /* 紫 */
      --accent-2: #c8a96e;                 /* 進度條尾色：金 */
      --glow-1:   rgba(167,139,250,0.06);
      --glow-2:   rgba(200,169,110,0.04);
    }
    .col-grid { grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); }
    .col-card { padding: 18px; }
    .col-name { padding-right: 16px; }
    .mount-patch { font-size: 10px; color: var(--text-muted); }

    @media (max-width: 600px) { .col-grid { grid-template-columns: 1fr 1fr; } }
    @media (max-width: 380px) { .col-grid { grid-template-columns: 1fr; } }
  </style>
  <script src="../../assets/js/patch-gate.js"></script>
  <script src="../../assets/js/collection-tracker.js"></script>
  <link rel="stylesheet" href="../../assets/css/theme.css">
  <script src="../../assets/js/theme.js"></script>
</head>
<body>

<div class="container">

  <!-- Header -->
  <div class="tool-header">
    <h1 class="tool-title">🐎 坐騎收藏追蹤</h1>
    <p class="tool-subtitle">點擊坐騎卡片標記已擁有，進度自動儲存於瀏覽器</p>
    <div class="header-divider"></div>
  </div>

  <!-- 控制面（進度／工具列／篩選／格線）由 collection-tracker.js 渲染 -->
  <div id="ct-root"></div>

</div>

<!-- Footer -->
<footer class="page-footer">
  <div class="container">
    <p class="footer-text">
      <a href="../../">水神的工具箱</a> · 資料來源：遊戲本體、<a href="https://xivapi.com" target="_blank">XIVAPI</a>
    </p>
    <p class="footer-text" style="margin-top:4px">
      FINAL FANTASY XIV © SQUARE ENIX　此為玩家自製非官方工具
    </p>
  </div>
</footer>

<script>
CollectionTracker.init({
  dataUrl: '../../data/mounts.json',
  metaUrl: '../../data/_meta.json',
  storageKey: 'ffxiv_mounts_owned',
  snapKey: 'mounts',
  verb: '擁有',
  unit: '隻',
  noun: '坐騎',
  searchPlaceholder: '搜尋坐騎名稱、取得方式…',
  sorts: ['patch-desc', 'patch-asc', 'name'],
  filters: [
    {
      id: 'source', label: '來源篩選',
      options: function (list) {
        var set = new Set();
        list.forEach(function (m) { (m.sources || []).forEach(function (s) { if (s.type) set.add(s.type); }); });
        return Array.from(set).sort().map(function (t) { return { value: t, label: t }; });
      },
      match: function (m, v) { return (m.sources || []).some(function (s) { return s.type === v; }); }
    },
    {
      id: 'seats', label: '座位數',
      options: function (list) {
        var lm = { 1: '單人', 2: '雙人', 4: '四人', 8: '八人' };
        var vals = Array.from(new Set(list.map(function (m) { return m.seats; })
          .filter(function (s) { return s != null; }))).sort(function (a, b) { return a - b; });
        return vals.map(function (s) { return { value: String(s), label: lm[s] || (s + '人') }; });
      },
      match: function (m, v) { return m.seats === Number(v); }
    },
    { kind: 'patch' }
  ],
  // 點「💰 市場行情」連結不切換擁有狀態（讓 <a> 正常導覽到市場查價工具）
  onCardClick: function (m, ev) { return !!ev.target.closest('.ct-market'); },
  card: function (m) {
    var esc = CollectionTracker.esc;
    var ICON_BASE = '../../assets/mounts/';
    var iconHtml = m.icon
      ? '<img class="col-icon" src="' + ICON_BASE + esc(m.icon.split('/').pop()) + '" alt="" loading="lazy">'
      : '<div class="col-icon placeholder">🐎</div>';
    var seatsMap = { 1: '單人', 2: '雙人', 4: '四人', 8: '八人' };
    var seatsLabel = m.seats != null ? (seatsMap[m.seats] || (m.seats + '人')) : '';
    var sources = m.sources || [];
    var sourceTags = sources.length
      ? sources.map(function (s) { return '<span class="src-tag type-' + esc(s.type) + '">' + esc(s.type) + '</span>'; }).join('')
      : '<span class="src-tag placeholder">待補充</span>';
    var detailText = sources.length
      ? esc(sources.map(function (s) { return s.detail; }).filter(Boolean).join('、'))
      : '取得方式待補充';
    var sub = (m.patch ? 'ver ' + esc(m.patch) : '') + (seatsLabel ? ' · ' + seatsLabel : '');
    return '' +
      '<div class="col-head">' + iconHtml +
        '<div style="flex:1; min-width:0;">' +
          '<div class="col-name">' + esc(m.name) + '</div>' +
          '<div class="mount-patch">' + sub + '</div>' +
        '</div>' +
      '</div>' +
      '<div class="col-tags">' + sourceTags + '</div>' +
      '<div class="col-detail">' + detailText + '</div>' +
      (m.itemId ? '<a class="ct-market" href="../../tools/market/#item=' + esc(m.itemId) + '" title="到市場查價工具查此物品行情">💰 市場行情</a>' : '');
  }
});
</script>
</body>
</html>
