<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="FF14 坐騎收藏追蹤 — 查詢取得來源、版本篩選、記錄擁有進度">
  <title>坐騎收藏追蹤 | 水神的工具箱</title>
  <link rel="stylesheet" href="../../assets/css/common.css">
  <style>
    /* 坐騎頁專屬樣式；通用版面與 .col-* 卡片系統見 assets/css/common.css */
    :root {
      --accent:   #a78bfa;                 /* 紫 */
      --accent-2: #c8a96e;                 /* 進度條尾色：金 */
      --glow-1:   rgba(167,139,250,0.06);
      --glow-2:   rgba(200,169,110,0.04);
    }
    .col-grid { grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); }
    .col-card { padding: 18px; }
    .col-name { padding-right: 16px; }
    .mount-patch { font-size: 10px; color: var(--text-muted); }

    @media (max-width: 600px) { .col-grid { grid-template-columns: 1fr 1fr; } }
    @media (max-width: 380px) { .col-grid { grid-template-columns: 1fr; } }
  </style>
  <script src="../../assets/js/patch-gate.js"></script>
  <link rel="stylesheet" href="../../assets/css/theme.css">
  <script src="../../assets/js/theme.js"></script>
</head>
<body>

<div class="container">

  <!-- Header -->
  <header class="page-header">
    <a href="../../" class="back-btn">← 水神的工具箱</a>
    <div class="page-title-wrap">
      <h1 class="page-title">🐎 坐騎收藏追蹤</h1>
      <p class="page-subtitle">點擊坐騎卡片標記已擁有，進度自動儲存於瀏覽器</p>
    </div>
  </header>

  <!-- Progress -->
  <div class="progress-bar-wrap">
    <div class="progress-info">
      <span id="ownedCount">0</span> / <span id="totalCount">0</span>
      <span>已擁有</span>
    </div>
    <div class="progress-track">
      <div class="progress-fill" id="progressFill" style="width:0%"></div>
    </div>
    <div class="progress-pct" id="progressPct">0%</div>
  </div>

  <!-- Toolbar -->
  <div class="toolbar">
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input class="search-input" type="text" id="searchInput" placeholder="搜尋坐騎名稱…" autocomplete="off">
    </div>
    <div class="own-toggle">
      <button class="own-btn active" data-own="all">全部</button>
      <button class="own-btn" data-own="owned">已擁有</button>
      <button class="own-btn" data-own="missing">未擁有</button>
    </div>
    <select class="sort-select" id="sortSelect" title="排序方式">
      <option value="default">預設排序</option>
      <option value="patch-desc">版本新→舊</option>
      <option value="patch-asc">版本舊→新</option>
      <option value="name">依名稱</option>
    </select>
    <button class="icon-btn" id="markAllBtn" title="將目前篩選結果全部標記為已擁有">✓ 標記全部</button>
    <button class="icon-btn" id="unmarkAllBtn" title="取消目前篩選結果的已擁有標記">✗ 取消全部</button>
    <button class="icon-btn" id="exportBtn">匯出進度</button>
    <button class="icon-btn" id="importBtn">匯入進度</button>
    <input type="file" id="importFile" accept="application/json" style="display:none">
    <button class="icon-btn clear-btn" id="clearBtn">清除進度</button>
  </div>

  <!-- Source filter -->
  <div class="filter-section">
    <div class="filter-label">來源篩選</div>
    <div class="filter-tags" id="sourceFilters"></div>
  </div>

  <!-- Seats filter -->
  <div class="filter-section">
    <div class="filter-label">座位數</div>
    <div class="filter-tags" id="seatsFilters"></div>
  </div>

  <!-- Patch filter -->
  <div class="filter-section">
    <div class="filter-label">版本</div>
    <div class="filter-tags" id="patchFilters"></div>
  </div>

  <!-- Result meta -->
  <div class="result-meta" id="resultMeta"></div>

  <!-- Grid -->
  <div class="col-grid" id="mountGrid"></div>

  <div class="empty-state" id="emptyState" style="display:none">
    找不到符合條件的坐騎
  </div>

</div>

<!-- Footer -->
<footer class="page-footer">
  <div class="container">
    <p class="footer-text">
      <a href="../../">水神的工具箱</a> · 資料來源：遊戲本體、<a href="https://xivapi.com" target="_blank">XIVAPI</a>
    </p>
    <p class="footer-text" style="margin-top:4px">
      FINAL FANTASY XIV © SQUARE ENIX　此為玩家自製非官方工具
    </p>
  </div>
</footer>

<script>
(function() {
  const STORAGE_KEY = 'ffxiv_mounts_owned';
  const DATA_URL = '../../data/mounts.json';
  const ICON_BASE = '../../assets/mounts/';

  // ── State ──
  let MOUNT_DATA = [];
  let SOURCE_TYPES = [];
  let PATCHES = [];
  let owned = new Set(JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'));
  let filterOwn = 'all';       // all | owned | missing
  let filterSource = null;     // string | null
  let filterSeats = null;      // number | null
  let filterPatch = null;      // string | null
  let searchQ = '';
  let sortBy = 'default';      // default | patch-desc | patch-asc | name

  // ── Patch bands (derived from data) ──
  const PATCH_BANDS = [
    { label: '2.x 原初之地',   min: '2.0', max: '2.9' },
    { label: '3.x 蒼天之禁地', min: '3.0', max: '3.9' },
    { label: '4.x 紅蓮之狂潮', min: '4.0', max: '4.9' },
    { label: '5.x 暗影之逆焰', min: '5.0', max: '5.9' },
    { label: '6.x 曉月之終途', min: '6.0', max: '6.9' },
    { label: '7.x 金曦之遺輝', min: '7.0', max: '7.9' },
  ];

  // ── Unique key for an item (use id when present, otherwise name) ──
  function keyOf(m) {
    return m.id != null ? 'id:' + m.id : 'name:' + m.name;
  }

  // ── Save ──
  function save() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify([...owned]));
  }

  // ── Toggle ──
  function toggle(k) {
    if (owned.has(k)) owned.delete(k);
    else owned.add(k);
    save();
    updateProgress();
    renderGrid();
  }

  // ── Progress ──
  function updateProgress() {
    const total = MOUNT_DATA.length;
    const count = MOUNT_DATA.filter(m => owned.has(keyOf(m))).length;
    const pct = total ? Math.round(count / total * 100) : 0;
    document.getElementById('ownedCount').textContent = count;
    document.getElementById('totalCount').textContent = total;
    document.getElementById('progressFill').style.width = pct + '%';
    document.getElementById('progressPct').textContent = pct + '%';
    try { localStorage.setItem('ffxiv_snap_mounts', JSON.stringify({ c: count, t: total })); } catch (e) {} // 首頁進度儀表板快照
  }

  // ── Render source filters ──
  function renderSourceFilters() {
    const wrap = document.getElementById('sourceFilters');
    wrap.innerHTML = '';
    SOURCE_TYPES.forEach(type => {
      const btn = document.createElement('button');
      btn.className = 'filter-tag' + (filterSource === type ? ' active' : '');
      btn.textContent = type;
      btn.addEventListener('click', () => {
        filterSource = filterSource === type ? null : type;
        renderSourceFilters();
        renderGrid();
      });
      wrap.appendChild(btn);
    });
  }

  // ── Render seats filters ──
  function renderSeatsFilters() {
    const wrap = document.getElementById('seatsFilters');
    wrap.innerHTML = '';
    const seatsValues = [...new Set(MOUNT_DATA.map(m => m.seats).filter(s => s != null))].sort((a,b) => a-b);
    const labelMap = { 1: '單人', 2: '雙人', 4: '四人', 8: '八人' };
    seatsValues.forEach(s => {
      const btn = document.createElement('button');
      btn.className = 'filter-tag' + (filterSeats === s ? ' active' : '');
      btn.textContent = labelMap[s] || (s + '人');
      btn.addEventListener('click', () => {
        filterSeats = filterSeats === s ? null : s;
        renderSeatsFilters();
        renderGrid();
      });
      wrap.appendChild(btn);
    });
  }

  // ── Render patch filters ──
  function renderPatchFilters() {
    const wrap = document.getElementById('patchFilters');
    wrap.innerHTML = '';
    PATCHES.forEach(p => {
      const btn = document.createElement('button');
      btn.className = 'filter-tag' + (filterPatch === p.label ? ' active' : '');
      btn.textContent = p.label;
      btn.addEventListener('click', () => {
        filterPatch = filterPatch === p.label ? null : p.label;
        renderPatchFilters();
        renderGrid();
      });
      wrap.appendChild(btn);
    });
  }

  // ── Filter mounts ──
  function filtered() {
    return MOUNT_DATA.filter(m => {
      const k = keyOf(m);

      // ownership
      if (filterOwn === 'owned'   && !owned.has(k)) return false;
      if (filterOwn === 'missing' &&  owned.has(k)) return false;

      // source
      if (filterSource && !(m.sources || []).some(s => s.type === filterSource)) return false;

      // seats
      if (filterSeats != null && m.seats !== filterSeats) return false;

      // patch
      if (filterPatch) {
        const band = PATCH_BANDS.find(p => p.label === filterPatch);
        if (band) {
          if (!m.patch || m.patch < band.min || m.patch > band.max) return false;
        }
      }

      // search
      if (searchQ) {
        const q = searchQ.toLowerCase();
        const nameMatch = m.name && m.name.toLowerCase().includes(q);
        const enMatch = m.nameEn && m.nameEn.toLowerCase().includes(q);
        if (!nameMatch && !enMatch) return false;
      }

      return true;
    });
  }

  // ── Sort ──
  function sortList(list) {
    if (sortBy === 'default') return list;
    const arr = [...list];
    const pv = p => parseFloat(p) || 0;
    if (sortBy === 'name') arr.sort((a, b) => a.name.localeCompare(b.name, 'zh-Hant'));
    else if (sortBy === 'patch-asc') arr.sort((a, b) => pv(a.patch) - pv(b.patch));
    else if (sortBy === 'patch-desc') arr.sort((a, b) => pv(b.patch) - pv(a.patch));
    return arr;
  }

  // ── Render grid ──
  function renderGrid() {
    const list = sortList(filtered());
    const grid = document.getElementById('mountGrid');
    const empty = document.getElementById('emptyState');
    const meta = document.getElementById('resultMeta');

    grid.innerHTML = '';
    if (list.length === 0) {
      grid.style.display = 'none';
      empty.style.display = '';
    } else {
      grid.style.display = '';
      empty.style.display = 'none';
    }

    const ownedInView = list.filter(m => owned.has(keyOf(m))).length;
    meta.innerHTML = `顯示 <em>${list.length}</em> / ${MOUNT_DATA.length} 隻 · 已擁有 <em>${ownedInView}</em> / ${list.length}`;

    list.forEach(m => {
      const k = keyOf(m);
      const isOwned = owned.has(k);
      const card = document.createElement('div');
      card.className = 'col-card' + (isOwned ? ' owned' : '');

      const sources = m.sources || [];
      const sourceTags = sources.length
        ? sources.map(s => `<span class="src-tag type-${s.type}">${s.type}</span>`).join('')
        : `<span class="src-tag placeholder">待補充</span>`;

      const detailText = sources.length
        ? sources.map(s => s.detail).filter(Boolean).join('、')
        : '取得方式待補充';

      const iconHtml = m.icon
        ? `<img class="col-icon" src="${ICON_BASE}${m.icon.split('/').pop()}" alt="" loading="lazy">`
        : `<div class="col-icon placeholder">🐎</div>`;

      const seatsLabelMap = { 1: '單人', 2: '雙人', 4: '四人', 8: '八人' };
      const seatsLabel = m.seats != null ? seatsLabelMap[m.seats] || (m.seats + '人') : '';

      card.innerHTML = `
        <div class="col-head">
          ${iconHtml}
          <div style="flex:1; min-width:0;">
            <div class="col-name">${m.name}</div>
            <div class="mount-patch">${m.patch ? 'ver ' + m.patch : ''}${seatsLabel ? ' · ' + seatsLabel : ''}</div>
          </div>
        </div>
        <div class="col-tags">${sourceTags}</div>
        <div class="col-detail">${detailText}</div>
      `;

      card.tabIndex = 0;
      card.setAttribute('role', 'button');
      card.setAttribute('aria-pressed', isOwned);
      card.addEventListener('click', () => toggle(k));
      card.addEventListener('keydown', ev => {
        if (ev.key === 'Enter' || ev.key === ' ') { ev.preventDefault(); toggle(k); }
      });
      grid.appendChild(card);
    });
  }

  // ── Export / Import ──
  function exportProgress() {
    const payload = {
      schema: 'mounts-progress',
      exported: new Date().toISOString(),
      owned: [...owned]
    };
    const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'mounts-progress.json';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }

  function importProgress(file) {
    const reader = new FileReader();
    reader.onload = e => {
      try {
        const data = JSON.parse(e.target.result);
        // 舊版備份為純陣列；新版物件需驗 schema，避免誤將其他頁的進度檔匯入
        if (!Array.isArray(data) && data.schema !== 'mounts-progress') {
          alert('匯入失敗：這不是「坐騎收藏」的進度檔'); return;
        }
        const list = Array.isArray(data) ? data : data.owned;
        if (!Array.isArray(list)) throw new Error('格式錯誤');
        if (owned.size && !confirm(`匯入將以檔案內容（${list.length} 筆）取代目前的 ${owned.size} 筆記錄，確定嗎？`)) return;
        owned = new Set(list);
        save();
        updateProgress();
        renderGrid();
        alert('匯入成功，共 ' + owned.size + ' 筆已取得記錄');
      } catch (err) {
        alert('匯入失敗：檔案格式不正確');
      }
    };
    reader.readAsText(file);
  }

  // ── Own-toggle buttons ──
  document.querySelectorAll('.own-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      filterOwn = btn.dataset.own;
      document.querySelectorAll('.own-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderGrid();
    });
  });

  // ── Search ──
  document.getElementById('searchInput').addEventListener('input', e => {
    searchQ = e.target.value.trim();
    renderGrid();
  });

  // ── Export / Import / Clear ──
  document.getElementById('exportBtn').addEventListener('click', exportProgress);
  document.getElementById('importBtn').addEventListener('click', () => {
    document.getElementById('importFile').click();
  });
  document.getElementById('importFile').addEventListener('change', e => {
    const file = e.target.files[0];
    if (file) importProgress(file);
    e.target.value = '';
  });

  document.getElementById('clearBtn').addEventListener('click', () => {
    if (!owned.size) { alert('目前沒有已擁有記錄'); return; }
    if (!confirm('確定要清除全部 ' + owned.size + ' 筆擁有記錄嗎？\n將先自動下載一份備份檔以防誤刪。')) return;
    exportProgress();
    owned.clear();
    save();
    updateProgress();
    renderGrid();
  });

  // ── Sort / Batch mark ──
  document.getElementById('sortSelect').addEventListener('change', e => {
    sortBy = e.target.value;
    renderGrid();
  });
  document.getElementById('markAllBtn').addEventListener('click', () => {
    const toAdd = filtered().filter(m => !owned.has(keyOf(m)));
    if (!toAdd.length) { alert('目前篩選結果都已標記'); return; }
    if (!confirm('將目前篩選結果中未標記的 ' + toAdd.length + ' 筆標記為已擁有？')) return;
    toAdd.forEach(m => owned.add(keyOf(m)));
    save(); updateProgress(); renderGrid();
  });
  document.getElementById('unmarkAllBtn').addEventListener('click', () => {
    const toDel = filtered().filter(m => owned.has(keyOf(m)));
    if (!toDel.length) { alert('目前篩選結果沒有已標記項目'); return; }
    if (!confirm('取消目前篩選結果中 ' + toDel.length + ' 筆的已擁有標記？')) return;
    toDel.forEach(m => owned.delete(keyOf(m)));
    save(); updateProgress(); renderGrid();
  });

  // ── Init: load data ──
  fetch(DATA_URL)
    .then(res => {
      if (!res.ok) throw new Error('無法載入資料 (' + res.status + ')');
      return res.json();
    })
    .then(async json => {
      const raw = (json && json.data) ? json.data : [];
      const gp = await PatchGate.loadGamePatch('../../data/_meta.json');
      // 過濾掉無繁中名稱（name 仍＝英文 nameEn，多為內部/未上市資料）、或台服未開放（patch > gamePatch）的項目
      MOUNT_DATA = raw.filter(m => m.name && m.name !== m.nameEn && PatchGate.released(m.patch, gp));

      // 來源類型清單（依資料動態產生）
      const typeSet = new Set();
      MOUNT_DATA.forEach(m => (m.sources || []).forEach(s => { if (s.type) typeSet.add(s.type); }));
      SOURCE_TYPES = [...typeSet].sort();

      // 版本清單（只顯示資料中實際出現的版本區間）
      const patchSet = new Set(MOUNT_DATA.map(m => m.patch).filter(Boolean));
      PATCHES = PATCH_BANDS.filter(band =>
        [...patchSet].some(p => p >= band.min && p <= band.max)
      );

      renderSourceFilters();
      renderSeatsFilters();
      renderPatchFilters();
      updateProgress();
      renderGrid();
    })
    .catch(err => {
      const grid = document.getElementById('mountGrid');
      const empty = document.getElementById('emptyState');
      grid.style.display = 'none';
      empty.style.display = '';
      empty.textContent = '資料載入失敗：' + err.message;
    });
})();
</script>
</body>
</html>
