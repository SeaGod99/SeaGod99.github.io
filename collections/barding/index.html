<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="FF14 鳥鞍收藏追蹤 — 查詢取得來源、部位篩選、記錄擁有進度">
  <title>鳥鞍收藏追蹤 | 水神的工具箱</title>
  <link rel="stylesheet" href="../../assets/css/common.css">
  <style>
    /* 鳥鞍頁專屬樣式；通用版面與 .col-* 卡片系統見 assets/css/common.css */
    :root {
      --accent:   #c8a96e;                 /* 金 */
      --accent-2: #4ade80;                 /* 進度條尾色：綠 */
      --glow-1:   rgba(200,169,110,0.06);
      --glow-2:   rgba(74,222,128,0.04);
    }
    .col-grid { grid-template-columns: repeat(auto-fill, minmax(230px, 1fr)); }
    .col-card { padding: 18px; gap: 8px; }
    .col-name { padding-right: 16px; }

    /* 多圖示橫列（一張卡可含鞍/頭等多件） */
    .bd-icons { display: flex; gap: 6px; align-items: center; }
    .bd-meta { font-size: 10px; color: var(--text-muted); }

    /* 部位標籤 */
    .tag.slot-鞍   { background: rgba(74,222,128,0.1);  color: var(--green); border-color: rgba(74,222,128,0.2); }
    .tag.slot-頭   { background: rgba(79,195,247,0.1);  color: var(--blue);  border-color: rgba(79,195,247,0.2); }
    .tag.slot-半套 { background: rgba(167,139,250,0.1); color: var(--purple); border-color: rgba(167,139,250,0.2); }
    .tag.slot-全套 { background: rgba(200,169,110,0.12); color: var(--gold); border-color: rgba(200,169,110,0.25); }
    /* 來源標籤（中性灰，非通用紫色 src-tag）*/
    .tag.src-tag { background: var(--raise); color: var(--text-secondary); border-color: var(--border); }

    .col-detail .detail-line { margin-top: 2px; }
    .col-detail .detail-line b { color: var(--text-secondary); font-weight: 500; }

    @media (max-width: 600px) { .col-grid { grid-template-columns: 1fr 1fr; } }
    @media (max-width: 380px) { .col-grid { grid-template-columns: 1fr; } }
  </style>
  <script src="../../assets/js/patch-gate.js"></script>
  <link rel="stylesheet" href="../../assets/css/theme.css">
  <script src="../../assets/js/theme.js"></script>
</head>
<body>

<div class="container">

  <!-- Header -->
  <header class="page-header">
    <a href="../../" class="back-btn">← 水神的工具箱</a>
    <div class="page-title-wrap">
      <h1 class="page-title">🐤 鳥鞍收藏追蹤</h1>
      <p class="page-subtitle">點擊卡片標記已取得，進度自動儲存於瀏覽器</p>
    </div>
  </header>

  <!-- Progress -->
  <div class="progress-bar-wrap">
    <div class="progress-info">
      <span id="ownedCount">0</span> / <span id="totalCount">0</span>
      <span>已取得</span>
    </div>
    <div class="progress-track">
      <div class="progress-fill" id="progressFill" style="width:0%"></div>
    </div>
    <div class="progress-pct" id="progressPct">0%</div>
  </div>

  <!-- Toolbar -->
  <div class="toolbar">
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input class="search-input" type="text" id="searchInput" placeholder="搜尋鳥鞍名稱…" autocomplete="off">
    </div>
    <div class="own-toggle">
      <button class="own-btn active" data-own="all">全部</button>
      <button class="own-btn" data-own="owned">已取得</button>
      <button class="own-btn" data-own="missing">未取得</button>
    </div>
    <button class="icon-btn" id="exportBtn">匯出進度</button>
    <button class="icon-btn" id="importBtn">匯入進度</button>
    <input type="file" id="importFile" accept="application/json" style="display:none">
    <button class="icon-btn clear-btn" id="clearBtn">清除進度</button>
  </div>

  <!-- Slot filter -->
  <div class="filter-section">
    <div class="filter-label">部位</div>
    <div class="filter-tags" id="slotFilters"></div>
  </div>

  <!-- Source filter -->
  <div class="filter-section">
    <div class="filter-label">取得方式</div>
    <div class="filter-tags" id="sourceFilters"></div>
  </div>

  <!-- Result meta -->
  <div class="result-meta" id="resultMeta"></div>

  <!-- Grid -->
  <div class="col-grid" id="bdGrid"></div>

  <div class="empty-state" id="emptyState" style="display:none">
    找不到符合條件的鳥鞍
  </div>

</div>

<!-- Footer -->
<footer class="page-footer">
  <div class="container">
    <p class="footer-text">
      <a href="../../">水神的工具箱</a> · 資料來源：遊戲本體、<a href="https://xivapi.com" target="_blank">XIVAPI</a>
    </p>
    <p class="footer-text" style="margin-top:4px">
      FINAL FANTASY XIV © SQUARE ENIX　此為玩家自製非官方工具
    </p>
  </div>
</footer>

<script>
(function() {
  const STORAGE_KEY = 'ffxiv_barding_owned';
  const DATA_URL = '../../data/barding.json';
  const ICON_BASE = '../../assets/barding/';

  // ── State ──
  let BD_DATA = [];
  let SLOTS = [];
  let SOURCE_TYPES = [];
  let owned = new Set(JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'));
  let filterOwn = 'all';       // all | owned | missing
  let filterSlot = null;       // string | null
  let filterSource = null;     // string | '__none__' | null
  let searchQ = '';

  // ── Unique key ──
  function keyOf(b) {
    return 'id:' + b.id;
  }

  // ── Save ──
  function save() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify([...owned]));
  }

  // ── Toggle ──
  function toggle(k) {
    if (owned.has(k)) owned.delete(k);
    else owned.add(k);
    save();
    updateProgress();
    renderGrid();
  }

  // ── Progress ──
  function updateProgress() {
    const total = BD_DATA.length;
    const count = BD_DATA.filter(b => owned.has(keyOf(b))).length;
    const pct = total ? Math.round(count / total * 100) : 0;
    document.getElementById('ownedCount').textContent = count;
    document.getElementById('totalCount').textContent = total;
    document.getElementById('progressFill').style.width = pct + '%';
    document.getElementById('progressPct').textContent = pct + '%';
  }

  // ── Generic filter tag renderer ──
  function renderTagFilters(containerId, values, current, onClick, labelFn) {
    const wrap = document.getElementById(containerId);
    wrap.innerHTML = '';
    values.forEach(v => {
      const btn = document.createElement('button');
      btn.className = 'filter-tag' + (current === v ? ' active' : '');
      btn.textContent = labelFn ? labelFn(v) : v;
      btn.addEventListener('click', () => onClick(v));
      wrap.appendChild(btn);
    });
  }

  function renderSlotFilters() {
    renderTagFilters('slotFilters', SLOTS, filterSlot,
      v => { filterSlot = filterSlot === v ? null : v; renderSlotFilters(); renderGrid(); }
    );
  }

  function renderSourceFilters() {
    renderTagFilters('sourceFilters', [...SOURCE_TYPES, '__none__'], filterSource,
      v => { filterSource = filterSource === v ? null : v; renderSourceFilters(); renderGrid(); },
      v => v === '__none__' ? '待補充' : v
    );
  }

  // ── Filter ──
  function filtered() {
    return BD_DATA.filter(b => {
      const k = keyOf(b);

      // ownership
      if (filterOwn === 'owned'   && !owned.has(k)) return false;
      if (filterOwn === 'missing' &&  owned.has(k)) return false;

      // slot
      if (filterSlot && b.slot !== filterSlot) return false;

      // source
      if (filterSource) {
        const srcs = b.sources || [];
        if (filterSource === '__none__') {
          if (srcs.length > 0) return false;
        } else {
          if (!srcs.some(s => s.type === filterSource)) return false;
        }
      }

      // search
      if (searchQ) {
        const q = searchQ.toLowerCase();
        const nameMatch = b.name && b.name.toLowerCase().includes(q);
        const enMatch = b.nameEn && b.nameEn.toLowerCase().includes(q);
        if (!nameMatch && !enMatch) return false;
      }

      return true;
    });
  }

  // ── Render grid ──
  function renderGrid() {
    const list = filtered();
    const grid = document.getElementById('bdGrid');
    const empty = document.getElementById('emptyState');
    const meta = document.getElementById('resultMeta');

    grid.innerHTML = '';
    if (list.length === 0) {
      grid.style.display = 'none';
      empty.style.display = '';
    } else {
      grid.style.display = '';
      empty.style.display = 'none';
    }

    const ownedInView = list.filter(b => owned.has(keyOf(b))).length;
    meta.innerHTML = `顯示 <em>${list.length}</em> / ${BD_DATA.length} 個 · 已取得 <em>${ownedInView}</em> / ${list.length}`;

    list.forEach(b => {
      const k = keyOf(b);
      const isOwned = owned.has(k);
      const card = document.createElement('div');
      card.className = 'col-card' + (isOwned ? ' owned' : '');

      const srcs = b.sources || [];

      const sourceTags = srcs.length
        ? [...new Set(srcs.map(s => s.type))].slice(0, 2).map(t => `<span class="tag src-tag">${t}</span>`).join('')
        : `<span class="tag placeholder">待補充</span>`;

      // icons: head/body/legs depending on slot, dedupe
      const iconPaths = [...new Set([b.iconHead, b.iconBody, b.iconLegs].filter(Boolean))];
      const iconsHtml = iconPaths.length
        ? iconPaths.slice(0, 3).map(p => `<img class="col-icon" src="${ICON_BASE}${p.split('/').pop()}" alt="" loading="lazy">`).join('')
        : `<div class="col-icon placeholder">🐤</div>`;

      // detail lines for tooltip
      const detailLines = [];
      if (srcs.length) {
        srcs.forEach(s => {
          detailLines.push(`<div class="detail-line"><b>${s.type}：</b>${s.detail || ''}</div>`);
        });
      } else {
        detailLines.push(`<div class="detail-line">取得方式：待補充</div>`);
      }

      card.innerHTML = `
        <div class="bd-icons">
          ${iconsHtml}
        </div>
        <div class="col-name">${b.name}</div>
        <div class="bd-meta">No.${b.id}${b.patch ? ' · ver ' + b.patch : ''}</div>
        <div class="col-tags">
          <span class="tag slot-${b.slot}">${b.slot}</span>
          ${sourceTags}
        </div>
        <div class="col-detail">${detailLines.join('')}</div>
      `;

      card.addEventListener('click', () => toggle(k));
      grid.appendChild(card);
    });
  }

  // ── Export / Import ──
  function exportProgress() {
    const payload = {
      schema: 'barding-progress',
      exported: new Date().toISOString(),
      owned: [...owned]
    };
    const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'barding-progress.json';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }

  function importProgress(file) {
    const reader = new FileReader();
    reader.onload = e => {
      try {
        const data = JSON.parse(e.target.result);
        const list = Array.isArray(data) ? data : data.owned;
        if (!Array.isArray(list)) throw new Error('格式錯誤');
        owned = new Set(list);
        save();
        updateProgress();
        renderGrid();
        alert('匯入成功，共 ' + owned.size + ' 筆已取得記錄');
      } catch (err) {
        alert('匯入失敗：檔案格式不正確');
      }
    };
    reader.readAsText(file);
  }

  // ── Own-toggle buttons ──
  document.querySelectorAll('.own-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      filterOwn = btn.dataset.own;
      document.querySelectorAll('.own-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderGrid();
    });
  });

  // ── Search ──
  document.getElementById('searchInput').addEventListener('input', e => {
    searchQ = e.target.value.trim();
    renderGrid();
  });

  // ── Export / Import / Clear ──
  document.getElementById('exportBtn').addEventListener('click', exportProgress);
  document.getElementById('importBtn').addEventListener('click', () => {
    document.getElementById('importFile').click();
  });
  document.getElementById('importFile').addEventListener('change', e => {
    const file = e.target.files[0];
    if (file) importProgress(file);
    e.target.value = '';
  });

  document.getElementById('clearBtn').addEventListener('click', () => {
    if (!confirm('確定要清除所有取得記錄嗎？')) return;
    owned.clear();
    save();
    updateProgress();
    renderGrid();
  });

  // ── Init: load data ──
  fetch(DATA_URL)
    .then(res => {
      if (!res.ok) throw new Error('無法載入資料 (' + res.status + ')');
      return res.json();
    })
    .then(async json => {
      const raw = (json && json.data) ? json.data : [];
      const gp = await PatchGate.loadGamePatch('../../data/_meta.json');
      // 僅顯示有繁中名、且台服已開放（patch ≤ gamePatch）的項目
      BD_DATA = raw.filter(b => b.name && /[一-鿿]/.test(b.name) && PatchGate.released(b.patch, gp));

      // 排序：依編號
      BD_DATA.sort((a, b) => (a.id || 0) - (b.id || 0));

      // 部位清單
      const slotOrder = ['鞍', '頭', '半套', '全套'];
      const slotSet = new Set(BD_DATA.map(b => b.slot).filter(Boolean));
      SLOTS = slotOrder.filter(s => slotSet.has(s));

      // 取得方式清單
      const sourceSet = new Set();
      BD_DATA.forEach(b => (b.sources || []).forEach(s => { if (s.type) sourceSet.add(s.type); }));
      SOURCE_TYPES = [...sourceSet].sort();

      renderSlotFilters();
      renderSourceFilters();
      updateProgress();
      renderGrid();
    })
    .catch(err => {
      const grid = document.getElementById('bdGrid');
      const empty = document.getElementById('emptyState');
      grid.style.display = 'none';
      empty.style.display = '';
      empty.textContent = '資料載入失敗：' + err.message;
    });
})();
</script>
</body>
</html>
