<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="FF14 鳥鞍收藏追蹤 — 查詢取得來源、部位篩選、記錄擁有進度">
  <title>鳥鞍收藏追蹤 | 水神的工具箱</title>
  <link rel="stylesheet" href="../../assets/css/common.css">
  <link rel="stylesheet" href="../../assets/css/tool-header.css">
  <style>
    /* 鳥鞍頁專屬樣式；通用版面與 .col-* 卡片系統見 assets/css/common.css，
       控制面由 assets/js/collection-tracker.js 渲染 */
    :root {
      --accent:   #c8a96e;                 /* 金 */
      --accent-2: #4ade80;                 /* 進度條尾色：綠 */
      --glow-1:   rgba(200,169,110,0.06);
      --glow-2:   rgba(74,222,128,0.04);
    }
    .col-grid { grid-template-columns: repeat(auto-fill, minmax(230px, 1fr)); }
    .col-card { padding: 18px; gap: 8px; }
    .col-name { padding-right: 16px; }

    /* 多圖示橫列（一張卡可含鞍/頭等多件） */
    .bd-icons { display: flex; gap: 6px; align-items: center; }
    .bd-meta { font-size: 10px; color: var(--text-muted); }

    /* 部位標籤 */
    .tag.slot-鞍   { background: rgba(74,222,128,0.1);  color: var(--green); border-color: rgba(74,222,128,0.2); }
    .tag.slot-頭   { background: rgba(79,195,247,0.1);  color: var(--blue);  border-color: rgba(79,195,247,0.2); }
    .tag.slot-半套 { background: rgba(167,139,250,0.1); color: var(--purple); border-color: rgba(167,139,250,0.2); }
    .tag.slot-全套 { background: rgba(200,169,110,0.12); color: var(--gold); border-color: rgba(200,169,110,0.25); }
    /* 來源標籤（中性灰，非通用紫色 src-tag）*/
    .tag.src-tag { background: var(--raise); color: var(--text-secondary); border-color: var(--border); }

    .col-detail .detail-line { margin-top: 2px; }
    .col-detail .detail-line b { color: var(--text-secondary); font-weight: 500; }

    @media (max-width: 600px) { .col-grid { grid-template-columns: 1fr 1fr; } }
    @media (max-width: 380px) { .col-grid { grid-template-columns: 1fr; } }
  </style>
  <script src="../../assets/js/patch-gate.js"></script>
  <script src="../../assets/js/collection-tracker.js"></script>
  <link rel="stylesheet" href="../../assets/css/theme.css">
  <script src="../../assets/js/theme.js"></script>
</head>
<body>

<div class="container">

  <!-- Header -->
  <div class="tool-header">
    <h1 class="tool-title">🐤 鳥鞍收藏追蹤</h1>
    <p class="tool-subtitle">點擊卡片標記已取得，進度自動儲存於瀏覽器</p>
    <div class="header-divider"></div>
  </div>

  <!-- 控制面（進度／工具列／篩選／格線）由 collection-tracker.js 渲染 -->
  <div id="ct-root"></div>

</div>

<!-- Footer -->
<footer class="page-footer">
  <div class="container">
    <p class="footer-text">
      <a href="../../">水神的工具箱</a> · 資料來源：遊戲本體、<a href="https://xivapi.com" target="_blank">XIVAPI</a>
    </p>
    <p class="footer-text" style="margin-top:4px">
      FINAL FANTASY XIV © SQUARE ENIX　此為玩家自製非官方工具
    </p>
  </div>
</footer>

<script>
CollectionTracker.init({
  dataUrl: '../../data/barding.json',
  metaUrl: '../../data/_meta.json',
  storageKey: 'ffxiv_barding_owned',
  snapKey: 'barding',
  verb: '取得',
  unit: '個',
  noun: '鳥鞍',
  searchPlaceholder: '搜尋鳥鞍名稱、取得方式…',
  include: function (b, gp) { return b.name && /[一-鿿]/.test(b.name) && PatchGate.released(b.patch, gp); },
  prepare: function (list) { return list.slice().sort(function (a, b) { return (a.id || 0) - (b.id || 0); }); },
  sorts: ['patch-desc', 'patch-asc', 'name'],
  filters: [
    {
      id: 'slot', label: '部位',
      options: function (list) {
        var order = ['鞍', '頭', '半套', '全套'];
        var set = new Set(list.map(function (b) { return b.slot; }).filter(Boolean));
        return order.filter(function (s) { return set.has(s); }).map(function (s) { return { value: s, label: s }; });
      },
      match: function (b, v) { return b.slot === v; }
    },
    {
      id: 'source', label: '取得方式',
      options: function (list) {
        var set = new Set();
        list.forEach(function (b) { (b.sources || []).forEach(function (s) { if (s.type) set.add(s.type); }); });
        return Array.from(set).sort().map(function (t) { return { value: t, label: t }; })
          .concat([{ value: '__none__', label: '待補充' }]);
      },
      match: function (b, v) {
        var srcs = b.sources || [];
        return v === '__none__' ? srcs.length === 0 : srcs.some(function (s) { return s.type === v; });
      }
    },
    { kind: 'patch' }
  ],
  onCardClick: function (b, ev) { return !!ev.target.closest('.ct-market'); },
  card: function (b) {
    var esc = CollectionTracker.esc;
    var ICON_BASE = '../../assets/barding/';
    var srcs = b.sources || [];
    var sourceTags = srcs.length
      ? Array.from(new Set(srcs.map(function (s) { return s.type; }))).slice(0, 2)
          .map(function (t) { return '<span class="tag src-tag">' + esc(t) + '</span>'; }).join('')
      : '<span class="tag placeholder">待補充</span>';
    var iconPaths = Array.from(new Set([b.iconHead, b.iconBody, b.iconLegs].filter(Boolean)));
    var iconsHtml = iconPaths.length
      ? iconPaths.slice(0, 3).map(function (p) { return '<img class="col-icon" src="' + ICON_BASE + esc(p.split('/').pop()) + '" alt="" loading="lazy">'; }).join('')
      : '<div class="col-icon placeholder">🐤</div>';
    var detailLines = srcs.length
      ? srcs.map(function (s) { return '<div class="detail-line"><b>' + esc(s.type) + '：</b>' + esc(s.detail || '') + '</div>'; }).join('')
      : '<div class="detail-line">取得方式：待補充</div>';
    return '' +
      '<div class="bd-icons">' + iconsHtml + '</div>' +
      '<div class="col-name">' + esc(b.name) + '</div>' +
      '<div class="bd-meta">No.' + esc(b.id) + (b.patch ? ' · ver ' + esc(b.patch) : '') + '</div>' +
      '<div class="col-tags">' +
        '<span class="tag slot-' + esc(b.slot) + '">' + esc(b.slot) + '</span>' + sourceTags +
      '</div>' +
      '<div class="col-detail">' + detailLines + '</div>' +
      (b.itemId ? '<a class="ct-market" href="../../tools/market/#item=' + esc(b.itemId) + '" title="到市場查價工具查此物品行情">💰 市場行情</a>' : '');
  }
});
</script>
</body>
</html>
