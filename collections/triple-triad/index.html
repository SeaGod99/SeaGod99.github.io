<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="FF14 幻卡追蹤 — 查詢取得來源、星級篩選、記錄收藏進度">
  <title>幻卡追蹤 | 水神的工具箱</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-base:    #0a0c10;
      --bg-surface: #0f1117;
      --bg-card:    #14181f;
      --bg-card-hover: #1a1f2b;
      --border:     rgba(255,255,255,0.07);
      --border-hover: rgba(200,169,110,0.4);

      --gold:       #c8a96e;
      --gold-light: #e2c98a;
      --gold-dim:   rgba(200,169,110,0.15);
      --purple:     #a78bfa;
      --purple-dim: rgba(167,139,250,0.12);
      --green:      #4ade80;
      --green-dim:  rgba(74,222,128,0.12);
      --blue:       #4fc3f7;
      --blue-dim:   rgba(79,195,247,0.12);
      --red:        #f87171;
      --red-dim:    rgba(248,113,113,0.12);

      --text-primary:   #e8eaf0;
      --text-secondary: #8892a4;
      --text-muted:     #4a5568;

      --radius-sm: 6px;
      --radius-md: 10px;
      --radius-lg: 16px;
      --transition: 0.18s cubic-bezier(0.4,0,0.2,1);
    }

    html { scroll-behavior: smooth; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans TC', sans-serif;
      background: var(--bg-base);
      color: var(--text-primary);
      min-height: 100vh;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

    body::before {
      content: '';
      position: fixed; inset: 0;
      background:
        radial-gradient(ellipse 80% 50% at 20% 0%, rgba(248,113,113,0.06) 0%, transparent 60%),
        radial-gradient(ellipse 60% 40% at 80% 100%, rgba(200,169,110,0.04) 0%, transparent 60%);
      pointer-events: none; z-index: 0;
    }

    a { color: inherit; text-decoration: none; }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 20px;
      position: relative;
      z-index: 1;
    }

    /* ── Header ── */
    .page-header {
      padding: 36px 0 28px;
      display: flex;
      align-items: center;
      gap: 16px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 28px;
    }

    .back-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      color: var(--text-secondary);
      padding: 6px 12px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      transition: var(--transition);
    }
    .back-btn:hover { color: var(--gold); border-color: var(--border-hover); }

    .page-title-wrap { flex: 1; }

    .page-title {
      font-size: 22px;
      font-weight: 700;
      color: var(--gold-light);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .page-subtitle {
      font-size: 13px;
      color: var(--text-secondary);
      margin-top: 4px;
    }

    /* ── Progress bar ── */
    .progress-bar-wrap {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 16px 20px;
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .progress-info {
      font-size: 22px;
      font-weight: 700;
      color: var(--gold-light);
      white-space: nowrap;
    }
    .progress-info span {
      font-size: 13px;
      font-weight: 400;
      color: var(--text-secondary);
      margin-left: 6px;
    }

    .progress-track {
      flex: 1;
      height: 8px;
      background: rgba(255,255,255,0.07);
      border-radius: 99px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--red), var(--gold));
      border-radius: 99px;
      transition: width 0.4s ease;
    }

    .progress-pct {
      font-size: 14px;
      color: var(--text-secondary);
      white-space: nowrap;
    }

    /* ── Toolbar ── */
    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 18px;
      align-items: center;
    }

    .search-wrap {
      position: relative;
      flex: 1;
      min-width: 180px;
    }
    .search-icon {
      position: absolute;
      left: 11px; top: 50%;
      transform: translateY(-50%);
      font-size: 14px;
      color: var(--text-muted);
      pointer-events: none;
    }
    .search-input {
      width: 100%;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text-primary);
      font-size: 13px;
      padding: 8px 12px 8px 34px;
      outline: none;
      transition: var(--transition);
    }
    .search-input:focus { border-color: rgba(248,113,113,0.5); }
    .search-input::placeholder { color: var(--text-muted); }

    .own-toggle {
      display: flex;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      overflow: hidden;
    }
    .own-btn {
      padding: 8px 14px;
      font-size: 12px;
      cursor: pointer;
      border: none;
      background: transparent;
      color: var(--text-secondary);
      transition: var(--transition);
      white-space: nowrap;
    }
    .own-btn.active { background: var(--red-dim); color: var(--red); }
    .own-btn:hover:not(.active) { color: var(--text-primary); }

    .icon-btn {
      padding: 8px 14px;
      font-size: 12px;
      cursor: pointer;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text-muted);
      transition: var(--transition);
      white-space: nowrap;
    }
    .icon-btn:hover { color: var(--text-primary); border-color: rgba(255,255,255,0.2); }
    .clear-btn:hover { color: var(--red); border-color: rgba(248,113,113,0.4); }

    /* ── Filter tags ── */
    .filter-section {
      margin-bottom: 18px;
    }
    .filter-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--text-muted);
      margin-bottom: 8px;
    }
    .filter-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    .filter-tag {
      padding: 4px 12px;
      font-size: 12px;
      border: 1px solid var(--border);
      border-radius: 99px;
      cursor: pointer;
      background: transparent;
      color: var(--text-secondary);
      transition: var(--transition);
    }
    .filter-tag:hover { color: var(--text-primary); border-color: rgba(255,255,255,0.2); }
    .filter-tag.active {
      background: var(--red-dim);
      border-color: rgba(248,113,113,0.4);
      color: var(--red);
    }

    /* ── Result count ── */
    .result-meta {
      font-size: 12px;
      color: var(--text-muted);
      margin-bottom: 14px;
    }
    .result-meta em { color: var(--text-secondary); font-style: normal; }

    /* ── Grid ── */
    .tt-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 10px;
    }

    /* ── Card ── */
    .tt-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 14px;
      cursor: pointer;
      transition: var(--transition);
      user-select: none;
      position: relative;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .tt-card:hover {
      background: var(--bg-card-hover);
      border-color: rgba(248,113,113,0.3);
    }
    .tt-card.owned {
      border-color: rgba(248,113,113,0.5);
      background: rgba(248,113,113,0.06);
    }
    .tt-card.owned::before {
      content: '✓';
      position: absolute;
      top: 8px; right: 10px;
      font-size: 12px;
      font-weight: 700;
      color: var(--red);
    }

    .tt-head {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .tt-icon {
      width: 40px;
      height: 40px;
      border-radius: var(--radius-sm);
      background: rgba(255,255,255,0.04);
      object-fit: cover;
      flex-shrink: 0;
    }
    .tt-icon.placeholder {
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      color: var(--text-muted);
    }

    .tt-name {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-primary);
      line-height: 1.3;
      padding-right: 16px;
    }
    .tt-card.owned .tt-name { color: var(--red); }

    .tt-meta {
      font-size: 10px;
      color: var(--text-muted);
    }

    /* ── Number cross ── */
    .tt-numbers {
      display: grid;
      grid-template-columns: 24px 24px 24px;
      grid-template-rows: 24px 24px 24px;
      justify-content: center;
      gap: 2px;
      margin: 2px 0;
    }
    .tt-num {
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 700;
      color: var(--text-secondary);
      background: rgba(255,255,255,0.03);
      border-radius: 3px;
    }
    .tt-num.n-top    { grid-area: 1 / 2; }
    .tt-num.n-left   { grid-area: 2 / 1; }
    .tt-num.n-center { grid-area: 2 / 2; font-size: 10px; color: var(--text-muted); background: transparent; }
    .tt-num.n-right  { grid-area: 2 / 3; }
    .tt-num.n-bottom { grid-area: 3 / 2; }
    .tt-num.n-A      { color: var(--gold-light); }

    .tt-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      margin-top: 2px;
    }

    .tag {
      font-size: 10px;
      padding: 2px 7px;
      border-radius: 99px;
      background: rgba(255,255,255,0.04);
      color: var(--text-secondary);
      border: 1px solid var(--border);
      white-space: nowrap;
    }
    .tag.placeholder { color: var(--text-muted); }

    .tag.star-1 { background: rgba(74,222,128,0.1);  color: var(--green); border-color: rgba(74,222,128,0.2); }
    .tag.star-2 { background: rgba(79,195,247,0.1);  color: var(--blue);  border-color: rgba(79,195,247,0.2); }
    .tag.star-3 { background: rgba(167,139,250,0.1); color: var(--purple); border-color: rgba(167,139,250,0.2); }
    .tag.star-4 { background: rgba(255,200,80,0.1);  color: #ffc850; border-color: rgba(255,200,80,0.2); }
    .tag.star-5 { background: rgba(248,113,113,0.1); color: var(--red); border-color: rgba(248,113,113,0.2); }

    .tag.type-tag { background: rgba(200,169,110,0.12); color: var(--gold); border-color: rgba(200,169,110,0.25); }
    .tag.src-tag { background: rgba(255,255,255,0.04); color: var(--text-secondary); border-color: var(--border); }

    /* ── Tooltip on hover ── */
    .tt-detail {
      font-size: 11px;
      color: var(--text-muted);
      line-height: 1.5;
      display: none;
    }
    .tt-card:hover .tt-detail { display: block; }
    .tt-detail .detail-line { margin-top: 2px; }
    .tt-detail .detail-line b { color: var(--text-secondary); font-weight: 500; }

    /* ── Empty state ── */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-muted);
      font-size: 14px;
    }

    /* ── Footer ── */
    .page-footer {
      border-top: 1px solid var(--border);
      padding: 24px 0 32px;
      text-align: center;
      margin-top: 48px;
    }
    .footer-text { font-size: 12px; color: var(--text-muted); }
    .footer-text a { color: var(--text-secondary); transition: var(--transition); }
    .footer-text a:hover { color: var(--gold); }

    /* ── Responsive ── */
    @media (max-width: 600px) {
      .page-header { flex-wrap: wrap; padding: 24px 0 20px; }
      .tt-grid { grid-template-columns: 1fr 1fr; }
      .progress-bar-wrap { flex-wrap: wrap; }
    }
    @media (max-width: 380px) {
      .tt-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<div class="container">

  <!-- Header -->
  <header class="page-header">
    <a href="../../" class="back-btn">← 返回工具箱</a>
    <div class="page-title-wrap">
      <h1 class="page-title">🃏 幻卡追蹤</h1>
      <p class="page-subtitle">點擊卡片標記已取得，進度自動儲存於瀏覽器</p>
    </div>
  </header>

  <!-- Progress -->
  <div class="progress-bar-wrap">
    <div class="progress-info">
      <span id="ownedCount">0</span> / <span id="totalCount">0</span>
      <span>已取得</span>
    </div>
    <div class="progress-track">
      <div class="progress-fill" id="progressFill" style="width:0%"></div>
    </div>
    <div class="progress-pct" id="progressPct">0%</div>
  </div>

  <!-- Toolbar -->
  <div class="toolbar">
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input class="search-input" type="text" id="searchInput" placeholder="搜尋幻卡名稱…" autocomplete="off">
    </div>
    <div class="own-toggle">
      <button class="own-btn active" data-own="all">全部</button>
      <button class="own-btn" data-own="owned">已取得</button>
      <button class="own-btn" data-own="missing">未取得</button>
    </div>
    <button class="icon-btn" id="exportBtn">匯出進度</button>
    <button class="icon-btn" id="importBtn">匯入進度</button>
    <input type="file" id="importFile" accept="application/json" style="display:none">
    <button class="icon-btn clear-btn" id="clearBtn">清除進度</button>
  </div>

  <!-- Star filter -->
  <div class="filter-section">
    <div class="filter-label">星級</div>
    <div class="filter-tags" id="starFilters"></div>
  </div>

  <!-- Type filter -->
  <div class="filter-section">
    <div class="filter-label">類型</div>
    <div class="filter-tags" id="typeFilters"></div>
  </div>

  <!-- Source filter -->
  <div class="filter-section">
    <div class="filter-label">取得方式</div>
    <div class="filter-tags" id="sourceFilters"></div>
  </div>

  <!-- Result meta -->
  <div class="result-meta" id="resultMeta"></div>

  <!-- Grid -->
  <div class="tt-grid" id="ttGrid"></div>

  <div class="empty-state" id="emptyState" style="display:none">
    找不到符合條件的幻卡
  </div>

</div>

<!-- Footer -->
<footer class="page-footer">
  <div class="container">
    <p class="footer-text">
      <a href="../../">水神的工具箱</a> · 資料來源：遊戲本體、<a href="https://xivapi.com" target="_blank">XIVAPI</a>
    </p>
    <p class="footer-text" style="margin-top:4px">
      FINAL FANTASY XIV © SQUARE ENIX　此為玩家自製非官方工具
    </p>
  </div>
</footer>

<script>
(function() {
  const STORAGE_KEY = 'ffxiv_triadcards_owned';
  const DATA_URL = '../../data/triple-triad.json';
  const ICON_BASE = '../../assets/triple-triad/';

  // ── State ──
  let TT_DATA = [];
  let STARS = [];
  let TYPES = [];
  let SOURCE_TYPES = [];
  let owned = new Set(JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'));
  let filterOwn = 'all';       // all | owned | missing
  let filterStar = null;       // number | null
  let filterType = null;       // string | '__none__' | null
  let filterSource = null;     // string | null
  let searchQ = '';

  // ── Unique key ──
  function keyOf(c) {
    return 'id:' + c.id;
  }

  // ── Save ──
  function save() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify([...owned]));
  }

  // ── Toggle ──
  function toggle(k) {
    if (owned.has(k)) owned.delete(k);
    else owned.add(k);
    save();
    updateProgress();
    renderGrid();
  }

  // ── Progress ──
  function updateProgress() {
    const total = TT_DATA.length;
    const count = TT_DATA.filter(c => owned.has(keyOf(c))).length;
    const pct = total ? Math.round(count / total * 100) : 0;
    document.getElementById('ownedCount').textContent = count;
    document.getElementById('totalCount').textContent = total;
    document.getElementById('progressFill').style.width = pct + '%';
    document.getElementById('progressPct').textContent = pct + '%';
  }

  // ── Generic filter tag renderer ──
  function renderTagFilters(containerId, values, current, onClick, labelFn) {
    const wrap = document.getElementById(containerId);
    wrap.innerHTML = '';
    values.forEach(v => {
      const btn = document.createElement('button');
      btn.className = 'filter-tag' + (current === v ? ' active' : '');
      btn.textContent = labelFn ? labelFn(v) : v;
      btn.addEventListener('click', () => onClick(v));
      wrap.appendChild(btn);
    });
  }

  function renderStarFilters() {
    renderTagFilters('starFilters', STARS, filterStar,
      v => { filterStar = filterStar === v ? null : v; renderStarFilters(); renderGrid(); },
      v => '★' + v
    );
  }

  function renderTypeFilters() {
    renderTagFilters('typeFilters', [...TYPES, '__none__'], filterType,
      v => { filterType = filterType === v ? null : v; renderTypeFilters(); renderGrid(); },
      v => v === '__none__' ? '無特殊類型' : v
    );
  }

  function renderSourceFilters() {
    renderTagFilters('sourceFilters', SOURCE_TYPES, filterSource,
      v => { filterSource = filterSource === v ? null : v; renderSourceFilters(); renderGrid(); }
    );
  }

  // ── Filter ──
  function filtered() {
    return TT_DATA.filter(c => {
      const k = keyOf(c);

      // ownership
      if (filterOwn === 'owned'   && !owned.has(k)) return false;
      if (filterOwn === 'missing' &&  owned.has(k)) return false;

      // star
      if (filterStar != null && c.stars !== filterStar) return false;

      // type
      if (filterType) {
        if (filterType === '__none__') {
          if (c.type) return false;
        } else {
          if (c.type !== filterType) return false;
        }
      }

      // source
      if (filterSource) {
        const srcs = c.sources || [];
        if (!srcs.some(s => s.type === filterSource)) return false;
      }

      // search
      if (searchQ) {
        const q = searchQ.toLowerCase();
        const nameMatch = c.name && c.name.toLowerCase().includes(q);
        const enMatch = c.nameEn && c.nameEn.toLowerCase().includes(q);
        if (!nameMatch && !enMatch) return false;
      }

      return true;
    });
  }

  // ── Render grid ──
  function renderGrid() {
    const list = filtered();
    const grid = document.getElementById('ttGrid');
    const empty = document.getElementById('emptyState');
    const meta = document.getElementById('resultMeta');

    grid.innerHTML = '';
    if (list.length === 0) {
      grid.style.display = 'none';
      empty.style.display = '';
    } else {
      grid.style.display = '';
      empty.style.display = 'none';
    }

    const ownedInView = list.filter(c => owned.has(keyOf(c))).length;
    meta.innerHTML = `顯示 <em>${list.length}</em> / ${TT_DATA.length} 張 · 已取得 <em>${ownedInView}</em> / ${list.length}`;

    list.forEach(c => {
      const k = keyOf(c);
      const isOwned = owned.has(k);
      const card = document.createElement('div');
      card.className = 'tt-card' + (isOwned ? ' owned' : '');

      const srcs = c.sources || [];

      const sourceTags = srcs.length
        ? [...new Set(srcs.map(s => s.type))].slice(0, 2).map(t => `<span class="tag src-tag">${t}</span>`).join('')
        : `<span class="tag placeholder">待補充</span>`;

      const typeTag = c.type ? `<span class="tag type-tag">${c.type}</span>` : '';

      const iconHtml = `<img class="tt-icon" src="${ICON_BASE}${c.id}.webp" alt="" loading="lazy" onerror="this.onerror=null;this.outerHTML='<div class=&quot;tt-icon placeholder&quot;>🃏</div>'">`;

      const num = c.numbers || {};
      const fmtNum = n => (n === 10 ? 'A' : n);
      const numbersHtml = `
        <div class="tt-numbers">
          <div class="tt-num n-top${num.top === 10 ? ' n-A' : ''}">${fmtNum(num.top)}</div>
          <div class="tt-num n-left${num.left === 10 ? ' n-A' : ''}">${fmtNum(num.left)}</div>
          <div class="tt-num n-center">🃏</div>
          <div class="tt-num n-right${num.right === 10 ? ' n-A' : ''}">${fmtNum(num.right)}</div>
          <div class="tt-num n-bottom${num.bottom === 10 ? ' n-A' : ''}">${fmtNum(num.bottom)}</div>
        </div>
      `;

      // detail lines for tooltip
      const detailLines = [];
      if (srcs.length) {
        srcs.slice(0, 6).forEach(s => {
          let line = s.type;
          if (s.type === 'NPC對戰' && s.npcName) {
            line += `：${s.npcName}`;
            if (s.location && s.location.mapName) {
              line += ` @ ${s.location.mapName} (${s.location.x}, ${s.location.y})`;
            }
            if (s.dropType) line += ` [${s.dropType}]`;
          } else if (s.detail) {
            line += `：${s.detail}`;
          } else if (s.questId) {
            line += `：任務 ID ${s.questId}`;
          }
          detailLines.push(`<div class="detail-line">${line}</div>`);
        });
        if (srcs.length > 6) {
          detailLines.push(`<div class="detail-line">…等共 ${srcs.length} 個來源</div>`);
        }
      } else {
        detailLines.push(`<div class="detail-line">取得方式：待補充</div>`);
      }

      card.innerHTML = `
        <div class="tt-head">
          ${iconHtml}
          <div style="flex:1; min-width:0;">
            <div class="tt-name">${c.name}</div>
            <div class="tt-meta">No.${c.id}${c.patch ? ' · ver ' + c.patch : ''}</div>
          </div>
        </div>
        ${numbersHtml}
        <div class="tt-tags">
          <span class="tag star-${c.stars}">★${c.stars}</span>
          ${typeTag}
          ${sourceTags}
        </div>
        <div class="tt-detail">${detailLines.join('')}</div>
      `;

      card.addEventListener('click', () => toggle(k));
      grid.appendChild(card);
    });
  }

  // ── Export / Import ──
  function exportProgress() {
    const payload = {
      schema: 'triple-triad-progress',
      exported: new Date().toISOString(),
      owned: [...owned]
    };
    const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'triple-triad-progress.json';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }

  function importProgress(file) {
    const reader = new FileReader();
    reader.onload = e => {
      try {
        const data = JSON.parse(e.target.result);
        const list = Array.isArray(data) ? data : data.owned;
        if (!Array.isArray(list)) throw new Error('格式錯誤');
        owned = new Set(list);
        save();
        updateProgress();
        renderGrid();
        alert('匯入成功，共 ' + owned.size + ' 筆已取得記錄');
      } catch (err) {
        alert('匯入失敗：檔案格式不正確');
      }
    };
    reader.readAsText(file);
  }

  // ── Own-toggle buttons ──
  document.querySelectorAll('.own-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      filterOwn = btn.dataset.own;
      document.querySelectorAll('.own-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderGrid();
    });
  });

  // ── Search ──
  document.getElementById('searchInput').addEventListener('input', e => {
    searchQ = e.target.value.trim();
    renderGrid();
  });

  // ── Export / Import / Clear ──
  document.getElementById('exportBtn').addEventListener('click', exportProgress);
  document.getElementById('importBtn').addEventListener('click', () => {
    document.getElementById('importFile').click();
  });
  document.getElementById('importFile').addEventListener('change', e => {
    const file = e.target.files[0];
    if (file) importProgress(file);
    e.target.value = '';
  });

  document.getElementById('clearBtn').addEventListener('click', () => {
    if (!confirm('確定要清除所有取得記錄嗎？')) return;
    owned.clear();
    save();
    updateProgress();
    renderGrid();
  });

  // ── Init: load data ──
  fetch(DATA_URL)
    .then(res => {
      if (!res.ok) throw new Error('無法載入資料 (' + res.status + ')');
      return res.json();
    })
    .then(json => {
      const raw = (json && json.data) ? json.data : [];
      // 僅顯示有繁中名的項目（無繁中漢字＝台服未開放，不可用英文名顯示）
      TT_DATA = raw.filter(c => c.name && /[一-鿿]/.test(c.name));

      // 排序：依編號
      TT_DATA.sort((a, b) => (a.id || 0) - (b.id || 0));

      // 星級清單
      const starSet = new Set(TT_DATA.map(c => c.stars).filter(s => s != null));
      STARS = [...starSet].sort((a,b) => a - b);

      // 類型清單
      const typeSet = new Set();
      TT_DATA.forEach(c => { if (c.type) typeSet.add(c.type); });
      TYPES = [...typeSet].sort();

      // 取得方式清單
      const sourceSet = new Set();
      TT_DATA.forEach(c => (c.sources || []).forEach(s => { if (s.type) sourceSet.add(s.type); }));
      SOURCE_TYPES = [...sourceSet].sort();

      renderStarFilters();
      renderTypeFilters();
      renderSourceFilters();
      updateProgress();
      renderGrid();
    })
    .catch(err => {
      const grid = document.getElementById('ttGrid');
      const empty = document.getElementById('emptyState');
      grid.style.display = 'none';
      empty.style.display = '';
      empty.textContent = '資料載入失敗：' + err.message;
    });
})();
</script>
</body>
</html>
