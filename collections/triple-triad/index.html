<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="FF14 幻卡追蹤 — 查詢取得來源、星級篩選、記錄收藏進度">
  <title>幻卡追蹤 | 水神的工具箱</title>
  <link rel="stylesheet" href="../../assets/css/common.css">
  <link rel="stylesheet" href="../../assets/css/tool-header.css">
  <style>
    /* 幻卡頁專屬樣式；通用版面與 .col-* 卡片系統見 assets/css/common.css，
       控制面由 assets/js/collection-tracker.js 渲染 */
    :root {
      --accent:   #f87171;                 /* 紅 */
      --accent-2: #c8a96e;                 /* 進度條尾色：金 */
      --glow-1:   rgba(248,113,113,0.06);
      --glow-2:   rgba(200,169,110,0.04);
    }
    .col-grid { grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); }
    .col-card { padding: 18px; gap: 8px; }
    .col-name { padding-right: 16px; }
    .tt-meta { font-size: 10px; color: var(--text-muted); }

    /* 幻卡四向數值十字 */
    .tt-numbers {
      display: grid;
      grid-template-columns: 24px 24px 24px;
      grid-template-rows: 24px 24px 24px;
      justify-content: center;
      gap: 2px;
      margin: 2px 0;
    }
    .tt-num {
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 700;
      color: var(--text-secondary);
      background: var(--raise);
      border-radius: 3px;
    }
    .tt-num.n-top    { grid-area: 1 / 2; }
    .tt-num.n-left   { grid-area: 2 / 1; }
    .tt-num.n-center { grid-area: 2 / 2; font-size: 10px; color: var(--text-muted); background: transparent; }
    .tt-num.n-right  { grid-area: 2 / 3; }
    .tt-num.n-bottom { grid-area: 3 / 2; }
    .tt-num.n-A      { color: var(--gold-light); }

    /* 星級與類型標籤 */
    .tag.star-1 { background: rgba(74,222,128,0.1);  color: var(--green); border-color: rgba(74,222,128,0.2); }
    .tag.star-2 { background: rgba(79,195,247,0.1);  color: var(--blue);  border-color: rgba(79,195,247,0.2); }
    .tag.star-3 { background: rgba(167,139,250,0.1); color: var(--purple); border-color: rgba(167,139,250,0.2); }
    .tag.star-4 { background: rgba(255,200,80,0.1);  color: #ffc850; border-color: rgba(255,200,80,0.2); }
    .tag.star-5 { background: rgba(248,113,113,0.1); color: var(--red); border-color: rgba(248,113,113,0.2); }
    .tag.type-tag { background: rgba(200,169,110,0.12); color: var(--gold); border-color: rgba(200,169,110,0.25); }
    .tag.src-tag  { background: var(--raise); color: var(--text-secondary); border-color: var(--border); }

    .col-detail .detail-line { margin-top: 2px; }
    .col-detail .detail-line b { color: var(--text-secondary); font-weight: 500; }

    /* NPC 位置地圖按鈕（點卡片其他區域＝勾已取得，點 📍＝開地圖） */
    .tt-loc {
      background: none; border: none; cursor: pointer; font-size: 12px;
      padding: 0 2px; line-height: 1; vertical-align: baseline;
    }
    .tt-loc:hover { transform: scale(1.25); }

    @media (max-width: 600px) { .col-grid { grid-template-columns: 1fr 1fr; } }
    @media (max-width: 380px) { .col-grid { grid-template-columns: 1fr; } }
  </style>
  <script src="../../assets/js/patch-gate.js"></script>
  <script src="../../assets/js/collection-tracker.js"></script>
  <link rel="stylesheet" href="../../assets/css/theme.css">
  <script src="../../assets/js/theme.js"></script>
</head>
<body>

<div class="container">

  <!-- Header -->
  <div class="tool-header">
    <h1 class="tool-title">🃏 幻卡追蹤</h1>
    <p class="tool-subtitle">點擊卡片標記已取得，進度自動儲存於瀏覽器</p>
    <div class="header-divider"></div>
  </div>

  <!-- 控制面（進度／工具列／篩選／格線）由 collection-tracker.js 渲染 -->
  <div id="ct-root"></div>

</div>

<!-- Footer -->
<footer class="page-footer">
  <div class="container">
    <p class="footer-text">
      <a href="../../">水神的工具箱</a> · 資料來源：遊戲本體、<a href="https://xivapi.com" target="_blank">XIVAPI</a>
    </p>
    <p class="footer-text" style="margin-top:4px">
      FINAL FANTASY XIV © SQUARE ENIX　此為玩家自製非官方工具
    </p>
  </div>
</footer>

<script>
CollectionTracker.init({
  dataUrl: '../../data/triple-triad.json',
  metaUrl: '../../data/_meta.json',
  storageKey: 'ffxiv_triadcards_owned',
  snapKey: 'triad',
  fileBase: 'triple-triad',
  schema: 'triple-triad-progress',
  verb: '取得',
  unit: '張',
  noun: '幻卡',
  searchPlaceholder: '搜尋幻卡名稱、NPC、地點…',
  include: function (c, gp) { return c.name && /[一-鿿]/.test(c.name) && PatchGate.released(c.patch, gp); },
  prepare: function (list) { return list.slice().sort(function (a, b) { return (a.id || 0) - (b.id || 0); }); },
  searchText: function (c) {
    var parts = [c.name, c.nameEn];
    (c.sources || []).forEach(function (s) {
      if (s.detail) parts.push(s.detail);
      if (s.npcName) parts.push(s.npcName);
      if (s.location && s.location.mapName) parts.push(s.location.mapName);
    });
    return parts.filter(Boolean).join(' ').toLowerCase();
  },
  sorts: ['patch-desc', 'patch-asc', 'name'],
  filters: [
    {
      id: 'star', label: '星級',
      options: function (list) {
        var set = new Set(list.map(function (c) { return c.stars; }).filter(function (s) { return s != null; }));
        return Array.from(set).sort(function (a, b) { return a - b; }).map(function (s) { return { value: String(s), label: '★' + s }; });
      },
      match: function (c, v) { return c.stars === Number(v); }
    },
    {
      id: 'type', label: '類型',
      options: function (list) {
        var set = new Set(); list.forEach(function (c) { if (c.type) set.add(c.type); });
        return Array.from(set).sort().map(function (t) { return { value: t, label: t }; })
          .concat([{ value: '__none__', label: '無特殊類型' }]);
      },
      match: function (c, v) { return v === '__none__' ? !c.type : c.type === v; }
    },
    {
      id: 'source', label: '取得方式',
      options: function (list) {
        var set = new Set();
        list.forEach(function (c) { (c.sources || []).forEach(function (s) { if (s.type) set.add(s.type); }); });
        return Array.from(set).sort().map(function (t) { return { value: t, label: t }; });
      },
      match: function (c, v) { return (c.sources || []).some(function (s) { return s.type === v; }); }
    },
    { kind: 'patch' }
  ],
  // 點 📍：開 NPC 位置地圖，不切換取得狀態
  onCardClick: function (c, ev) {
    var loc = ev.target.closest('.tt-loc');
    if (!loc) return false;
    ev.stopPropagation();
    var x = Number(loc.dataset.x), y = Number(loc.dataset.y);
    if (window.ttOpenMap) window.ttOpenMap({
      mapId: Number(loc.dataset.mapid), x: x, y: y,
      title: '🃏 ' + c.name,
      sub: 'NPC 對戰：' + loc.dataset.npc + ' · ' + loc.dataset.mapname,
      flagText: '/coord ' + x.toFixed(1) + ' ' + y.toFixed(1) + ' ' + loc.dataset.mapname
    });
    return true;
  },
  card: function (c) {
    var esc = CollectionTracker.esc;
    var ICON_BASE = '../../assets/triple-triad/';
    var srcs = c.sources || [];
    var sourceTags = srcs.length
      ? Array.from(new Set(srcs.map(function (s) { return s.type; }))).slice(0, 2).map(function (t) { return '<span class="tag src-tag">' + esc(t) + '</span>'; }).join('')
      : '<span class="tag placeholder">待補充</span>';
    var typeTag = c.type ? '<span class="tag type-tag">' + esc(c.type) + '</span>' : '';
    var iconHtml = '<img class="col-icon" src="' + ICON_BASE + esc(c.id) + '.webp" alt="" loading="lazy" onerror="this.onerror=null;this.outerHTML=\'<div class=&quot;col-icon placeholder&quot;>🃏</div>\'">';
    var num = c.numbers || {};
    var fmtNum = function (n) { return n === 10 ? 'A' : n; };
    var numbersHtml =
      '<div class="tt-numbers">' +
        '<div class="tt-num n-top' + (num.top === 10 ? ' n-A' : '') + '">' + fmtNum(num.top) + '</div>' +
        '<div class="tt-num n-left' + (num.left === 10 ? ' n-A' : '') + '">' + fmtNum(num.left) + '</div>' +
        '<div class="tt-num n-center">🃏</div>' +
        '<div class="tt-num n-right' + (num.right === 10 ? ' n-A' : '') + '">' + fmtNum(num.right) + '</div>' +
        '<div class="tt-num n-bottom' + (num.bottom === 10 ? ' n-A' : '') + '">' + fmtNum(num.bottom) + '</div>' +
      '</div>';
    var detailLines = [];
    if (srcs.length) {
      srcs.slice(0, 6).forEach(function (s) {
        var line = esc(s.type);
        if (s.type === 'NPC對戰' && s.npcName) {
          line += '：' + esc(s.npcName);
          if (s.location && s.location.mapName) {
            line += ' @ ' + esc(s.location.mapName) + ' (' + esc(s.location.x) + ', ' + esc(s.location.y) + ')';
            if (s.location.mapId != null) {
              line += ' <button class="tt-loc" title="開地圖看 NPC 位置"' +
                ' data-mapid="' + esc(s.location.mapId) + '" data-x="' + esc(s.location.x) + '" data-y="' + esc(s.location.y) + '"' +
                ' data-npc="' + esc(s.npcName) + '" data-mapname="' + esc(s.location.mapName) + '">📍</button>';
            }
          }
          if (s.dropType) line += ' [' + esc(s.dropType) + ']';
        } else if (s.detail) {
          line += '：' + esc(s.detail);
        } else if (s.questId) {
          line += '：任務 ID ' + esc(s.questId);
        }
        detailLines.push('<div class="detail-line">' + line + '</div>');
      });
      if (srcs.length > 6) detailLines.push('<div class="detail-line">…等共 ' + srcs.length + ' 個來源</div>');
    } else {
      detailLines.push('<div class="detail-line">取得方式：待補充</div>');
    }
    return '' +
      '<div class="col-head">' + iconHtml +
        '<div style="flex:1; min-width:0;">' +
          '<div class="col-name">' + esc(c.name) + '</div>' +
          '<div class="tt-meta">No.' + esc(c.id) + (c.patch ? ' · ver ' + esc(c.patch) : '') + '</div>' +
        '</div>' +
      '</div>' +
      numbersHtml +
      '<div class="col-tags">' +
        '<span class="tag star-' + esc(c.stars) + '">★' + esc(c.stars) + '</span>' + typeTag + sourceTags +
      '</div>' +
      '<div class="col-detail">' + detailLines.join('') + '</div>';
  }
});
</script>
<script type="module">
/* NPC 位置地圖：共用迷你地圖彈窗，maps.json 首次點擊才載入 */
import { initMapModal, openMapModal } from '../../assets/js/map-modal.js';
let ready = null;
window.ttOpenMap = async function (opts) {
  if (!ready) {
    ready = fetch('../../data/maps.json')
      .then(r => r.json())
      .then(j => initMapModal({ mapsData: j.data, base: '../..' }));
  }
  try { await ready; } catch (e) { ready = null; return; }
  openMapModal(opts);
};
</script>
</body>
</html>
